<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLens Admin Login</title>
    <style>
        :root {
            --bg: #050505;
            --card: #101010;
            --accent: #00e676;
            --accent-hover: #00c853;
            --text: #ffffff;
            --muted: #a0a0a0;
            --border: #262626;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg) 70%);
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: rgba(16, 16, 16, 0.8); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 50px 40px; 
            text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.6); 
            width: 100%;
            max-width: 400px;
        }
        h1 { margin: 0 0 10px; font-size: 28px; letter-spacing: -0.5px; }
        p { color: var(--muted); margin: 0 0 40px; font-size: 15px; }
        
        .btn { 
            background-color: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            padding: 14px 32px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700; 
            transition: all 0.2s; 
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }
        .btn:hover { 
            background-color: var(--accent-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>EventLens Admin</h1>
        <p>Secure Dashboard Access</p>
        <button id="loginButton" class="btn">Login with AWS Cognito</button>
    </div>

<script>
    const loginButton = document.getElementById('loginButton');

    // CONFIGURATION (Must match dashboard.html)
    const COGNITO_DOMAIN = "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com";
    const CLIENT_ID = "6j3gec3kk0q0ktkals8cr8s367"; 
    const REDIRECT_URI = "https://selfiphotos.netlify.app/dashboard.html";

    loginButton.addEventListener('click', () => {
        // Using response_type=code to match dashboard.html logic
        const loginUrl = `${COGNITO_DOMAIN}/login?client_id=${CLIENT_ID}&response_type=code&scope=email+openid+profile&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
        window.location.href = loginUrl;
    });
</script>
</body>
</html>
