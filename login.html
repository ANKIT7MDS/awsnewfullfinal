<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>एडमिन डैशबोर्ड लॉगिन</title>
  <style>
    body{margin:0;background:#0f0f0f;color:#ff6a00;font-family:system-ui,Segoe UI,Roboto,Arial}
    .card{max-width:520px;margin:12vh auto;padding:32px;background:#1a1a1a;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);text-align:center}
    button{background:#ff6a00;border:0;color:#fff;font-weight:700;padding:12px 22px;border-radius:10px;cursor:pointer;font-size:18px}
    small{display:block;color:#aaa;margin-top:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1>एडमिन डैशबोर्ड लॉगिन</h1>
    <button id="loginBtn">लॉगिन करें</button>
    <small>Redirect after login: https://selfiphotos.netlify.app/dashboard.html</small>
  </div>

<script>
/** ========= YOUR COGNITO DETAILS (from screenshot) ========= */
const COGNITO_DOMAIN = "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com";
const CLIENT_ID      = "6j3gec3kk0q0ktkals8cr8s367";
const REDIRECT_URI   = "https://selfiphotos.netlify.app/dashboard.html"; // must match in Cognito callback list
const LOGOUT_URI     = "https://selfiphotos.netlify.app/login.html";
const SCOPES         = "openid email profile";

/** ========= PKCE helpers ========= */
async function sha256(buffer){ return crypto.subtle.digest("SHA-256", buffer); }
function base64UrlEncode(bytes){
  return btoa(String.fromCharCode(...new Uint8Array(bytes)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function randomString(len=64){
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b=>("0"+b.toString(16)).slice(-2)).join("");
}

async function buildAuthorizeUrl(){
  // create a code_verifier and code_challenge (PKCE)
  const code_verifier = randomString(64);
  localStorage.setItem("pkce_verifier", code_verifier);

  const encoder = new TextEncoder();
  const challengeBytes = await sha256(encoder.encode(code_verifier));
  const code_challenge = base64UrlEncode(challengeBytes);

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    scope: SCOPES,
    redirect_uri: REDIRECT_URI,
    code_challenge_method: "S256",
    code_challenge
  });

  return `${COGNITO_DOMAIN}/oauth2/authorize?${params.toString()}`;
}

document.getElementById("loginBtn").addEventListener("click", async () => {
  window.location.href = await buildAuthorizeUrl();
});

// If user came back here after logout, clean old tokens
(function cleanIfComingFromLogout(){
  const p = new URLSearchParams(location.search);
  if (p.get("loggedout")) {
    localStorage.removeItem("id_token");
    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");
    localStorage.removeItem("pkce_verifier");
    history.replaceState({}, "", "login.html");
  }
})();
</script>
</body>
</html>
