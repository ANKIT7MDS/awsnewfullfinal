<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एडमिन लॉगिन</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #2c2c2c; border: 1px solid #444; border-radius: 14px; padding: 40px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: #ff6a00; font-size: 24px; margin: 0 0 20px; }
        .btn { background: #ff6a00; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background-color 0.2s; }
        .btn:hover { background-color: #e65c00; }
    </style>
</head>
<body>
    <div class="card">
        <h1>एडमिन डैशबोर्ड लॉगिन</h1>
        <button id="loginButton" class="btn">लॉगिन करें</button>
    </div>

<script>
    const loginButton = document.getElementById('loginButton');

    loginButton.addEventListener('click', () => {
        const COGNITO_DOMAIN = "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com";
        const CLIENT_ID = "6j3gec3kk0q0ktkals8cr8s367";
        const REDIRECT_URI = "https://staging.d9fw7yzrfzuja.amplifyapp.com/dashboard.html";

        // --- YEH HAI SABSE ZAROORI HISSA ---
        // Hum Cognito se saaf-saaf admin scope maang rahe hain
        const SCOPES = "openid profile email aws.cognito.signin.user.admin";

        const loginUrl = `${COGNITO_DOMAIN}/login?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;
        
        window.location.href = loginUrl;
    });
</script>
</body>
</html>
