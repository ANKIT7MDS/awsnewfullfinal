<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photographer Dashboard</title>

<style>
:root{
  --bg:#050505;
  --card:#101010;
  --border:#262626;
  --text:#ffffff;
  --muted:#a0a0a0;
  --brand:#00e676;
  --brand-hover:#00c853;
  --danger:#ff5252;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}
a{color:var(--brand);text-decoration:none}

.wrap{max-width:1200px;margin:30px auto;padding:0 20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;border-bottom:1px solid var(--border);padding-bottom:20px}
.header h1{font-size:26px;margin:0;background:linear-gradient(to right,#fff,#bbb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-info{display:flex;gap:15px;align-items:center}
.badge{background:#1a1a1a;border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:13px;color:var(--brand)}

.btn{border:none;border-radius:50px;padding:10px 20px;font-weight:600;cursor:pointer}
.btn.primary{background:var(--brand);color:#000}
.btn.primary:hover{background:var(--brand-hover)}
.btn.danger{background:rgba(255,82,82,.1);border:1px solid var(--danger);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,.5)}

.toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:8px;font-weight:600;z-index:999;transform:translateX(400px);transition:.3s}
.toast.show{transform:translateX(0)}
.toast.success{background:var(--brand);color:#000}
.toast.error{background:var(--danger);color:#fff}

#loading{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:998}
.spinner{width:40px;height:40px;border:4px solid #555;border-top:4px solid var(--brand);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>
<div id="loading"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<div class="wrap">
  <div class="header">
    <h1>Photographer Dashboard</h1>
    <div class="user-info">
      <span id="welcome" class="badge">Loading...</span>
      <button id="logoutBtn" class="btn danger">Logout</button>
    </div>
  </div>

  <div class="card">
    <h3>My Collections</h3>
    <div id="collections">Loading collections...</div>
  </div>

  <div class="card">
    <h3>Account Usage</h3>
    <div id="usage">Loading usage...</div>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const COGNITO_DOMAIN = "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com";
const CLIENT_ID = "6j3gec3kk0q0ktkals8cr8s367";
const REDIRECT_URI = "https://selfiphotos.netlify.app/dashboard.html";
const TOKEN_ENDPOINT = COGNITO_DOMAIN + "/oauth2/token";

/* ====== CHANGE ONLY IF YOUR API BASE IS DIFFERENT ====== */
const API_BASE = "https://YOUR_API_GATEWAY_URL";
const GET_COLLECTIONS_API = API_BASE + "/get-collections";
const ACCOUNT_STATUS_API = API_BASE + "/get-account-status";

/* ================= HELPERS ================= */
const $ = id => document.getElementById(id);

function showToast(msg,type='success'){
  const t=$('toast');
  t.textContent=msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
function showLoading(v){$('loading').style.display=v?'flex':'none'}

function parseJwt(token){
  return JSON.parse(atob(token.split('.')[1]));
}

/* ================= AUTH ================= */
async function exchangeCode(code){
  const body=new URLSearchParams({
    grant_type:"authorization_code",
    client_id:CLIENT_ID,
    redirect_uri:REDIRECT_URI,
    code
  });

  const r=await fetch(TOKEN_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  });
  if(!r.ok) throw new Error("Token exchange failed");
  return r.json();
}

async function handleAuth(){
  const params=new URLSearchParams(location.search);
  const code=params.get("code");

  if(code){
    try{
      showLoading(true);
      const t=await exchangeCode(code);
      localStorage.setItem("idToken",t.id_token);
      localStorage.setItem("accessToken",t.access_token);
      localStorage.setItem("refreshToken",t.refresh_token);
      history.replaceState({},document.title,REDIRECT_URI);
      initDashboard(t.id_token);
      return;
    }catch(e){
      localStorage.clear();
      showToast("Login failed","error");
      setTimeout(()=>location.href="login.html",800);
      return;
    }
  }

  const token=localStorage.getItem("idToken");
  if(!token){location.href="login.html";return;}

  try{
    const p=parseJwt(token);
    if(Date.now()>p.exp*1000) throw "expired";
    initDashboard(token);
  }catch{
    localStorage.clear();
    showToast("Session expired","error");
    setTimeout(()=>location.href="login.html",800);
  }
}

/* ================= DASHBOARD ================= */
function initDashboard(idToken){
  const p=parseJwt(idToken);

  if((p["cognito:groups"]||[]).includes("MasterAdmins")){
    location.href="super-admin.html";
    return;
  }

  $('welcome').textContent="Hi, "+p.email.split("@")[0];
  loadCollections(idToken);
  loadAccountStatus(idToken);
}

async function loadCollections(token){
  try{
    const r=await fetch(GET_COLLECTIONS_API,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      }
    });
    const d=await r.json();
    $('collections').innerHTML =
      d.collections?.map(c=>`
        <div style="margin-bottom:10px">
          <b>${c.name}</b> —
          ${c.event_count} events —
          ${c.photo_count} photos
        </div>
      `).join("") || "No collections";
  }catch{
    $('collections').textContent="Failed to load collections";
  }
}

async function loadAccountStatus(token){
  try{
    const r=await fetch(ACCOUNT_STATUS_API,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+token,
        "Content-Type":"application/json"
      }
    });
    const d=await r.json();
    $('usage').innerHTML=`
      Used: ${d.used_gb} GB<br>
      Limit: ${d.limit_gb} GB<br>
      Expiry: ${d.expiry_date || "N/A"}
    `;
  }catch{
    $('usage').textContent="Failed to load usage";
  }
}

/* ================= LOGOUT ================= */
$('logoutBtn').onclick=()=>{
  localStorage.clear();
  location.href="login.html";
};

document.addEventListener("DOMContentLoaded",handleAuth);
</script>
</body>
</html>
