<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard</title>
    <style>
        :root {
            --bg: #050505;
            --card: #101010;
            --border: #262626;
            --text: #ffffff;
            --muted: #a0a0a0;
            --brand: #00e676;
            --danger: #ff5252;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
        
        .header { background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 700; font-size: 18px; color: var(--text); }
        .logo span { color: var(--brand); }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 1px solid var(--border); font-size: 13px; text-transform: uppercase; }
        td { padding: 16px 12px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        tr:hover td { background: #151515; }
        
        .btn { background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 5px; }
        .btn:hover { border-color: var(--brand); color: var(--brand); }
        .btn.primary { background: var(--brand); color: #000; border: none; font-weight: 600; }
        .btn.primary:hover { opacity: 0.9; }
        .btn.danger { color: var(--danger); border-color: #333; }
        .btn.danger:hover { background: rgba(255, 82, 82, 0.1); border-color: var(--danger); }
        
        .pill { padding: 2px 8px; border-radius: 50px; font-size: 11px; border: 1px solid var(--border); }
        .pill.active { border-color: var(--brand); color: var(--brand); background: rgba(0, 230, 118, 0.1); }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.open { display: flex; }
        .modal-box { background: var(--card); width: 90%; max-width: 500px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        
        input, select { background: #000; border: 1px solid var(--border); padding: 10px; width: 100%; color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--brand); }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">EventLens <span>SuperAdmin</span></div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="who" style="font-size:13px; color:var(--muted);"></span>
            <button class="btn primary" onclick="openModal()">+ New Photographer</button>
            <button class="btn danger" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>All Photographers</h3>
            <table>
                <thead><tr><th>Email</th><th>Limit (GB)</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modalTitle">Create Photographer</h3>
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="user@example.com">
            <label>Storage Limit (GB)</label>
            <input type="number" id="limitInput" value="5">
            <label>Expiry Date</label>
            <input type="date" id="expiryInput">
            <div style="text-align:right;">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    let idToken = localStorage.getItem('idToken');

    function showToast(message, type = 'success') {
        // Same as dashboard
        const toast = document.createElement('div');
        toast.style.position = 'fixed'; toast.style.bottom = '20px'; toast.style.right = '20px';
        toast.style.padding = '10px 20px'; toast.style.borderRadius = '5px';
        toast.style.background = type === 'error' ? '#ff5252' : '#00e676'; toast.style.color = '#fff';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadPhotographers() {
        try {
            const response = await fetch(`${API_BASE}/photographers`, { 
                headers: { 'Authorization': `Bearer ${idToken}` } 
            });
            const data = await response.json();
            const tbody = document.getElementById('rows');
            tbody.innerHTML = '';
            data.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.email}</td>
                    <td>${user.storage_limit_gb}</td>
                    <td>${user.expiry_date || 'None'}</td>
                    <td><span class="pill ${user.disabled ? '' : 'active'}">${user.disabled ? 'Disabled' : 'Active'}</span></td>
                    <td>
                        <button class="btn" onclick="editUser('${user.user_id}')">Edit</button>
                        <button class="btn danger" onclick="deleteUser('${user.user_id}')">Delete</button>
                        <button class="btn" onclick="toggleDisable('${user.user_id}', ${user.disabled})">${user.disabled ? 'Enable' : 'Disable'}</button>
                    </td>
                `;
                tbody.appendChild(tr);
                if (user.expiry_date && new Date(user.expiry_date) < new Date()) {
                    showToast(`User ${user.email} plan expired!`, 'error');
                }
            });
        } catch (error) {
            showToast('Error loading users', 'error');
        }
    }

    function openModal(edit = false, user = {}) {
        document.getElementById('modal').classList.add('open');
        document.getElementById('modalTitle').textContent = edit ? 'Edit Photographer' : 'Create Photographer';
        document.getElementById('emailInput').value = user.email || '';
        document.getElementById('limitInput').value = user.storage_limit_gb || 5;
        document.getElementById('expiryInput').value = user.expiry_date || '';
        document.getElementById('saveBtn').onclick = () => saveUser(edit, user.user_id);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    async function saveUser(edit, userId) {
        const payload = {
            email: document.getElementById('emailInput').value,
            storage_limit_gb: parseInt(document.getElementById('limitInput').value),
            expiry_date: document.getElementById('expiryInput').value
        };
        if (edit) payload.user_id = userId;
        try {
            await fetch(`${API_BASE}/photographers`, {
                method: edit ? 'PUT' : 'POST',
                headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            loadPhotographers();
            closeModal();
            showToast('Saved');
        } catch (error) {
            showToast('Save failed', 'error');
        }
    }

    async function deleteUser(userId) {
        if (!confirm('Delete user? This cannot be undone.')) return;
        try {
            await fetch(`${API_BASE}/photographers/${userId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${idToken}` }
            });
            loadPhotographers();
            showToast('Deleted');
        } catch (error) {
            showToast('Delete failed', 'error');
        }
    }

    async function toggleDisable(userId, current) {
        try {
            await fetch(`${API_BASE}/photographers/${userId}/toggle`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ disabled: !current })
            });
            loadPhotographers();
            showToast('Toggled');
        } catch (error) {
            showToast('Toggle failed', 'error');
        }
    }

    function editUser(userId) {
        // Fetch user data and open modal with edit=true
        // Assume fetch from API
        const user = {}; // Placeholder - fetch real
        openModal(true, user);
    }

    function logout() { localStorage.clear(); window.location.href='login.html'; }

    document.addEventListener('DOMContentLoaded', loadPhotographers);
</script>
</body>
</html>
