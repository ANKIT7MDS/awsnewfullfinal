<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8"/>
  <title>सुपर एडमिन (नया)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <style>
    :root {
      --bg: #0a0f1a;
      --panel: #0b1220;
      --panel-2: #0e1726;
      --text: #dbeafe;
      --muted: #8da2b6;
      --border: #1f2a44;
      --accent: #3b82f6;
      --accent-2: #0ea5e9;
      --danger: #ef4444;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto; color: var(--text); background: var(--bg); }
    header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(10,15,26,.96); backdrop-filter: blur(8px);}
    .btn { background: var(--panel-2); color: var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:10px; cursor:pointer }
    .btn:hover { background: #131c2e }
    .btn.primary { background: var(--accent); border-color:var(--accent); }
    .btn.danger { background:#1e0d0f; border-color:#3b1116; color:#fecaca }
    .muted { color: var(--muted) }
    .wrap { max-width: 1100px; margin: 18px auto; padding: 0 16px; }
    h1 { font-size: 22px; margin: 0 0 14px; }
    table { width:100%; border-collapse: separate; border-spacing: 0 8px; }
    th { text-align:left; font-weight:600; color:#9fb3c8; }
    td { background: var(--panel); border:1px solid var(--border); padding: 10px 12px; }
    tr:hover td { background: var(--panel-2); }
    .pill { display:inline-block; padding:2px 10px; border-radius:999px; border:1px solid var(--border); color:#cbd5e1; }
    .badge { padding:2px 8px; border-radius:999px; font-size:12px }
    .badge-ok { background: var(--accent-2); color:#fff }
    .badge-muted { background:#071022; color:#9fb3c8; border:1px solid var(--border) }
    .row-actions { display:flex; gap:8px; }
    .row-selected td { outline: 2px solid var(--accent); }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:14px }
    .modal { position: fixed; inset:0; display:none; align-items:center; justify-content:center; background: rgba(3,6,15,.6); z-index: 30; }
    .modal.open { display:flex; }
    .modal .box { width: 620px; max-width: 94vw; background: var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; }
    .modal .footer { text-align:right; margin-top: 10px; }
    label { font-size: 13px; color:#9fb3c8; display:block; margin-bottom:6px }
    input, select { width:100%; background: #0c1423; border:1px solid var(--border); border-radius:10px; color:var(--text); padding:10px 12px; outline:none }
    input:focus, select:focus { border-color: var(--accent-2) }
    .caps { text-transform: uppercase; letter-spacing:.04em; font-size:12px; color:#8da2b6; }
    .totals { display:flex; gap:10px; margin-bottom:8px }
    .totals .pill b { color:#fff; margin-left:6px }
  </style>
</head>
<body>
  <header>
    <div>
      <span class="caps">सुपर एडमिन</span>
      <div class="muted" id="who">लॉगिन: -</div>
    </div>
    <div style="display:flex; gap:8px">
      <button class="btn primary" onclick="openModal('#createModal')">नया फोटोग्राफर बनाएँ</button>
      <button class="btn" onclick="login()">लॉगिन</button>
      <button class="btn danger" onclick="logout()">लॉगआउट करें</button>
    </div>
  </header>

  <div class="wrap">
    <h1>सभी फोटोग्राफर्स</h1>
    <div id="errorBox" class="muted" style="margin:10px 0 6px"></div>
    <table>
      <thead>
        <tr>
          <th>ईमेल</th>
          <th>अकाउंट स्टेटस</th>
          <th>डेटा उपयोग</th>
          <th>एक्शन</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td class="muted" colspan="4">लोड हो रहा है…</td></tr></tbody>
    </table>
  </div>

  <!-- Create Modal -->
  <div id="createModal" class="modal">
    <div class="box">
      <h3>नया फोटोग्राफर</h3>
      <div class="grid2">
        <div>
          <label>ईमेल</label>
          <input id="newEmail" type="email" placeholder="user@example.com"/>
        </div>
        <div>
          <label>Storage Limit (GB) — optional</label>
          <input id="newLimitGb" type="number" min="0" step="1" placeholder="0"/>
        </div>
      </div>
      <div class="footer">
        <button class="btn" onclick="closeModal('#createModal')">बंद</button>
        <button id="btnCreate" class="btn primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="box">
      <h3>फोटोग्राफर अपडेट</h3>
      <div class="grid2">
        <div>
          <label>Account status</label>
          <select id="editStatus">
            <option value="active">Active</option>
            <option value="disabled">Disabled</option>
          </select>
        </div>
        <div>
          <label>Expiry (YYYY-MM-DD)</label>
          <input id="editExpiry" type="text" placeholder="2025-12-31"/>
        </div>
        <div>
          <label>Storage Limit (GB)</label>
          <input id="editLimitGb" type="number" min="0" step="1"/>
        </div>
      </div>
      <div class="footer">
        <button class="btn" onclick="closeModal('#editModal')">बंद</button>
        <button id="btnSave" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Details Modal -->
  <div id="detailsModal" class="modal">
    <div class="box" style="max-width: 1000px;">
      <h3>फोटोग्राफर विवरण</h3>
      <div class="totals">
        <div class="pill">Events: <b id="totEvents">0</b></div>
        <div class="pill">Photos: <b id="totPhotos">0</b></div>
        <div class="pill">Data: <b id="totBytes">0 B</b></div>
      </div>

      <h4 style="margin:8px 0">कलेक्शन</h4>
      <table>
        <thead><tr><th>नाम</th><th>इवेंट्स</th><th>फोटो</th><th>डेटा</th></tr></thead>
        <tbody id="collBody"></tbody>
      </table>

      <h4 style="margin:14px 0 6px">इवेंट्स</h4>
      <table>
        <thead><tr><th>इवेंट</th><th>कलेक्शन</th><th>फोटो</th><th>डेटा</th></tr></thead>
        <tbody id="evtBody"></tbody>
      </table>

      <div class="footer">
        <button class="btn" onclick="closeModal('#detailsModal')">बंद</button>
      </div>
    </div>
  </div>

<script>
/*** --- CONFIG (Filled with your values) --- ***/
const COGNITO_DOMAIN = "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com";
const COGNITO_CLIENT_ID = "6j3gec3kk0q0ktkals8cr8s367";
const REDIRECT_URI = "https://staging.d9fw7yzrfzuja.amplifyapp.com/super-admin.html";
const SCOPES = "openid+email+profile+aws.cognito.signin.user.admin";
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";

/*** --- auth utils --- ***/
function saveAuthFromHash() {
  if (!location.hash) return;
  const hash = new URLSearchParams(location.hash.substring(1));
  const id_token = hash.get('id_token');
  const access_token = hash.get('access_token');
  const expires_in = parseInt(hash.get('expires_in') || '3600', 10);
  if (id_token || access_token) {
    const payload = { id_token, access_token, exp: Date.now() + (expires_in*1000) };
    localStorage.setItem('auth', JSON.stringify(payload));
    history.replaceState({}, document.title, location.pathname + location.search);
  }
}
function getAuth() {
  const raw = localStorage.getItem('auth');
  if (!raw) return null;
  const obj = JSON.parse(raw);
  if (!obj.id_token && !obj.access_token) return null;
  if ((obj.exp||0) < Date.now()) return null;
  return obj;
}
function login() {
  const url = `${COGNITO_DOMAIN}/login?client_id=${encodeURIComponent(COGNITO_CLIENT_ID)}&response_type=token&scope=${SCOPES}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
  location.href = url;
}
function logout() {
  localStorage.removeItem('auth');
  const url = `${COGNITO_DOMAIN}/logout?client_id=${encodeURIComponent(COGNITO_CLIENT_ID)}&logout_uri=${encodeURIComponent(REDIRECT_URI)}`;
  location.href = url;
}

function authHeader() {
  const a = getAuth();
  if (!a) return {};
  // Prefer id_token (contains groups for authorizer)
  const token = a.id_token || a.access_token;
  return { 'Authorization': `Bearer ${token}` };
}

async function api(path, { method='GET', body=null }={}) {
  const headers = { 'Content-Type':'application/json', ...authHeader() };
  const res = await fetch(API_BASE + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
    mode: 'cors',
    cache: 'no-store'
  });
  return res;
}

/*** --- UI helpers --- ***/
function fmtBytes(n=0){
  n = Number(n)||0;
  const u=['B','KB','MB','GB','TB','PB'];
  let i=0; while(n>=1024 && i<u.length-1){ n/=1024; i++; }
  return `${n.toFixed(i?1:0)} ${u[i]}`;
}
function openModal(sel){ document.querySelector(sel).classList.add('open'); }
function closeModal(sel){ document.querySelector(sel).classList.remove('open'); }
function toast(msg){ console.log('INFO:', msg); }

/*** --- Global state --- ***/
let CURRENT_EDIT = null;

/*** --- actions --- ***/
async function loadList(){
  const box = document.getElementById('rows');
  box.innerHTML = `<tr><td class="muted" colspan="4">लोड हो रहा है…</td></tr>`;
  const res = await api('/master/photographers');
  if (!res.ok){
    const t = await res.text();
    box.innerHTML = `<tr><td class="muted" colspan="4">Error: ${res.status} — ${t}</td></tr>`;
    return;
  }
  const data = await res.json();
  if (!Array.isArray(data) || data.length===0){
    box.innerHTML = `<tr><td class="muted" colspan="4">कोई अकाउंट नहीं मिला</td></tr>`;
    return;
  }
  box.innerHTML = '';
  data.forEach(user=>{
    const tr = document.createElement('tr');
    const statusBadge = user.account_status === 'disabled'
      ? `<span class="pill" style="border-color:#3b1116;color:#fecaca;background:#1e0d0f">disabled</span>`
      : `<span class="pill">active${user.expiry_date ? ' — '+user.expiry_date : ''}</span>`;
    const used = `${fmtBytes(user.total_storage_used_bytes||0)} / ${fmtBytes(user.storage_limit_bytes||0)}`;
    tr.innerHTML = `
      <td>${user.email||'-'}</td>
      <td>${statusBadge}</td>
      <td>${used}</td>
      <td>
        <div class="row-actions">
          <button class="btn" onclick='openEdit(${JSON.stringify(user)})'>Edit</button>
          <button class="btn" onclick='openDetails(${JSON.stringify(user)})'>Details</button>
          <button class="btn danger" onclick='delUser(${JSON.stringify(user)})'>Delete</button>
        </div>
      </td>
    `;
    box.appendChild(tr);
  });
}

function openEdit(user){
  CURRENT_EDIT = user;
  document.getElementById('editStatus').value = (user.account_status || 'active');
  document.getElementById('editExpiry').value = (user.expiry_date || '');
  const limitGb = Math.floor((user.storage_limit_bytes||0) / (1024*1024*1024));
  document.getElementById('editLimitGb').value = limitGb;
  openModal('#editModal');
}

document.getElementById('btnSave').addEventListener('click', async ()=>{
  if (!CURRENT_EDIT) return;
  const payload = {
    username: CURRENT_EDIT.username || CURRENT_EDIT.user_id,
    account_status: document.getElementById('editStatus').value,
    expiry_date: document.getElementById('editExpiry').value.trim(),
    storage_limit_gb: parseInt(document.getElementById('editLimitGb').value||'0',10)
  };
  const btn = document.getElementById('btnSave'); const orig = btn.textContent; btn.disabled = true; btn.textContent = 'Saving...';
  try{
    const r = await api(`/master/photographer/${CURRENT_EDIT.user_id}`, { method:'POST', body: payload });
    if(!r.ok){ alert('Update failed'); return; }
    closeModal('#editModal'); await loadList(); toast('Updated');
  } finally { btn.disabled=false; btn.textContent = orig; }
});

async function delUser(user){
  if(!confirm(`Delete ${user.email}?`)) return;
  const r = await api(`/master/photographer/${user.user_id}`, { method:'DELETE', body: { username: user.username||user.user_id }});
  if(!r.ok){ alert('Delete failed'); return; }
  await loadList(); toast('Deleted');
}

async function openDetails(user){
  const r = await api(`/master/photographer/${user.user_id}/details`);
  if(!r.ok){ alert('Failed to load details'); return; }
  const data = await r.json();

  const cBody = document.getElementById('collBody');
  const eBody = document.getElementById('evtBody');
  cBody.innerHTML = ''; eBody.innerHTML = '';

  let totalEvents=0, totalPhotos=0, totalBytes=0;

  data.collections.forEach(c=>{
    totalEvents += c.events_count||0;
    totalPhotos += c.photos_count||0;
    totalBytes  += c.used_bytes||0;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${c.name||'-'}</td>
      <td><span class="pill">${c.events_count||0}</span></td>
      <td><span class="pill">${c.photos_count||0}</span></td>
      <td><span class="badge badge-ok">${fmtBytes(c.used_bytes||0)}</span></td>
    `;
    tr.onclick = ()=> {
      document.querySelectorAll('#collBody tr').forEach(x=>x.classList.remove('row-selected'));
      tr.classList.add('row-selected');
      renderEvents(data.events.filter(e=>e.collection_id===c.collection_id));
    };
    cBody.appendChild(tr);
  });

  function renderEvents(events){
    eBody.innerHTML = '';
    events.forEach(e=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.name||'-'}</td>
        <td>${e.collection_name||'-'}</td>
        <td><span class="pill">${e.photos_count||0}</span></td>
        <td><span class="badge badge-muted">${fmtBytes(e.used_bytes||0)}</span></td>
      `;
      eBody.appendChild(tr);
    });
  }
  renderEvents(data.events||[]);

  document.getElementById('totEvents').textContent = totalEvents;
  document.getElementById('totPhotos').textContent = totalPhotos;
  document.getElementById('totBytes').textContent  = fmtBytes(totalBytes);

  openModal('#detailsModal');
}

/*** create flow — modal auto-close + double-click prevention ***/
document.getElementById('btnCreate').addEventListener('click', async ()=>{
  const btn = document.getElementById('btnCreate');
  if(btn.disabled) return; btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Creating...';
  const email = document.getElementById('newEmail').value.trim().toLowerCase();
  const limitGb = parseInt(document.getElementById('newLimitGb').value || '0', 10);
  try{
    const r = await api('/master/photographer', { method:'POST', body:{ email }});
    if(!r.ok){ const t = await r.text(); alert('Create failed: '+t); return; }
    // storage limit (optional)
    if (limitGb>0) {
      const created = await r.json(); // has user_id & username
      await api(`/master/photographer/${created.user_id}`, { method:'POST', body:{ username: created.username, storage_limit_gb: limitGb }});
    }
    closeModal('#createModal');
    document.getElementById('newEmail').value=''; document.getElementById('newLimitGb').value='';
    await loadList(); toast('Photographer created');
  } finally { btn.disabled=false; btn.textContent = orig; }
});

/*** bootstrap ***/
saveAuthFromHash();
const auth = getAuth();
document.getElementById('who').textContent = 'लॉगिन: ' + (auth ? '-' : '-');
if (!auth) {
  document.getElementById('errorBox').textContent = 'Login required. ऊपर “लॉगिन” पर क्लिक करें.';
} else {
  // Try to show email from token (best-effort)
  try {
    const parts = (auth.id_token||auth.access_token).split('.');
    const payload = JSON.parse(atob(parts[1].replaceAll('-', '+').replaceAll('_','/')));
    document.getElementById('who').textContent = 'लॉगिन: ' + (payload.email || '-');
  } catch {}
  loadList();
}
</script>
</body>
</html>
