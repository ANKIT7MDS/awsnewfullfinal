<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Manager Pro – FINAL FULL</title>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<style>
/* ===== THEME ===== */
:root{
 --bg:#0b0b0b;--card:#181818;--border:#2a2a2a;
 --text:#e0e0e0;--muted:#888;
 --brand:#4285f4;--ok:#00c851;--danger:#ff4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
.wrap{max-width:1400px;margin:auto;padding:20px}
.hidden{display:none}

/* HEADER */
.top-bar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:15px}
.stats{font-size:13px;color:var(--muted);display:flex;gap:15px}

/* TABS */
.tabs{display:flex;gap:10px;border-bottom:1px solid var(--border);margin:20px 0}
.tab{padding:10px 18px;cursor:pointer;color:var(--muted)}
.tab.active{color:#fff;border-bottom:2px solid var(--brand)}
.tab-content{display:none}
.tab-content.active{display:block}

/* FACE BAR */
#faceIconsBar{display:flex;gap:14px;overflow-x:auto;padding:10px 0}
.face-icon-wrap{width:60px;text-align:center;cursor:pointer;position:relative}
.face-icon-wrap img{
 width:56px;height:56px;border-radius:50%;
 border:2px solid var(--brand);object-fit:cover
}
.face-icon-wrap.selected img{
 border-color:var(--ok);
 box-shadow:0 0 0 3px rgba(0,200,81,.3)
}
.face-name{font-size:11px;color:#aaa;display:block;margin-top:4px}
.face-badge{
 position:absolute;top:0;right:0;
 background:var(--brand);font-size:9px;
 padding:2px 5px;border-radius:10px
}

/* NAMING */
#faceNamingHeader{
 display:none;gap:10px;align-items:center;
 margin:15px 0;border:1px solid var(--brand);
 padding:10px;border-radius:8px
}
#faceNamingHeader img{
 width:50px;height:50px;border-radius:50%;
 border:2px solid var(--brand)
}
input{
 height:36px;background:#111;border:1px solid #333;
 color:#fff;border-radius:6px;padding:0 10px
}

/* BUTTON */
button{
 height:36px;border:none;border-radius:6px;
 padding:0 15px;font-weight:600;cursor:pointer
}
.btn{background:var(--brand);color:#fff}
.btn.secondary{background:#222;color:#ccc}

/* GALLERY */
.gallery-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
 gap:8px
}
.photo-card{
 background:#111;border-radius:6px;
 overflow:hidden;cursor:pointer
}
.photo-card img{
 width:100%;height:100%;object-fit:cover
}

/* VIEWER */
.viewer{
 position:fixed;inset:0;background:rgba(0,0,0,.9);
 display:none;align-items:center;justify-content:center
}
.viewer img{max-width:95%;max-height:95%}
</style>
</head>

<body>
<div class="wrap">

<!-- HEADER -->
<div class="top-bar">
 <div>
  <h1 id="collectionName">Collection</h1>
  <div class="stats">
   <span>📷 <b id="totalPhotos">0</b></span>
   <span>👥 <b id="totalLeads">0</b></span>
  </div>
 </div>
 <button class="btn secondary" onclick="location.reload()">Refresh</button>
</div>

<!-- TABS -->
<div class="tabs">
 <div class="tab active" onclick="switchTab('galleryTab')">Photos</div>
 <div class="tab" onclick="switchTab('uploadTab')">Upload</div>
 <div class="tab" onclick="switchTab('analyticsTab')">Guests</div>
</div>

<!-- GALLERY TAB -->
<div id="galleryTab" class="tab-content active">

<div id="faceIconsBar"></div>

<div id="faceNamingHeader">
 <img id="faceHeaderImg">
 <input id="faceNameInput" placeholder="Enter name">
 <button class="btn" id="saveFaceBtn">Save</button>
 <button class="btn secondary" onclick="cancelFaceNaming()">Cancel</button>
</div>

<div id="galleryContainer" class="gallery-grid"></div>

</div>

<!-- UPLOAD TAB -->
<div id="uploadTab" class="tab-content">
 <p>Upload section (unchanged backend)</p>
</div>

<!-- ANALYTICS TAB -->
<div id="analyticsTab" class="tab-content">
 <p>Guest analytics (unchanged backend)</p>
</div>

<div class="viewer" id="viewer" onclick="this.style.display='none'">
 <img id="viewerImg">
</div>
<script>
/* ===== CONFIG ===== */
const API_BASE="https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const qs=new URLSearchParams(location.search);
const collectionId=qs.get("id");
const token=localStorage.getItem("idToken");

/* ===== API CALL ===== */
async function apiCall(endpoint,body={},method="POST"){
 let url=API_BASE+"/"+endpoint;
 let opt={method,headers:{}};

 if(endpoint==="get-photos"){
  url+="?"+new URLSearchParams(body);
  opt.method="GET";
 }
 else if(endpoint==="list_people"){
  opt.headers["Content-Type"]="application/json";
  opt.body=JSON.stringify(body);
 }
 else{
  opt.headers={
   "Authorization":"Bearer "+token,
   "Content-Type":"application/json"
  };
  opt.body=JSON.stringify(body);
 }
 const r=await fetch(url,opt);
 return r.ok?await r.json():null;
}

/* ===== STATE ===== */
let allPhotos=[],filteredPhotos=[];
let faceGroups={},selectedFace=null;

/* ===== INIT ===== */
init();
async function init(){
 const [photosRes,peopleRes]=await Promise.all([
  apiCall("get-photos",{collection_id:collectionId,limit:500}),
  apiCall("list_people",{collection_id:collectionId})
 ]);

 allPhotos=photosRes?.photos||[];
 filteredPhotos=[...allPhotos];
 buildFaceMap(peopleRes?.people||[]);
 renderFaceIcons();
 renderGallery(filteredPhotos);

 document.getElementById("totalPhotos").textContent=allPhotos.length;
}

/* ===== FACE MAP ===== */
function buildFaceMap(directory){
 faceGroups={};

 directory.forEach(p=>{
  faceGroups[p.FaceId]={
   id:p.FaceId,
   name:p.FaceName||"Unknown",
   photos:[],
   thumb:null
  };
 });

 allPhotos.forEach(p=>{
  const ids=p.face_ids ||
   (p.faces?p.faces.map(f=>f.FaceId):[]);
  if(Array.isArray(ids)){
   ids.forEach(fid=>{
    if(!faceGroups[fid]){
     faceGroups[fid]={id:fid,name:"Unknown",photos:[],thumb:null};
    }
    faceGroups[fid].photos.push(p);
    if(!faceGroups[fid].thumb) faceGroups[fid].thumb=p.url;
   });
  }
 });
}

/* ===== RENDER ===== */
function renderFaceIcons(){
 const bar=document.getElementById("faceIconsBar");
 const list=Object.values(faceGroups).filter(g=>g.photos.length>0);

 if(!list.length){
  bar.innerHTML="<span style='color:#666'>No faces</span>";
  return;
 }

 bar.innerHTML=list.map(g=>`
  <div class="face-icon-wrap" id="face-${g.id}" onclick="selectFace('${g.id}')">
   <img src="${g.thumb}">
   <span class="face-name">${g.name}</span>
   <span class="face-badge">${g.photos.length}</span>
  </div>
 `).join("");
}

function renderGallery(list){
 const g=document.getElementById("galleryContainer");
 g.innerHTML=list.map(p=>`
  <div class="photo-card" onclick="viewPhoto('${p.url}')">
   <img src="${p.url}">
  </div>
 `).join("");
}

/* ===== ACTIONS ===== */
function selectFace(fid){
 selectedFace=fid;
 document.querySelectorAll(".face-icon-wrap").forEach(e=>e.classList.remove("selected"));
 document.getElementById("face-"+fid).classList.add("selected");

 const g=faceGroups[fid];
 document.getElementById("faceNamingHeader").style.display="flex";
 document.getElementById("faceHeaderImg").src=g.thumb;
 document.getElementById("faceNameInput").value=g.name==="Unknown"?"":g.name;

 renderGallery(g.photos);
}

function cancelFaceNaming(){
 selectedFace=null;
 document.getElementById("faceNamingHeader").style.display="none";
 renderGallery(allPhotos);
}

document.getElementById("saveFaceBtn").onclick=async()=>{
 if(!selectedFace) return;
 const name=document.getElementById("faceNameInput").value.trim();
 if(!name) return;

 await apiCall("save-face-name",{
  FaceId:selectedFace,
  FaceName:name,
  CollectionId:collectionId
 });

 faceGroups[selectedFace].name=name;
 renderFaceIcons();
 cancelFaceNaming();
};

function viewPhoto(url){
 document.getElementById("viewerImg").src=url;
 document.getElementById("viewer").style.display="flex";
}

function switchTab(id){
 document.querySelectorAll(".tab,.tab-content").forEach(e=>e.classList.remove("active"));
 document.querySelector(`[onclick="switchTab('${id}')"]`).classList.add("active");
 document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
