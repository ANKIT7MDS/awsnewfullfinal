<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection Manager • Premium (Full Version)</title>

  <!-- libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* =========================================================
      THEME (PREMIUM GLASS-MORPHISM)
    ========================================================= */
    :root{
      --bg-primary:#0a0a0f;
      --bg-secondary:#12121a;
      --bg-card:linear-gradient(145deg,#1a1a25,#232331);
      --border:rgba(255,255,255,.08);
      --border-light:rgba(255,255,255,.12);
      --text-primary:#f8fafc;
      --text-secondary:#94a3b8;
      --text-muted:#64748b;
      --brand:#6366f1;
      --brand-gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
      --brand-hover:#4f46e5;
      --success:#10b981;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 10px 25px rgba(0,0,0,.35);
      --shadow-card:0 8px 30px rgba(0,0,0,.4);
      --radius-sm:8px;
      --radius-md:12px;
      --radius-lg:16px;
      --transition:all .25s cubic-bezier(.4,0,.2,1);
      --glass:rgba(20,20,30,.7);
      --glass-border:rgba(255,255,255,.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg-primary);
      color:var(--text-primary);
      min-height:100vh;
      overflow-x:hidden;
    }
    body::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(circle at 15% 50%, rgba(99,102,241,.1) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(139,92,246,.08) 0%, transparent 50%);
      z-index:-1;pointer-events:none;
    }
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-track{background:var(--bg-secondary);border-radius:4px}
    ::-webkit-scrollbar-thumb{background:var(--brand);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--brand-hover)}

    .wrap{max-width:1600px;margin:0 auto;padding:24px}

    /* =========================================================
      HEADER
    ========================================================= */
    .top-bar{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:18px;padding:18px 22px;
      background:var(--glass);
      backdrop-filter:blur(10px);
      border:1px solid var(--glass-border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      position:relative;overflow:hidden;
    }
    .top-bar::before{content:'';position:absolute;left:0;top:0;height:100%;width:6px;background:var(--brand-gradient)}
    .header-left h1{
      font-size:26px;font-weight:800;margin:10px 0 6px;
      display:flex;align-items:center;gap:10px;
      background:linear-gradient(90deg,#f8fafc,#94a3b8);
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    }
    .header-left h1 i{color:var(--brand);-webkit-text-fill-color:initial}
    .stats-line{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--text-secondary)}
    .stat-item{
      display:flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:var(--radius-sm);
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)
    }
    .stat-item i{color:var(--brand);font-size:12px}
    .stat-value{color:var(--text-primary);font-weight:700}

    .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .back-link{
      display:inline-flex;align-items:center;gap:8px;
      color:var(--text-secondary);text-decoration:none;font-size:13px;font-weight:600;
      padding:8px 14px;border-radius:var(--radius-sm);
      transition:var(--transition);
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
    }
    .back-link:hover{color:var(--brand);background:rgba(99,102,241,.1);transform:translateX(-2px)}

    /* =========================================================
      TABS
    ========================================================= */
    .tabs-container{margin-bottom:18px}
    .tabs{
      display:flex;gap:4px;background:var(--bg-secondary);
      border-radius:var(--radius-lg);padding:6px;
      box-shadow:0 5px 15px rgba(0,0,0,.2);
      overflow-x:auto;
    }
    .tab{
      flex:1;min-width:140px;
      padding:14px 18px;text-align:center;cursor:pointer;
      color:var(--text-secondary);font-size:14px;font-weight:700;
      border-radius:var(--radius-md);transition:var(--transition);
      display:flex;align-items:center;justify-content:center;gap:10px;
      white-space:nowrap;
    }
    .tab:hover{color:var(--text-primary);background:rgba(255,255,255,.05)}
    .tab.active{color:#fff;background:var(--brand-gradient);box-shadow:0 4px 12px rgba(99,102,241,.3)}
    .tab-content{display:none;animation:fadeIn .35s ease}
    .tab-content.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* =========================================================
      CARDS & BUTTONS
    ========================================================= */
    .card{
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:22px;margin-bottom:18px;
      box-shadow:var(--shadow-card);
      transition:var(--transition);
      position:relative;overflow:hidden;
    }
    .card:hover{border-color:var(--border-light);transform:translateY(-3px)}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
    .card-title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
    .card-title i{color:var(--brand)}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:10px 16px;font-size:13px;font-weight:800;
      border-radius:var(--radius-md);border:none;cursor:pointer;
      transition:var(--transition);text-decoration:none;user-select:none;
      position:relative;overflow:hidden;
    }
    .btn-primary{background:var(--brand-gradient);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,.4)}
    .btn-secondary{background:rgba(255,255,255,.06);color:var(--text-primary);border:1px solid var(--border)}
    .btn-secondary:hover{background:rgba(255,255,255,.10);border-color:var(--border-light);transform:translateY(-2px)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-success{background:var(--success);color:#fff}
    .btn-sm{padding:7px 12px;font-size:12px;border-radius:10px}

    /* =========================================================
      FILTERS
    ========================================================= */
    .filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    .filter-group{display:flex;gap:10px;flex-wrap:wrap;flex:1}
    .filter-input,.filter-select{
      flex:1;min-width:180px;
      padding:10px 12px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      color:var(--text-primary);
      font-size:13px;
      transition:var(--transition);
    }
    .filter-input:focus,.filter-select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.2)}
    .filter-input::placeholder{color:var(--text-muted)}
    .filter-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}

    /* =========================================================
      GALLERY GRID
    ========================================================= */
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
      gap:10px;
    }
    @media (max-width: 768px){
      .gallery-grid{grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));gap:8px;}
    }
    .photo-card{
      aspect-ratio:1/1;
      background:var(--bg-secondary);
      border-radius:12px;
      overflow:hidden;
      position:relative;
      cursor:pointer;
      transition:var(--transition);
      border:1px solid var(--border);
    }
    .photo-card:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.6)}
    .photo-card img{width:100%;height:100%;object-fit:cover;display:block}
    .photo-badges{
      position:absolute;left:10px;top:10px;display:flex;gap:8px;z-index:2;
    }
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 8px;border-radius:999px;
      font-size:11px;font-weight:800;color:#fff;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.14);
    }
    .badge i{font-size:11px}
    .photo-overlay{
      position:absolute;left:0;right:0;bottom:0;
      padding:10px;
      background:linear-gradient(to top, rgba(0,0,0,.72), transparent);
      transform:translateY(100%);
      transition:var(--transition);
      color:#fff;
      font-size:11px;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .photo-card:hover .photo-overlay{transform:translateY(0)}

    /* =========================================================
      PEOPLE BAR
    ========================================================= */
    #faceIconsBar{
      display:flex;
      gap:14px;
      padding:8px 2px 16px;
      margin-bottom:12px;
      overflow-x:auto;
      scrollbar-width:thin;
    }
    .face-item{display:flex;flex-direction:column;align-items:center;min-width:86px;cursor:pointer;transition:var(--transition)}
    .face-icon-wrapper{
      width:66px;height:66px;border-radius:50%;
      overflow:hidden;border:3px solid transparent;
      background:rgba(255,255,255,.06);
      transition:var(--transition);
      position:relative;
      box-shadow:0 10px 18px rgba(0,0,0,.25);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }
    .face-icon-wrapper:hover{transform:scale(1.08);border-color:rgba(99,102,241,.85)}
    .face-icon-wrapper.selected{border-color:var(--success);transform:scale(1.08);box-shadow:0 0 20px rgba(16,185,129,.35)}
    .face-name-label{
      margin-top:8px;
      font-size:12px;font-weight:800;color:var(--text-secondary);
      max-width:86px;text-align:center;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .face-count{
      font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:700;
    }

    /* =========================================================
      GUEST LEADS (GROUPED DESIGN)
    ========================================================= */
    .lead-grid{display:grid;grid-template-columns:1fr;gap:14px}
    .lead-group-card{
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      overflow:hidden;
      transition:var(--transition);
    }
    .lead-header{
      padding:18px;
      display:flex;gap:16px;align-items:center;
      cursor:pointer;
      user-select:none;
    }
    .lead-header:hover{background:rgba(255,255,255,.03)}
    
    .group-selfie{
      width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid var(--brand);
    }
    
    .lead-info{flex:1}
    .lead-name{font-weight:900;font-size:17px;color:var(--text-primary)}
    .lead-mobile{color:var(--brand);font-weight:800;font-size:14px;margin-top:2px}
    
    .lead-badge{
      background:rgba(99,102,241,.15);
      color:var(--brand);
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }
    
    .chevron{
      color:var(--text-muted);
      transition:transform 0.3s;
    }
    .open .chevron{transform:rotate(180deg)}

    .lead-history{
      max-height:0;
      overflow:hidden;
      transition:max-height 0.4s ease-out;
      background:rgba(0,0,0,.2);
    }
    .open .lead-history{max-height:1000px}
    
    .history-item{
      padding:14px 18px;
      border-top:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .history-selfie{
        width: 44px;
        height: 44px;
        border-radius: 8px;
        object-fit: cover;
        background: #222;
    }
    .history-meta{flex:1;font-size:13px;color:var(--text-secondary)}
    .history-matches{font-weight:900;color:var(--success);font-size:14px}

    /* =========================
      OTHERS (EVENTS, UPLOAD)
    ========================= */
    table{width:100%;border-collapse:collapse}
    th{padding:14px;text-align:left;color:var(--text-secondary);font-size:13px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
    td{padding:14px;border-bottom:1px solid var(--border)}
    tr:hover{background:rgba(255,255,255,.03)}

    #dropZone{
      border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px 24px;text-align:center;background:rgba(255,255,255,.02);transition:var(--transition);cursor:pointer;
    }
    #dropZone:hover,#dropZone.dragover{border-color:var(--brand);background:rgba(99,102,241,.05);transform:translateY(-2px)}
    #dropZone i{font-size:42px;color:var(--brand);margin-bottom:12px;display:block}
    .progress-container{margin-top:14px;background:rgba(255,255,255,.05);border-radius:var(--radius-md);overflow:hidden;height:10px}
    #progress-bar{height:100%;background:var(--brand-gradient);width:0%;transition:width .2s ease}

    .upload-log{
      margin-top:14px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius-md);
      padding:12px;
      max-height:180px;
      overflow:auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:12px;
      color:#e2e8f0;
      white-space:pre-wrap;
    }

    /* =========================================================
      MODALS
    ========================================================= */
    .modal{
      display:none;
      position:fixed;inset:0;
      background:rgba(0,0,0,.88);
      z-index:1100;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
    }
    .modal.active{display:flex}
    .modal-content{
      background:var(--bg-card);
      border-radius:var(--radius-lg);
      padding:24px;
      width:min(900px, 92vw);
      max-height:92vh;
      overflow:auto;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      position:relative;
    }
    .modal-close{
      position:absolute;top:14px;right:14px;
      background:none;border:none;color:var(--text-secondary);
      font-size:22px;cursor:pointer;
      transition:var(--transition);
    }
    .modal-close:hover{color:var(--danger);transform:rotate(90deg)}
  </style>
</head>

<body>
<div class="wrap">
  <!-- HEADER -->
  <div class="top-bar glass">
    <div class="header-left">
      <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
      <h1><i class="fas fa-images"></i> <span id="collectionName">Loading...</span></h1>
      <div class="stats-line">
        <div class="stat-item"><i class="fas fa-calendar-alt"></i> <span id="totalEvents" class="stat-value">0</span> Events</div>
        <div class="stat-item"><i class="fas fa-camera"></i> <span id="totalPhotos" class="stat-value">0</span> Photos</div>
        <div class="stat-item"><i class="fas fa-users"></i> <span id="totalLeads" class="stat-value">0</span> Guests</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
      <a href="#" id="assistantLink" target="_blank" class="btn btn-primary"><i class="fas fa-bolt"></i> Staff Upload Link</a>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-container">
    <div class="tabs">
      <div class="tab active" data-tab="galleryTab"><i class="fas fa-images"></i> Photos</div>
      <div class="tab" data-tab="eventsTab"><i class="fas fa-calendar-alt"></i> Events</div>
      <div class="tab" data-tab="uploadTab"><i class="fas fa-cloud-upload-alt"></i> Upload</div>
      <div class="tab" data-tab="linksTab"><i class="fas fa-link"></i> Links</div>
      <div class="tab" data-tab="analyticsTab"><i class="fas fa-users"></i> Guests</div>
    </div>
  </div>

  <!-- PHOTOS TAB -->
  <div id="galleryTab" class="tab-content active">
    <div class="card">
      <div class="filter-row">
        <div class="filter-group">
          <select id="filterType" class="filter-select">
            <option value="ALL">All Photos</option>
            <option value="BEST">⭐ Best Shots</option>
            <option value="HAPPY">😊 Happy</option>
            <option value="GROUP">👥 Groups</option>
          </select>
          <input type="text" id="aiTagSearch" class="filter-input" placeholder="Search AI tags (e.g., Wedding, Stage)..." />
        </div>
        <div class="filter-actions">
          <button class="btn btn-secondary" id="clearFiltersBtn"><i class="fas fa-times"></i> Clear</button>
          <button class="btn btn-primary" id="downloadZipBtn"><i class="fas fa-download"></i> Download Zip</button>
        </div>
      </div>
      <div id="faceIconsBar"></div>
      <div id="galleryContainer"></div>
    </div>
  </div>

  <!-- EVENTS TAB -->
  <div id="eventsTab" class="tab-content">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title"><i class="fas fa-calendar-alt"></i> Events</h3>
        <button class="btn btn-primary" id="newEvtBtn"><i class="fas fa-plus"></i> New Event</button>
      </div>
      <div id="eventForm" style="display:none;margin-bottom:16px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
          <input type="text" id="eventName" placeholder="Event Name">
          <input type="date" id="eventDate">
        </div>
        <button class="btn btn-primary" id="saveEventBtn">Save Event</button>
      </div>
      <table id="eventsTable">
        <thead><tr><th>Name</th><th>Date</th><th>Photos</th><th>Actions</th></tr></thead>
        <tbody id="eventsTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- UPLOAD TAB -->
  <div id="uploadTab" class="tab-content">
    <div class="card">
      <div class="card-header"><h3 class="card-title"><i class="fas fa-cloud-upload-alt"></i> Upload Photos</h3></div>
      <select id="uploadEventSelect" class="filter-select" style="margin-bottom:15px; width:100%"><option value="">Select Event</option></select>
      <div id="dropZone"><i class="fas fa-cloud-upload-alt"></i> Drop photos here or click to browse</div>
      <input type="file" id="fileInput" multiple style="display:none">
      <div id="uploadControls" style="display:none; margin-top:15px">
        <button class="btn btn-primary" id="startUploadBtn">Start Upload</button>
      </div>
      <div class="progress-container"><div id="progress-bar"></div></div>
      <div class="upload-log" id="uploadLog"></div>
    </div>
  </div>

  <!-- LINKS TAB -->
  <div id="linksTab" class="tab-content">
    <div class="card">
      <div class="card-header"><h3 class="card-title"><i class="fas fa-link"></i> Guest Links</h3></div>
      <div id="linkEventList" style="margin-bottom:15px"></div>
      <button class="btn btn-primary" id="genLinkBtn">Generate Search Link</button>
      <div id="linkResult" style="display:none; margin-top:15px">
        <a id="generatedLink" href="#" target="_blank" style="color:var(--brand); word-break:break-all"></a>
      </div>
    </div>
  </div>

  <!-- GUEST LEADS TAB (GROUPED) -->
  <div id="analyticsTab" class="tab-content">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title"><i class="fas fa-users"></i> Guest Leads</h3>
        <button class="btn btn-secondary" id="reloadLeadsBtn"><i class="fas fa-sync-alt"></i> Reload</button>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <input type="date" id="dateFilter" class="filter-input">
          <input type="tel" id="mobileFilter" class="filter-input" placeholder="Search Mobile">
        </div>
      </div>
      <div id="leadsGrid" class="lead-grid"></div>
      <div id="noLeadsMessage" class="empty-state" style="display:none;">
        <i class="fas fa-users-slash"></i>
        <h3>No leads found</h3>
      </div>
    </div>
  </div>

</div>

<!-- PHOTO MODAL -->
<div class="modal" id="photoDetailsModal">
    <div class="modal-content">
        <button class="modal-close" id="closePhotoDetailsBtn">✕</button>
        <img id="detailPhotoImg" src="" style="width:100%; border-radius:12px">
        <div id="detailPeople" class="tags-container" style="margin-top:15px"></div>
        <div id="detailTags" class="tags-container"></div>
    </div>
</div>

<script>
/* =========================================================
  API CONFIG
========================================================= */
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const idToken = localStorage.getItem("idToken");
const urlParams = new URLSearchParams(window.location.search);
const collectionId = urlParams.get("id");

const GET_EVENTS_API = `${API_BASE}/get-events`;
const GET_PHOTOS_API = `${API_BASE}/get-photos`;
const UPSERT_EVENT_API = `${API_BASE}/upsert-event`;
const DELETE_EVENT_API = `${API_BASE}/delete-event`;
const UPLOAD_URLS_API = `${API_BASE}/generate-upload-urls`;
const GENERATE_LINK_API = `${API_BASE}/generate-search-link`;
const LIST_PEOPLE_API = `${API_BASE}/list_people`;
const SAVE_DETAILS_API = `${API_BASE}/save-details`;

const $ = (id) => document.getElementById(id);

let allPhotos = [], allEvents = [], allLeads = [], faceGroups = [], selectedFiles = [];
let currentSelectedFaceId = null;

/* =========================================================
  INIT
========================================================= */
document.addEventListener("DOMContentLoaded", async ()=>{
  if(!collectionId) return window.location.href="dashboard.html";
  $("collectionName").textContent = urlParams.get("name") || "Collection";
  setupEventListeners();
  await initLoad();
});

async function initLoad(){
  await Promise.all([loadEvents(), loadPhotos()]);
  await loadFaceGroups();
  await loadLeads();
}

/* =========================================================
  LEADS LOGIC (GROUPING & SELFIE FIX)
========================================================= */
async function loadLeads(){
  try {
    const res = await fetch(SAVE_DETAILS_API, {
      method:"POST",
      headers:{ "Authorization": `Bearer ${idToken}`, "Content-Type":"application/json" },
      body: JSON.stringify({ collection_id: collectionId, action:"list" })
    });
    const data = await res.json();
    const items = data.items || data.leads || [];

    const dateFilter = $("dateFilter").value;
    const mobileFilter = $("mobileFilter").value.trim();
    
    allLeads = items.filter(l => {
        const matchesDate = !dateFilter || (l.created_at || l.timestamp || "").includes(dateFilter);
        const matchesMobile = !mobileFilter || (l.mobile || l.phone || "").includes(mobileFilter);
        return matchesDate && matchesMobile;
    });

    $("totalLeads").textContent = allLeads.length;
    renderLeads();
  } catch(e) { console.error("Load Leads Error:", e); }
}

function renderLeads(){
  const grid = $("leadsGrid");
  const empty = $("noLeadsMessage");
  grid.innerHTML = "";

  if(!allLeads.length){
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  // GROUPING LOGIC
  const grouped = allLeads.reduce((acc, lead) => {
    const phone = lead.mobile || lead.phone || "Unknown";
    if (!acc[phone]) acc[phone] = { name: lead.name || "Guest", entries: [] };
    acc[phone].entries.push(lead);
    return acc;
  }, {});

  Object.keys(grouped).forEach(phone => {
    const group = grouped[phone];
    const latestEntry = group.entries[0];
    
    // Selfie helper
    const getSelfie = (item) => {
        if(item.selfie_b64) return item.selfie_b64.startsWith('data:') ? item.selfie_b64 : `data:image/jpeg;base64,${item.selfie_b64}`;
        if(item.selfie_image) return item.selfie_image;
        return "https://via.placeholder.com/70?text=NA";
    };

    const groupCard = document.createElement("div");
    groupCard.className = "lead-group-card";
    
    groupCard.innerHTML = `
      <div class="lead-header" onclick="this.parentElement.classList.toggle('open')">
        <img src="${getSelfie(latestEntry)}" class="group-selfie" onerror="this.src='https://via.placeholder.com/70?text=NA'">
        <div class="lead-info">
          <div class="lead-name">${group.name}</div>
          <div class="lead-mobile">${phone}</div>
        </div>
        <div class="lead-badge">${group.entries.length} Sessions</div>
        <i class="fas fa-chevron-down chevron"></i>
      </div>
      <div class="lead-history">
        ${group.entries.map(entry => `
            <div class="history-item">
              <img src="${getSelfie(entry)}" class="history-selfie" onerror="this.src='https://via.placeholder.com/50?text=NA'">
              <div class="history-meta">
                <div><b>Time:</b> ${new Date(entry.timestamp || entry.created_at).toLocaleString()}</div>
                <div class="history-matches">${entry.match_count || entry.photo_count || 0} Matches</div>
              </div>
              <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); window.open('${getSelfie(entry)}', '_blank')">Full Image</button>
            </div>
          `).join('')}
      </div>
    `;
    grid.appendChild(groupCard);
  });
}

/* =========================================================
  PHOTOS & GALLERY
========================================================= */
async function loadPhotos(){
  const res = await fetch(GET_PHOTOS_API, { 
    method:"POST", 
    headers:{ "Authorization": `Bearer ${idToken}`, "Content-Type":"application/json" }, 
    body: JSON.stringify({ collection_id: collectionId }) 
  });
  const data = await res.json();
  allPhotos = data.photos || [];
  $("totalPhotos").textContent = allPhotos.length;
  renderPhotos();
}

function renderPhotos(){
    const container = $("galleryContainer");
    const aiSearch = $("aiTagSearch").value.toLowerCase().trim();
    
    filteredPhotos = allPhotos.filter(p => {
        const matchesFace = !currentSelectedFaceId || (p.face_ids && p.face_ids.includes(currentSelectedFaceId));
        const tags = (p.ai_tags || []).join(' ').toLowerCase();
        const matchesAi = !aiSearch || tags.includes(aiSearch);
        return matchesFace && matchesAi;
    });

    container.innerHTML = `<div class="gallery-grid">` + filteredPhotos.map(p => `
        <div class="photo-card" onclick="showPhotoDetails(${JSON.stringify(p).replace(/"/g, '&quot;')})">
            <img src="${p.thumbnail_url || p.url}" loading="lazy">
        </div>
    `).join('') + `</div>`;
}

function showPhotoDetails(p){
    $("detailPhotoImg").src = p.url;
    $("detailTags").innerHTML = (p.ai_tags || []).map(t => `<span class="tag ai">${t}</span>`).join('');
    $("photoDetailsModal").classList.add("active");
}

/* =========================================================
  EVENTS
========================================================= */
async function loadEvents(){
  const res = await fetch(GET_EVENTS_API, { 
    method:"POST", 
    headers:{ "Authorization": `Bearer ${idToken}`, "Content-Type":"application/json" }, 
    body: JSON.stringify({ collection_id: collectionId }) 
  });
  const data = await res.json();
  allEvents = data.events || [];
  $("totalEvents").textContent = allEvents.length;
  
  $("eventsTbody").innerHTML = allEvents.map(evt => `
    <tr>
        <td>${evt.name}</td>
        <td>${evt.event_date}</td>
        <td>${evt.photo_count}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteEvent('${evt.event_id}')">Delete</button></td>
    </tr>
  `).join('');
  
  $("uploadEventSelect").innerHTML = `<option value="">Select Event</option>` + allEvents.map(e=>`<option value="${e.event_id}">${e.name}</option>`).join('');
  $("linkEventList").innerHTML = allEvents.map(e=>`<div style="margin:5px 0"><input type="checkbox" class="linkEvt" value="${e.event_id}"> ${e.name}</div>`).join('');
}

/* =========================================================
  UPLOAD LOGIC (COMPLETE)
========================================================= */
function setupUpload(){
    const dz = $("dropZone");
    const input = $("fileInput");
    dz.onclick = () => input.click();
    input.onchange = (e) => {
        selectedFiles = Array.from(e.target.files);
        $("uploadControls").style.display = selectedFiles.length ? "block" : "none";
        $("uploadLog").textContent = `Selected ${selectedFiles.length} files.`;
    };
}

async function startUpload(){
    const evtId = $("uploadEventSelect").value;
    if(!evtId) return alert("Select an event");
    
    const btn = $("startUploadBtn");
    btn.disabled = true;
    
    try {
        const filesPayload = selectedFiles.map(f => ({ name: f.name, type: f.type }));
        const res = await fetch(UPLOAD_URLS_API, {
            method: "POST",
            headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json" },
            body: JSON.stringify({ collection_id: collectionId, event_id: evtId, files: filesPayload })
        });
        const { urls } = await res.json();
        
        for(let i=0; i<selectedFiles.length; i++){
            const file = selectedFiles[i];
            const uploadUrl = urls[i].uploadURL;
            $("uploadLog").textContent += `\nUploading ${file.name}...`;
            await fetch(uploadUrl, { method: "PUT", body: file, headers: { "Content-Type": file.type } });
            $("progress-bar").style.width = `${((i+1)/selectedFiles.length)*100}%`;
        }
        alert("Upload complete!");
        initLoad();
    } catch(e){ alert("Upload failed"); }
    finally { btn.disabled = false; }
}

/* =========================================================
  FACE GROUPS
========================================================= */
async function loadFaceGroups(){
    try {
        const res = await fetch(LIST_PEOPLE_API, { 
            method:"POST", 
            headers:{ "Authorization": `Bearer ${idToken}`, "Content-Type":"application/json" }, 
            body: JSON.stringify({ collection_id: collectionId }) 
        });
        const data = await res.json();
        faceGroups = data.people || [];
        renderFaceIcons();
    } catch(e){}
}

function renderFaceIcons(){
    const bar = $("faceIconsBar");
    bar.innerHTML = `<div class="face-item" onclick="filterByFace(null)">
        <div class="face-icon-wrapper ${!currentSelectedFaceId?'selected':''}" style="display:flex;align-items:center;justify-content:center;background:#333"><i class="fas fa-users"></i></div>
        <div class="face-name-label">All</div>
    </div>` + faceGroups.map(f => `
        <div class="face-item" onclick="filterByFace('${f.FaceId}')">
            <div class="face-icon-wrapper ${currentSelectedFaceId===f.FaceId?'selected':''}" style="background-image:url('${f.face_thumbnail_url || ''}')"></div>
            <div class="face-name-label">${f.FaceName || 'Unknown'}</div>
        </div>
    `).join('');
}

function filterByFace(id){
    currentSelectedFaceId = id;
    renderFaceIcons();
    renderPhotos();
}

/* =========================================================
  EVENT LISTENERS
========================================================= */
function setupEventListeners(){
    document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
        document.querySelectorAll(".tab, .tab-content").forEach(el => el.classList.remove("active"));
        t.classList.add("active");
        $(t.dataset.tab).classList.add("active");
    });

    $("reloadLeadsBtn").onclick = loadLeads;
    $("refreshBtn").onclick = () => initLoad();
    $("closePhotoDetailsBtn").onclick = () => $("photoDetailsModal").classList.remove("active");
    $("saveEventBtn").onclick = async () => {
        const name = $("eventName").value;
        const date = $("eventDate").value;
        await fetch(UPSERT_EVENT_API, { method:"POST", headers:{"Authorization":`Bearer ${idToken}`,"Content-Type":"application/json"}, body:JSON.stringify({collection_id:collectionId, name, event_date:date}) });
        $("eventForm").style.display = "none";
        loadEvents();
    };
    $("newEvtBtn").onclick = () => $("eventForm").style.display = "block";
    $("aiTagSearch").oninput = renderPhotos;
    setupUpload();
    $("startUploadBtn").onclick = startUpload;
    
    $("genLinkBtn").onclick = async () => {
        const evts = Array.from(document.querySelectorAll(".linkEvt:checked")).map(c => c.value);
        const res = await fetch(GENERATE_LINK_API, { method:"POST", headers:{"Authorization":`Bearer ${idToken}`,"Content-Type":"application/json"}, body:JSON.stringify({collection_id:collectionId, event_ids:evts}) });
        const data = await res.json();
        $("generatedLink").href = data.searchUrl;
        $("generatedLink").textContent = data.searchUrl;
        $("linkResult").style.display = "block";
    };
}

async function deleteEvent(id){
    if(!confirm("Delete event?")) return;
    await fetch(DELETE_EVENT_API, { method:"POST", headers:{"Authorization":`Bearer ${idToken}`,"Content-Type":"application/json"}, body:JSON.stringify({collection_id:collectionId, event_id:id}) });
    initLoad();
}
</script>
