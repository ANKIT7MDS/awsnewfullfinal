<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Manager</title>
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
    
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --muted: #888;
            --brand: #4285f4;
            --brand-hover: #3367d6;
            --danger: #ea4335;
            --ok: #34a853;
        }
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 60px;
        }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* HEADER */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border);
        }
        .back-link { color: var(--muted); text-decoration: none; font-size: 14px; display:flex; align-items:center; gap:5px; }
        h1 { font-size: 22px; margin: 5px 0; font-weight: 500; }
        .stats-line { font-size:13px; color:var(--muted); margin-top:5px; }
        .stats-line b { color:white; font-weight:600; }
        
        /* TABS */
        .tabs {
            display: flex; gap: 10px; border-bottom: 1px solid var(--border);
            margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px;
        }
        .tab-btn {
            background: none; border: none; color: var(--muted); padding: 10px 20px;
            cursor: pointer; font-size: 14px; font-weight: 500; position: relative;
            white-space: nowrap; transition: 0.2s;
        }
        .tab-btn.active { color: var(--brand); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 100%; height: 2px; background: var(--brand);
        }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        
        /* CARDS & UI */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        .btn {
            background: var(--brand); color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .btn:hover { background: var(--brand-hover); }
        .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn.danger { background: rgba(234,67,53,0.1); color: var(--danger); border: 1px solid rgba(234,67,53,0.3); }
        
        input, select {
            background: #111; border: 1px solid var(--border); padding: 10px;
            border-radius: 6px; color: #fff; width: 100%; outline: none;
        }
        input:focus, select:focus { border-color: var(--brand); }

        /* GALLERY */
        .filter-row-top { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-row-top > * { flex: 1; min-width: 150px; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
        }
        .photo-card {
            aspect-ratio: 1; overflow: hidden; background: #000; border-radius: 6px;
            cursor: pointer; position: relative; border: 1px solid #222;
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
        .photo-card img.loaded { opacity: 1; }
        
        /* FACES BAR */
        #faceIconsBar {
            display: flex; gap: 12px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .face-icon-wrap { text-align: center; cursor: pointer; min-width: 60px; }
        .face-icon {
            width: 55px; height: 55px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--brand); padding: 2px; background: #000;
            transition: transform 0.2s;
        }
        .face-icon:hover, .face-icon.selected { transform: scale(1.1); border-color: var(--ok); }
        .face-name { font-size: 11px; color: var(--muted); display: block; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }

        /* FACE NAMING HEADER */
        .face-header {
            background: #151515; border: 1px solid var(--brand); border-radius: 8px;
            padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
        }
        .face-header img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--brand); }
        .face-input-group { display: flex; gap: 10px; flex-grow: 1; }

        /* UPLOAD */
        #dropZone {
            border: 2px dashed var(--border); border-radius: 12px; padding: 40px;
            text-align: center; background: #151515; cursor: pointer; transition: 0.2s;
        }
        #dropZone:hover { border-color: var(--brand); background: #1a1a1a; }
        #progress-bar { height: 6px; background: var(--brand); width: 0%; margin-top: 15px; border-radius: 3px; transition: width 0.3s; }
        
        /* LEADS TABLE */
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #222; }
        tr:hover td { background: #151515; }

        /* VIEWER */
        .viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .viewer.open { opacity: 1; pointer-events: auto; }
        .viewer img { max-width: 95%; max-height: 90vh; border-radius: 4px; }
        .viewer-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; }

        /* DEBUG PANEL */
        #debugPanel { display:none; position:fixed; bottom:10px; right:10px; width:300px; max-height:200px; overflow:auto; background:#000; border:1px solid #333; padding:10px; font-size:10px; color:lime; z-index:9999; }
    </style>
</head>
<body>

<div id="debugPanel"></div>

<div class="wrap">
    <!-- HEADER -->
    <div class="top-bar">
        <div>
            <a href="dashboard.html" class="back-link">⬅ Back to Dashboard</a>
            <h1 id="collectionName">Loading...</h1>
            <div class="stats-line">
                <span id="totalPhotos">0</span> Photos • 
                <span id="totalLeads">0</span> Leads • 
                <span id="storageUsed">0 MB</span>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn secondary" onclick="window.location.reload()">Refresh 🔄</button>
            <a id="assistantLink" target="_blank" class="btn secondary">⚡ Staff Link</a>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('galleryTab')">Photos</button>
        <button class="tab-btn" onclick="switchTab('eventsTab')">Events</button>
        <button class="tab-btn" onclick="switchTab('uploadTab')">Upload</button>
        <button class="tab-btn" onclick="switchTab('linksTab')">Links</button>
        <button class="tab-btn" onclick="switchTab('analyticsTab')">Guests</button>
    </div>

    <!-- 1. GALLERY TAB -->
    <div id="galleryTab" class="tab-content active">
        <div class="filter-row-top">
            <select id="filterType" onchange="applyFilters()">
                <option value="ALL">All Photos</option>
                <option value="BEST">⭐ Best Quality</option>
                <option value="HAPPY">😊 Happy Moments</option>
                <option value="GROUP">👥 Group Photos</option>
            </select>
            <input type="text" id="tagSearch" placeholder="Search tags (e.g. Red, Stage)" oninput="applyFilters()">
            <button class="btn secondary" id="downloadZipBtn" onclick="downloadAllZip(this)">⬇ Download ZIP</button>
        </div>

        <!-- Faces Horizontal Scroll -->
        <div id="faceIconsBar"></div>

        <!-- Face Naming Mode -->
        <div id="faceNamingHeader" class="face-header" style="display:none;">
            <img id="faceHeaderImg" src="">
            <div style="flex-grow:1">
                <h3 style="margin:0 0 5px 0;">Name this person</h3>
                <div class="face-input-group">
                    <input type="text" id="faceNameInput" placeholder="Enter Name">
                    <button class="btn" id="saveFaceBtn">Save</button>
                    <button class="btn secondary" onclick="cancelFaceNaming()">Cancel</button>
                </div>
            </div>
        </div>

        <div id="galleryContainer" class="gallery-grid"></div>
        <div style="text-align:center; margin-top:20px;">
            <button id="loadMoreBtn" class="btn secondary" style="display:none;" onclick="renderNextBatch()">Load More</button>
        </div>
    </div>

    <!-- 2. EVENTS TAB -->
    <div id="eventsTab" class="tab-content">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Events</h3>
                <button class="btn" onclick="document.getElementById('eventForm').style.display='block'">+ New Event</button>
            </div>
            
            <div id="eventForm" style="display:none; background:#151515; padding:20px; border-radius:8px; margin-bottom:20px; border:1px solid var(--border);">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                    <input type="text" id="eventName" placeholder="Event Name">
                    <input type="date" id="eventDate">
                </div>
                <div style="text-align:right;">
                    <button class="btn secondary" onclick="document.getElementById('eventForm').style.display='none'">Cancel</button>
                    <button class="btn" id="saveEventBtn">Save</button>
                </div>
            </div>

            <table>
                <thead><tr><th>Name</th><th>Date</th><th>Photos</th><th>Actions</th></tr></thead>
                <tbody id="eventsTbody"></tbody>
            </table>
        </div>
    </div>

    <!-- 3. UPLOAD TAB -->
    <div id="uploadTab" class="tab-content">
        <div class="card" style="max-width:800px; margin:0 auto;">
            <h3>Upload Photos</h3>
            <div style="margin-bottom:20px;">
                <label style="color:var(--muted); font-size:12px;">Select Event</label>
                <select id="uploadEventSelect"><option value="">Loading...</option></select>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" id="optimizeUpload" checked> Optimize (Compress) Images
                </label>
            </div>
            <div id="dropZone">
                <div style="font-size:40px; margin-bottom:10px;">☁️</div>
                <p>Drag & Drop photos here (JPG, PNG, HEIC)</p>
                <input type="file" id="fileInput" multiple style="display:none" accept="image/*">
            </div>
            <div id="progress-container" style="display:none;">
                <div id="progress-bar"></div>
                <p id="uploadStatus" style="text-align:center; margin-top:10px; font-size:14px;"></p>
            </div>
        </div>
    </div>

    <!-- 4. LINKS TAB -->
    <div id="linksTab" class="tab-content">
        <div class="card" style="max-width:600px; margin:0 auto;">
            <h3>Generate Search Link</h3>
            <div id="linkEventList" style="max-height:200px; overflow-y:auto; border:1px solid var(--border); padding:10px; border-radius:8px; margin-bottom:15px; background:#111;"></div>
            <input type="number" id="expiryHours" placeholder="Expiry Hours (0=Never)" style="margin-bottom:10px;">
            <input type="text" id="linkPassword" placeholder="Password (Optional)" style="margin-bottom:15px;">
            <button class="btn" id="genLinkBtn">Generate Link</button>
            <div id="linkResult" style="margin-top:20px; display:none; background:#111; padding:15px; border-radius:8px; border:1px dashed var(--brand);">
                <a id="generatedLink" href="#" target="_blank" style="color:var(--brand); display:block; margin-bottom:10px; word-break:break-all;"></a>
                <button class="btn secondary" onclick="copyLink()">Copy URL</button>
            </div>
        </div>
    </div>

    <!-- 5. ANALYTICS TAB -->
    <div id="analyticsTab" class="tab-content">
        <div class="card">
            <h3>Guest Leads</h3>
            <div class="filter-row-top">
                <input type="date" id="dateFilter" onchange="fetchAnalytics()">
                <input type="text" id="mobileFilter" placeholder="Filter by Mobile" oninput="fetchAnalytics()">
            </div>
            <table>
                <thead><tr><th>Name</th><th>Mobile</th><th>Matches</th><th>Time</th></tr></thead>
                <tbody id="leadsTbody"></tbody>
            </table>
            <p id="noLeadsMessage" style="text-align:center; padding:20px; color:var(--muted); display:none;">No leads found.</p>
        </div>
    </div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewer()">
    <div class="viewer-close">×</div>
    <img id="viewerImg" onclick="event.stopPropagation()">
</div>

<script>
/* ================= CONFIG & API ================= */
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const urlParams = new URLSearchParams(window.location.search);
const collectionId = urlParams.get("id");
const collectionNameParam = urlParams.get("name");
const idToken = localStorage.getItem("idToken");

if (!idToken) window.location.href = "login.html";
if (document.getElementById('assistantLink')) {
    document.getElementById('assistantLink').href = `quick-upload.html?id=${collectionId}&name=${encodeURIComponent(collectionNameParam || 'Event')}`;
}

// Log for debugging
function log(msg) { 
    console.log(msg);
    const p = document.getElementById('debugPanel');
    p.innerHTML += `<div>${msg}</div>`;
}

/* ================= GENERIC API FETCH ================= */
async function apiFetch(endpoint, method = 'POST', body = null, skipAuth = false) {
    const options = {
        method: method,
        headers: { 'Content-Type': 'application/json' }
    };
    
    // CRITICAL FIX: Only add Auth if NOT skipped. 
    // Fixes "Invalid key=value" error on endpoints like generate-upload-urls or list_people if configured openly
    if (!skipAuth) {
        options.headers['Authorization'] = `Bearer ${idToken}`;
    }

    if (body && method !== 'GET') options.body = JSON.stringify(body);

    try {
        const res = await fetch(`${API_BASE}/${endpoint}`, options);
        if (!res.ok) throw new Error(`API Error ${res.status}: ${await res.text()}`);
        return await res.json();
    } catch (err) {
        log(`API Fail: ${endpoint} - ${err.message}`);
        throw err;
    }
}

/* ================= INITIALIZATION ================= */
async function init() {
    try {
        const data = await apiFetch('get-events', 'POST', { collection_id: collectionId });
        const summary = data.collection_summary || {};
        
        document.getElementById('collectionName').textContent = summary.name || collectionNameParam || "Collection";
        document.getElementById('totalPhotos').textContent = summary.photo_count || 0;
        document.getElementById('totalLeads').textContent = summary.leads_count || 0;
        document.getElementById('storageUsed').textContent = formatBytes(summary.storage_bytes || 0);
        
        renderEvents(data.events || []);
        fetchPhotos();
    } catch (e) {
        log(e);
        document.getElementById('collectionName').textContent = "Error Loading Data";
    }
}

/* ================= PHOTOS & FACES ================= */
let allPhotos = [], filteredPhotos = [], displayedCount = 0;
let faceGroups = {}, selectedFaces = new Set();

async function fetchPhotos() {
    document.getElementById('galleryContainer').innerHTML = '<p style="text-align:center;color:#888;">Loading...</p>';
    
    try {
        // FIX: list_people MUST be correct endpoint spelling (underscore)
        // FIX: Removed Auth from list_people as per previous fix logic
        const [photosData, peopleData] = await Promise.all([
            apiFetch('get-photos', 'POST', { collection_id: collectionId }),
            apiFetch('list_people', 'POST', { collection_id: collectionId }, true) // Skip Auth for list_people
        ]);

        allPhotos = photosData.photos || [];
        filteredPhotos = [...allPhotos];
        
        const people = (peopleData && peopleData.people) ? peopleData.people : [];
        buildFaceGroups(people);
        
        displayedCount = 0;
        document.getElementById('galleryContainer').innerHTML = '';
        renderNextBatch();
        renderFaceIcons();
        
    } catch (e) {
        console.error(e);
        document.getElementById('galleryContainer').innerHTML = '<p style="text-align:center;color:red;">Failed to load.</p>';
    }
}

function buildFaceGroups(directoryPeople) {
    faceGroups = {};
    
    // 1. From Directory (Known Names)
    directoryPeople.forEach(p => {
        const fid = p.FaceId || p.face_id;
        if(fid) faceGroups[fid] = { id: fid, name: p.FaceName, count: 0, photos: [], thumb: null };
    });

    // 2. From Photos
    allPhotos.forEach(p => {
        const ids = p.face_ids || (p.faces ? p.faces.map(f=>f.FaceId) : []);
        ids.forEach(fid => {
            if(!faceGroups[fid]) faceGroups[fid] = { id: fid, name: 'Unknown', count: 0, photos: [], thumb: null };
            faceGroups[fid].photos.push(p);
            faceGroups[fid].count++;
            if(!faceGroups[fid].thumb) faceGroups[fid].thumb = p.thumbnail_url || p.url;
        });
    });
}

function renderFaceIcons() {
    const bar = document.getElementById('faceIconsBar');
    const list = Object.values(faceGroups).filter(g => g.count > 0).sort((a,b) => b.count - a.count);
    
    if(list.length === 0) { bar.innerHTML = '<p style="color:#555;padding:10px;font-size:13px;">No faces detected.</p>'; return; }
    
    bar.innerHTML = list.map(g => `
        <div class="face-icon-wrap" onclick="handleFaceClick('${g.id}', event)">
            <img src="${g.thumb || 'data:,'}" class="face-icon" id="face-${g.id}">
            <span class="face-name">${g.name}</span>
        </div>
    `).join('');
}

function handleFaceClick(fid, e) {
    if (e.shiftKey) {
        if(selectedFaces.has(fid)) selectedFaces.delete(fid); else selectedFaces.add(fid);
        applyFilters();
    } else {
        openNamingMode(fid);
    }
    // Update UI
    document.querySelectorAll('.face-icon').forEach(el => el.classList.remove('selected'));
    selectedFaces.forEach(id => {
        const el = document.getElementById(`face-${id}`);
        if(el) el.classList.add('selected');
    });
}

/* ================= NAMING MODE ================= */
let currentNamingId = null;
function openNamingMode(fid) {
    currentNamingId = fid;
    const g = faceGroups[fid];
    document.getElementById('faceNamingHeader').style.display = 'flex';
    document.getElementById('faceHeaderImg').src = g.thumb;
    document.getElementById('faceNameInput').value = g.name !== 'Unknown' ? g.name : '';
    document.querySelector('.filter-row-top').style.display = 'none';
    
    // Filter only this face
    filteredPhotos = g.photos;
    displayedCount = 0;
    document.getElementById('galleryContainer').innerHTML = '';
    renderNextBatch();
}

function cancelFaceNaming() {
    document.getElementById('faceNamingHeader').style.display = 'none';
    document.querySelector('.filter-row-top').style.display = 'flex';
    currentNamingId = null;
    applyFilters(); // Reset filter
}

document.getElementById('saveFaceBtn').onclick = async () => {
    const name = document.getElementById('faceNameInput').value;
    if(!name || !currentNamingId) return;
    
    document.getElementById('saveFaceBtn').innerText = "Saving...";
    try {
        // FIX: Consistent endpoint name (save-face-name)
        await apiFetch('save-face-name', 'POST', {
            FaceId: currentNamingId, FaceName: name, CollectionId: collectionId
        });
        faceGroups[currentNamingId].name = name;
        renderFaceIcons();
        cancelFaceNaming();
        alert("Name Saved!");
    } catch(e) { alert("Failed to save"); }
    document.getElementById('saveFaceBtn').innerText = "Save";
};

/* ================= GALLERY RENDER ================= */
function renderNextBatch() {
    const container = document.getElementById('galleryContainer');
    const batch = filteredPhotos.slice(displayedCount, displayedCount + 30);
    
    if(batch.length === 0 && displayedCount === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">No photos found.</p>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
    }

    batch.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'photo-card';
        div.onclick = () => openViewer(displayedCount + idx);
        div.innerHTML = `<img src="${p.thumbnail_url || p.url}" loading="lazy" onload="this.classList.add('loaded')">`;
        container.appendChild(div);
    });
    
    displayedCount += batch.length;
    document.getElementById('loadMoreBtn').style.display = displayedCount < filteredPhotos.length ? 'block' : 'none';
}

function applyFilters() {
    const type = document.getElementById('filterType').value;
    const q = document.getElementById('tagSearch').value.toLowerCase();
    
    filteredPhotos = allPhotos.filter(p => {
        // Face Filter
        if(selectedFaces.size > 0) {
            const pFaces = p.face_ids || (p.faces ? p.faces.map(f=>f.FaceId) : []);
            if(!Array.from(selectedFaces).every(fid => pFaces.includes(fid))) return false;
        }
        // Metadata Filter
        if(type === 'BEST' && (p.quality_score||0) < 85) return false;
        if(type === 'HAPPY' && !(p.emotions||[]).some(e => e.Type==='HAPPY' && e.Confidence>60)) return false;
        if(type === 'GROUP' && (p.face_count||0) < 3) return false;
        // Text Search
        if(q && !(p.ai_tags||[]).some(t => String(t).toLowerCase().includes(q))) return false;
        
        return true;
    });
    
    displayedCount = 0;
    document.getElementById('galleryContainer').innerHTML = '';
    renderNextBatch();
}

/* ================= UPLOAD (FIXED) ================= */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.onclick = () => fileInput.click();
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#222'; };
dropZone.ondragleave = () => { dropZone.style.background = '#151515'; };
dropZone.ondrop = (e) => { e.preventDefault(); handleUpload(e.dataTransfer.files); };
fileInput.onchange = (e) => handleUpload(e.target.files);

async function handleUpload(files) {
    const eventId = document.getElementById('uploadEventSelect').value;
    if(!eventId) return alert("Select an event first!");
    
    const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    if(validFiles.length === 0) return;

    document.getElementById('progress-container').style.display = 'block';
    const bar = document.getElementById('progress-bar');
    const status = document.getElementById('uploadStatus');
    const optimize = document.getElementById('optimizeUpload').checked;

    let processed = 0;
    status.innerText = "Processing...";

    // Process in batches
    for(let i=0; i<validFiles.length; i+=5) {
        const chunk = validFiles.slice(i, i+5);
        
        // 1. Compress/Convert
        const preparedFiles = await Promise.all(chunk.map(async (file) => {
            try {
                let blob = file;
                // Simple check for HEIC
                if(file.name.toLowerCase().endsWith('.heic')) {
                    status.innerText = `Converting ${file.name}...`;
                    blob = await heic2any({ blob: file, toType: 'image/jpeg' });
                }
                // Compress if requested
                if(optimize && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                    const options = { maxSizeMB: 1.5, maxWidthOrHeight: 2500, useWebWorker: true };
                    try { blob = await imageCompression(file, options); } catch(e){}
                }
                return { name: file.name.replace(/\.[^/.]+$/, ".jpg"), type: 'image/jpeg', blob: blob };
            } catch(e) { return null; }
        }));

        const validChunk = preparedFiles.filter(f => f !== null);
        if(validChunk.length === 0) continue;

        // 2. Get URLs (FIX: Skip Auth if backend requires it)
        try {
            const meta = validChunk.map(f => ({ name: f.name, type: f.type }));
            const data = await apiFetch('generate-upload-urls', 'POST', {
                collection_id: collectionId, event_id: eventId, files: meta
            }, true); // SKIP AUTH passed as true

            // 3. Upload to S3
            await Promise.all(data.urls.map((u, idx) => {
                return fetch(u.uploadURL, { method: 'PUT', body: validChunk[idx].blob });
            }));
            
            processed += chunk.length;
            bar.style.width = `${(processed / validFiles.length) * 100}%`;
            status.innerText = `Uploading... ${processed}/${validFiles.length}`;
            
        } catch(e) { console.error(e); }
    }
    
    status.innerText = "✅ Done! Refreshing...";
    setTimeout(() => { location.reload(); }, 2000);
}

/* ================= EVENTS CRUD ================= */
function renderEvents(events) {
    const tbody = document.getElementById('eventsTbody');
    const select = document.getElementById('uploadEventSelect');
    const linkList = document.getElementById('linkEventList');
    
    tbody.innerHTML = ''; select.innerHTML = '<option value="">Select Event...</option>'; linkList.innerHTML = '';

    events.forEach(ev => {
        tbody.innerHTML += `<tr><td>${ev.name}</td><td>${ev.event_date||'-'}</td><td>${ev.photo_count||0}</td>
            <td><button class="btn secondary" onclick="deleteEvent('${ev.event_id}')" style="font-size:12px;padding:4px 8px;">Delete</button></td></tr>`;
        select.innerHTML += `<option value="${ev.event_id}">${ev.name}</option>`;
        linkList.innerHTML += `<div><label><input type="checkbox" value="${ev.event_id}" class="link-check"> ${ev.name}</label></div>`;
    });
}

document.getElementById('saveEventBtn').onclick = async () => {
    const name = document.getElementById('eventName').value;
    const date = document.getElementById('eventDate').value;
    if(!name) return alert("Name required");
    await apiFetch('upsert-event', 'POST', { collection_id: collectionId, name, event_date: date });
    document.getElementById('eventForm').style.display = 'none';
    init();
};

async function deleteEvent(eid) {
    if(!confirm("Delete event?")) return;
    await apiFetch('delete-event', 'POST', { collection_id: collectionId, event_id: eid });
    init();
}

/* ================= SEARCH LINKS ================= */
document.getElementById('genLinkBtn').onclick = async () => {

/* ================= ANALYTICS ================= */
async function fetchAnalytics() {
    try {
        // FIX: Using correct endpoint 'save-details' (not selfie-search...)
        const data = await apiFetch('save-details', 'GET', null); 
        const leads = data.leads || [];
        const tbody = document.getElementById('leadsTbody');
        const msg = document.getElementById('noLeadsMessage');
        tbody.innerHTML = '';
        
        if(leads.length === 0) { msg.style.display = 'block'; return; }
        msg.style.display = 'none';
        
        const qMobile = document.getElementById('mobileFilter').value;
        const qDate = document.getElementById('dateFilter').value;
        
        leads.filter(l => {
            if(qMobile && !l.mobile.includes(qMobile)) return false;
            if(qDate && !l.created_at.startsWith(qDate)) return false;
            return true;
        }).forEach(l => {
            tbody.innerHTML += `<tr><td>${l.name||'-'}</td><td>${l.mobile}</td><td>${l.match_count}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`;
        });
    } catch(e) { console.error(e); }
}

/* ================= UTILS ================= */
function formatBytes(bytes) {
    if(bytes === 0) return '0 B';
    const k = 1024; const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}
function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`button[onclick="switchTab('${id}')"]`).classList.add('active');
    document.getElementById(id).classList.add('active');
    if(id==='analyticsTab') fetchAnalytics();
}
window.openViewer = (idx) => {
    document.getElementById('viewerImg').src = filteredPhotos[idx].url;
    document.getElementById('viewer').classList.add('open');
};
window.closeViewer = () => document.getElementById('viewer').classList.remove('open');

// ZIP DOWNLOAD
window.downloadAllZip = async (btn) => {
    if(filteredPhotos.length===0) return alert("No photos");
    btn.disabled=true; btn.innerText="Zipping...";
    const zip = new JSZip();
    const folder = zip.folder("photos");
    const limit = filteredPhotos.slice(0, 100);
    
    let count=0;
    for(let i=0; i<limit.length; i++){
        try{
            const b = await fetch(limit[i].url).then(r=>r.blob());
            folder.file(`photo_${i+1}.jpg`, b);
            count++;
            btn.innerText = `Zipping ${count}/${limit.length}`;
        }catch(e){}
    }
    const content = await zip.generateAsync({type:"blob"});
    saveAs(content, "photos.zip");
    btn.disabled=false; btn.innerText="⬇ Download ZIP";
};
