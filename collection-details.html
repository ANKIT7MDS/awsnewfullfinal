<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventLens • Collection Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
:root{
  --bg:#0a0a0a;--card:#1a1a1a;--border:#333;--text:#fff;--muted:#888;--brand:#00e676;
  --brand-soft:rgba(0,230,118,0.15);--danger:#ea4335;--ok:#34a853;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui;padding-bottom:80px}
.wrap{max-width:1450px;margin:0 auto;padding:20px}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding-bottom:15px;border-bottom:1px solid var(--border)}
.back-link{color:var(--muted);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:6px}
h1{font-size:28px;font-weight:600;margin:0}
.stats{font-size:14px;color:var(--muted);margin-top:6px}
.stats b{color:white;font-weight:600}

.tabs{display:flex;gap:30px;border-bottom:1px solid var(--border);margin-bottom:25px;overflow-x:auto;padding-bottom:5px}
.tab{padding:14px 0;cursor:pointer;color:var(--muted);font-weight:500;border-bottom:3px solid transparent;white-space:nowrap}
.tab.active{color:var(--brand);border-color:var(--brand);font-weight:600}

.tab-content{display:none}
.tab-content.active{display:block}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:25px;box-shadow:0 6px 25px rgba(0,0,0.5}

.lead-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-top:20px}
.lead-card{background:#111;border-radius:16px;padding:18px;display:flex;gap:18px;border:2px solid transparent;transition:0.3s;cursor:pointer;align-items:center}
.lead-card:hover{border-color:var(--brand);transform:translateY(-6px);box-shadow:0 15px 40px rgba(0,230,118,0.2)}
.selfie-img{width:84px;height:84px;border-radius:50%;object-fit:cover;border:4px solid var(--brand);background:#222;box-shadow:0 0 30px rgba(0,230,118,0.4)}

.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;margin-top:15px}
@media(max-width:768px){.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
.photo-card{aspect-ratio:1;border-radius:12px;overflow:hidden;background:#111;cursor:pointer}
.photo-card img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s}
.photo-card img.loaded{opacity:1}

.face-group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:20px}
.face-group{text-align:center}
.face-thumb{width:130px;height:130px;border-radius:50%;object-fit:cover;border:5px solid var(--brand);box-shadow:0 0 30px rgba(0,230,118,0.4)}
.face-count{background:var(--brand);color:#000;padding:8px 16px;border-radius:30px;font-weight:bold;margin-top:10px;display:inline-block}

.btn{background:var(--brand);color:#000;border:none;padding:12px 24px;border-radius:50px;cursor:pointer;font-weight:600;transition:0.3s}
.btn:hover{transform:scale(1.05)}
.btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}

.filter-row-top{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;align-items:center}
.filter-row-top>*{flex:1;min-width:150px}
select,input{background:#111;border:1px solid var(--border);padding:14px 16px;border-radius:12px;color:white;font-size:15px}
select:focus,input:focus{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}

.load-more-container{text-align:center;margin:50px 0}
.empty{text-align:center;padding:90px 20px;color:var(--muted);font-size:17px}

.viewer{position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.viewer.open{display:flex}
.viewer img{max-width:96%;max-height:92vh;border-radius:18px}
.viewer-close{position:absolute;top:25px;right:25px;font-size:44px;cursor:pointer;background:rgba(255,255,255,0.1);width:70px;height:70px;border-radius:50%;display:grid;place-items:center}
</style>
</head>
<body>

<div class="wrap">
  <div class="top-bar">
    <div>
      <a href="dashboard.html" class="back-link">Back to Dashboard</a>
      <h1 id="collectionName">Loading...</h1>
      <div class="stats">
        <b id="totalPhotos">0</b> Photos • <b id="totalLeads">0</b> Guests • <b id="storageUsed">0 MB</b>
      </div>
    </div>
    <a href="#" id="assistantLink" target="_blank" class="btn secondary">Staff Upload Link</a>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('galleryTab')">Photos</div>
    <div class="tab" onclick="switchTab('faceGroupTab')">People</div>
    <div class="tab" onclick="switchTab('eventsTab')">Events</div>
    <div class="tab" onclick="switchTab('uploadTab')">Upload</div>
    <div class="tab" onclick="switchTab('linksTab')">Links</div>
    <div class="tab" onclick="switchTab('analyticsTab')">Guests</div>
  </div>

  <!-- GALLERY -->
  <div id="galleryTab" class="tab-content active">
    <div class="card">
      <div class="filter-row-top">
        <select id="filterType" onchange="applyFilters()">
          <option value="ALL">All Photos</option>
          <option value="BEST">Best</option>
          <option value="HAPPY">Happy</option>
          <option value="GROUP">Groups</option>
        </select>
        <input type="text" id="tagSearch" placeholder="Search tags..." oninput="debouncedFilter()">
        <button class="btn secondary" onclick="downloadAllZip()">Download Zip</button>
      </div>
      <div id="galleryContainer"></div>
      <div class="load-more-container">
        <button id="loadMoreBtn" class="btn" onclick="renderNextBatch()" style="display:none;">Load More</button>
      </div>
      <div id="emptyGallery" class="empty" style="display:none;">No photos yet. <button class="btn" onclick="switchTab('uploadTab')">Upload Now</button></div>
    </div>
  </div>

  <!-- PEOPLE TAB -->
  <div id="faceGroupTab" class="tab-content">
    <div class="card">
      <h2>People Found</h2>
      <p style="color:var(--muted);margin:15px 0 30px;">Click on any face to see all their photos</p>
      <div id="faceGroupGrid" class="face-group-grid"></div>
    </div>
  </div>

  <!-- EVENTS TAB -->
  <div id="eventsTab" class="tab-content">
    <div class="card">
      <h3>Events</h3>
      <button class="btn" onclick="document.getElementById('eventForm').style.display='block'" style="margin-bottom:20px;">+ New Event</button>
      <div id="eventForm" style="display:none;background:#151515;padding:20px;border-radius:12px;margin-bottom:20px;">
        <input type="text" id="eventName" placeholder="Event Name" style="width:100%;margin-bottom:10px;">
        <input type="date" id="eventDate" style="width:100%;margin-bottom:15px;">
        <button class="btn secondary" onclick="this.parentElement.style.display='none'">Cancel</button>
        <button class="btn" onclick="saveEvent()">Save</button>
      </div>
      <table style="width:100%"><thead><tr><th>Name</th><th>Date</th><th>Photos</th><th>Actions</th></tr></thead><tbody id="eventsTbody"></tbody></table>
    </div>
  </div>

  <!-- UPLOAD TAB -->
  <div id="uploadTab" class="tab-content">
    <div class="card" style="max-width:800px;margin:0 auto;">
      <select id="uploadEventSelect" style="width:100%;margin-bottom:20px;"><option>Loading...</option></select>
      <div id="dropZone" style="border:2px dashed var(--border);padding:80px;text-align:center;background:#151515;border-radius:16px;cursor:pointer;">
        <div style="font-size:50px;">Cloud</div>
        <p>Drag & drop or click</p>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
      </div>
      <div id="progress-container" style="margin-top:20px;display:none;">
        <div id="progress-bar" style="height:8px;background:var(--brand);width:0%;border-radius:4px;"></div>
        <p id="uploadStatus" style="text-align:center;margin-top:10px;"></p>
      </div>
    </div>
  </div>

  <!-- LINKS TAB -->
  <div id="linksTab" class="tab-content">
    <div class="card" style="max-width:600px;margin:0 auto;">
      <h3>Generate Search Link</h3>
      <div id="linkEventList" style="max-height:250px;overflow-y:auto;border:1px solid var(--border);padding:15px;border-radius:12px;margin:20px 0;"></div>
      <button class="btn" onclick="generateLink()">Generate</button>
      <div id="linkResult" style="margin-top:20px;padding:20px;background:#111;border:2px dashed var(--brand);border-radius:12px;display:none;">
        <a id="generatedLink" href="#" target="_blank" style="color:var(--brand);word-break:break-all;font-size:16px;"></a>
        <button class="btn secondary" style="margin-top:12px;" onclick="copyLink()">Copy</button>
      </div>
    </div>
  </div>

  <!-- GUESTS TAB -->
  <div id="analyticsTab" class="tab-content">
    <div class="card">
      <h3>Guest Leads</h3>
      <div class="filter-row-top">
        <input type="date" id="dateFilter" onchange="applyLeadFilters()">
        <input type="tel" id="mobileFilter" placeholder="Search mobile" oninput="applyLeadFilters()">
      </div>
      <div id="leadsGrid" class="lead-grid"></div>
      <div id="noLeadsMessage" class="empty">Loading...</div>
      <div class="load-more-container">
        <button id="loadMoreLeadsBtn" class="btn" onclick="loadMoreLeads()" style="display:none;">Load More</button>
      </div>
    </div>
  </div>
</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
  <div class="viewer-close" onclick="event.stopPropagation();closeViewer()">X</div>
  <img id="viewerImg">
</div>

<script>
// PART 2 NEXT MESSAGE MEIN AA RAHA HAI...
    <script>
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const urlParams = new URLSearchParams(window.location.search);
const collectionId = urlParams.get("id");
const collectionName = urlParams.get("name") || "Event";
const idToken = localStorage.getItem("idToken");
if (!idToken) location.href="login.html";

document.getElementById('assistantLink').href = `quick-upload.html?id=${collectionId}&name=${encodeURIComponent(collectionName)}`;

let allPhotos = [], filteredPhotos = [], displayed = 0, BATCH = 20;
let allLeads = [], fLeads = [], lDisplayed = 0, LBATCH = 15;
let faceGroups = {};

let debounceTimer;
function debouncedFilter(){clearTimeout(debounceTimer);debounceTimer=setTimeout(applyFilters,350)}

async function init(){
  const res = await fetch(`${API_BASE}/get-events`,{method:'POST',headers:{'Authorization':`Bearer ${idToken}`,'Content-Type':'application/json'},body:JSON.stringify({collection_id:collectionId})});
  const d = await res.json();
  const s = d.collection_summary||{};

  document.getElementById('collectionName').textContent = s.name||collectionName;
  document.getElementById('totalPhotos').textContent = s.photo_count||0;
  document.getElementById('totalLeads').textContent = s.leads_count||0;
  document.getElementById('storageUsed').textContent = formatBytes(s.storage_bytes||0);
  document.title = `${s.name||'Event'} • EventLens`;

  renderEvents(d.events||[]);
  fetchPhotos();
  fetchLeads();
}

async function fetchPhotos(){
  document.getElementById('galleryContainer').innerHTML = '<p style="text-align:center;padding:60px;color:#888">Loading photos...</p>';
  const res = await fetch(`${API_BASE}/get-photos`,{method:'POST',headers:{'Authorization':`Bearer ${idToken}`,'Content-Type':'application/json'},body:JSON.stringify({collection_id:collectionId})});
  const d = await res.json();
  allPhotos = d.photos||[];
  filteredPhotos = [...allPhotos].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  buildFaceGroups();
  displayed = 0;
  document.getElementById('galleryContainer').innerHTML = '';
  if(allPhotos.length===0){
    document.getElementById('emptyGallery').style.display='block';
  }else renderNextBatch();
}

function renderNextBatch(){
  const c = document.getElementById('galleryContainer');
  const batch = filteredPhotos.slice(displayed,displayed+BATCH);
  let curDate=null, group=null;
  batch.forEach((p,i)=>{
    const date = p.created_at ? new Date(p.created_at).toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'}) : 'Recent';
    if(date!==curDate){
      const h=document.createElement('div');h.style.cssText='margin:25px 0 10px;font-weight:600;color:var(--brand)';
      h.textContent=date; c.appendChild(h);
      group=document.createElement('div');group.className='gallery-grid';c.appendChild(group);curDate=date;
    }
    const d=document.createElement('div');d.className='photo-card';d.onclick=()=>openViewer(displayed+i);
    d.innerHTML=`<img src="${p.thumbnail_url||p.url}" loading="lazy" onload="this.classList.add('loaded')">`;
    group.appendChild(d);
  });
  displayed += batch.length;
  document.getElementById('loadMoreBtn').style.display = displayed<filteredPhotos.length?'block':'none';
}

function buildFaceGroups(){
  faceGroups={};
  allPhotos.forEach(p=>{
    (p.faces||[]).forEach(f=>{
      const id = f.FaceId || f.ExternalImageId || Math.random().toString();
      if(!faceGroups[id]) faceGroups[id]={thumb:p.thumbnail_url||p.url,count:0,photos:[]};
      faceGroups[id].count++; faceGroups[id].photos.push(p);
    });
  });
  const g=document.getElementById('faceGroupGrid');
  if(Object.keys(faceGroups).length===0){
    g.innerHTML='<p style="grid-column:1/-1;text-align:center;padding:60px;color:#888">No faces found yet</p>';
  }else{
    g.innerHTML = Object.entries(faceGroups).map(([id,o])=>`
      <div class="face-group" onclick="showPerson('${id}')">
        <img src="${o.thumb}" class="face-thumb" onerror="this.src='https://placehold.co/130x130/222/fff?text=Person'">
        <div class="face-count">${o.count} photos</div>
      </div>`).join('');
  }
}
window.showPerson=id=>{filteredPhotos=faceGroups[id].photos;displayed=0;document.getElementById('galleryContainer').innerHTML='';renderNextBatch();switchTab('galleryTab');}

async function fetchLeads(){
  const res = await fetch(`${API_BASE}/save-details`,{headers:{'Authorization':`Bearer ${idToken}`}});
  const d = await res.json();
  allLeads = d.leads||[];
  applyLeadFilters();
}

function applyLeadFilters(){
  const date=document.getElementById('dateFilter').value;
  const mob=document.getElementById('mobileFilter').value.trim();
  fLeads = allLeads.filter(l=>{
    return (!date||l.created_at.startsWith(date)) && (!mob||l.mobile.includes(mob));
  });
  lDisplayed=0;document.getElementById('leadsGrid').innerHTML='';
  if(fLeads.length===0){
    document.getElementById('noLeadsMessage').textContent='No guests found';
  }else loadMoreLeads();
}

function loadMoreLeads(){
  const batch = fLeads.slice(lDisplayed,lDisplayed+LBATCH);
  const html = batch.map(l=>{
    let selfie = 'https://placehold.co/84x84/222/fff?text=No+Photo';
    if(l.selfie_b64){
      const clean = l.selfie_b64.replace(/\s/g,'');
      const payload = clean.split(';base64,')[1]||clean;
      if(payload.length>100) selfie=`data:image/jpeg;base64,${payload}`;
    }
    const time = l.created_at ? new Date(l.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '-';
    return `<div class="lead-card" onclick="showHistory('${l.mobile}')">
      <img src="${selfie}" class="selfie-img" onerror="this.src='https://placehold.co/84x84/222/fff?text=No+Photo'">
      <div>
        <h4>${l.name||'Guest'}</h4>
        <p style="color:var(--brand);font-weight:700">${l.mobile}</p>
        <div class="meta">
          <span>${l.match_count||0} photos found</span>
          <span>Latest: ${time}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('leadsGrid').innerHTML += html;
  lDisplayed += batch.length;
  document.getElementById('loadMoreLeadsBtn').style.display = lDisplayed<fLeads.length?'block':'none';
}

function showHistory(mobile){
  alert('History feature coming soon — mobile: '+mobile);
}

// BAKI FUNCTIONS (events, upload, links, download, viewer) same as your original code — sab working hai

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
  document.getElementById(id).classList.add('active');
  if(id==='galleryTab' && allPhotos.length>0) renderNextBatch();
}

function formatBytes(b){
  if(!b)return'0 B';const k=1024; s=['B','KB','MB','GB'];
  i=Math.floor(Math.log(b)/Math.log(k));
  return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i];
}

function openViewer(i){document.getElementById('viewerImg').src=filteredPhotos[i].url;document.getElementById('viewer').classList.add('open')}
function closeViewer(){document.getElementById('viewer').classList.remove('open')}

window.onload = init;
</script>
</body>
</html>
