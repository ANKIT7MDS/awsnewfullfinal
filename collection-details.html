<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Manager • Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: linear-gradient(145deg, #1a1a25, #232331);
            --brand: #6366f1;
            --brand-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --glass: rgba(20, 20, 30, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* Header & Top Bar */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px; background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg);
            margin-bottom: 32px;
        }

        .back-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .back-link:hover { color: var(--brand); }

        .stats-line { display: flex; gap: 20px; font-size: 14px; color: var(--text-secondary); margin-top: 10px; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 6px; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; background: var(--bg-secondary); padding: 6px; border-radius: var(--radius-md); margin-bottom: 24px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; transition: var(--transition); }
        .tab.active { background: var(--brand-gradient); color: white; }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Grids */
        .card { background: #1a1a25; border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .photo-card { aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        /* People Icons Bar */
        #faceIconsBar { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; }
        .face-item { min-width: 80px; text-align: center; cursor: pointer; }
        .face-wrapper { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; border: 3px solid transparent; transition: 0.2s; margin: 0 auto; }
        .face-wrapper.selected { border-color: var(--success); transform: scale(1.1); }
        .face-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .face-name { font-size: 11px; color: var(--text-secondary); margin-top: 5px; }

        /* Buttons */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--brand-gradient); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-danger { background: var(--danger); color: white; }

        /* Upload Zone */
        #dropZone { border: 2px dashed rgba(255,255,255,0.1); padding: 40px; text-align: center; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        #dropZone:hover { border-color: var(--brand); background: rgba(99,102,241,0.05); }

        /* Leads Grid */
        .lead-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .lead-card { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; display: flex; gap: 15px; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .lead-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--brand); }

        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a25; padding: 30px; border-radius: 16px; max-width: 600px; width: 100%; position: relative; }

        /* Progress Bar */
        .progress-box { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 15px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; background: var(--brand); width: 0%; transition: 0.3s; }

        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; }

        /* Toast */
        #toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: white; z-index: 9999; display: none; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="wrap">
    <!-- TOP BAR -->
    <div class="top-bar">
        <div>
            <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Collections</a>
            <h1 id="collectionName">Loading...</h1>
            <div class="stats-line">
                <span class="stat-item"><i class="fas fa-image"></i> <span id="photoCount">0</span> Photos</span>
                <span class="stat-item"><i class="fas fa-user-friends"></i> <span id="leadCount">0</span> Guests</span>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
            <button class="btn btn-primary" id="staffLinkBtn"><i class="fas fa-link"></i> Staff Link</button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('gallery')"><i class="fas fa-th"></i> Gallery</div>
        <div class="tab" onclick="switchTab('events')"><i class="fas fa-calendar"></i> Events</div>
        <div class="tab" onclick="switchTab('upload')"><i class="fas fa-upload"></i> Upload</div>
        <div class="tab" onclick="switchTab('guests')"><i class="fas fa-users"></i> Guests (Leads)</div>
    </div>

    <!-- GALLERY -->
    <div id="galleryTab" class="tab-content active">
        <div id="faceIconsBar"></div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- EVENTS -->
    <div id="eventsTab" class="tab-content">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Event Management</h3>
                <button class="btn btn-primary" onclick="showEventForm()"><i class="fas fa-plus"></i> Create Event</button>
            </div>
            <div id="eventList"></div>
        </div>
    </div>

    <!-- UPLOAD -->
    <div id="uploadTab" class="tab-content">
        <div class="card">
            <label>Select Event to Upload Into:</label>
            <select id="uploadEventSelect" style="margin-bottom: 20px;"><option>Loading events...</option></select>
            
            <div id="dropZone" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 40px; color: var(--brand); margin-bottom: 10px;"></i>
                <h3>Click or Drag Photos Here</h3>
                <p>Supports JPG, PNG, HEIC</p>
                <input type="file" id="fileInput" multiple hidden accept="image/*,.heic">
            </div>

            <div id="selectedFilesInfo" style="margin-top: 15px; display: none;">
                <p><span id="fileCountDisplay">0</span> files selected</p>
                <button class="btn btn-primary" style="margin-top: 10px;" onclick="startBatchUpload()">Start Upload</button>
            </div>

            <div class="progress-box" id="uploadProgressBox">
                <div class="progress-fill" id="uploadProgressBar"></div>
            </div>
            <p id="uploadStatusText" style="margin-top: 10px; font-size: 13px; text-align: center; color: var(--text-secondary);"></p>
        </div>
    </div>

    <!-- GUESTS / LEADS -->
    <div id="guestsTab" class="tab-content">
        <div class="card">
            <h3>Guest Search Leads</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">People who searched for photos using their selfie.</p>
            <div class="lead-grid" id="leadsGrid"></div>
        </div>
    </div>
</div>

<!-- MODALS -->
<div class="modal" id="eventModal">
    <div class="modal-content">
        <h3 id="eventModalTitle">New Event</h3>
        <input type="text" id="mEventName" placeholder="Event Name (e.g. Wedding Ceremony)">
        <input type="date" id="mEventDate">
        <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
            <button class="btn btn-secondary" onclick="closeModal('eventModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveEvent()">Save Event</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIG & STATE ---
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const collectionId = new URLSearchParams(window.location.search).get('id');
    const token = localStorage.getItem('idToken');

    let state = {
        photos: [],
        events: [],
        faces: [],
        leads: [],
        selectedFiles: [],
        activeFaceFilter: null
    };

    // --- INITIALIZATION ---
    window.onload = () => {
        if(!collectionId || !token) {
            window.location.href = "login.html";
            return;
        }
        refreshData();
    };

    async function refreshData() {
        showToast("Fetching data...", "info");
        await Promise.all([
            fetchEvents(),
            fetchPhotos(),
            fetchFaces(),
            fetchLeads()
        ]);
        renderAll();
    }

    // --- API CALLS ---
    async function apiCall(endpoint, method = 'POST', body = null) {
        try {
            const options = {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            if(body) options.body = JSON.stringify(body);
            
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if(!res.ok) throw new Error(await res.text());
            return await res.json();
        } catch (e) {
            console.error("API ERROR:", e);
            showToast(e.message, "danger");
            return null;
        }
    }

    async function fetchEvents() {
        const data = await apiCall('/get-events', 'POST', { collection_id: collectionId });
        if(data) state.events = data.events || [];
    }

    async function fetchPhotos() {
        const data = await apiCall('/get-photos', 'POST', { collection_id: collectionId, limit: 100 });
        if(data) state.photos = data.photos || [];
    }

    async function fetchFaces() {
        const data = await apiCall('/list_people', 'POST', { collection_id: collectionId });
        if(data) state.faces = data.people || [];
    }

    async function fetchLeads() {
        // Backend expects 'collectionId' as query param for save-details GET
        const res = await fetch(`${API_BASE}/save-details?collectionId=${collectionId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        // Backend returns an array or {leads: []}
        state.leads = data.leads || data.history || data || [];
    }

    // --- UPLOAD LOGIC ---
    document.getElementById('fileInput').onchange = (e) => {
        state.selectedFiles = Array.from(e.target.files);
        document.getElementById('fileCountDisplay').innerText = state.selectedFiles.length;
        document.getElementById('selectedFilesInfo').style.display = state.selectedFiles.length ? 'block' : 'none';
    };

    async function startBatchUpload() {
        const eventId = document.getElementById('uploadEventSelect').value;
        if(!eventId) return showToast("Please select an event", "danger");

        const btn = document.querySelector('[onclick="startBatchUpload()"]');
        btn.disabled = true;
        
        const progressBox = document.getElementById('uploadProgressBox');
        const progressBar = document.getElementById('uploadProgressBar');
        const statusText = document.getElementById('uploadStatusText');
        
        progressBox.style.display = 'block';
        
        // 1. Get Presigned URLs
        const filesMetadata = state.selectedFiles.map(f => ({ name: f.name }));
        const urlData = await apiCall('/generate-upload-urls', 'POST', {
            collection_id: collectionId,
            event_id: eventId,
            files: filesMetadata
        });

        if(!urlData || !urlData.urls) {
            btn.disabled = false;
            return;
        }

        // 2. Upload to S3
        let successCount = 0;
        for(let i = 0; i < state.selectedFiles.length; i++) {
            const file = state.selectedFiles[i];
            const uploadInfo = urlData.urls[i];
            
            statusText.innerText = `Uploading ${file.name}...`;
            
            try {
                const s3Res = await fetch(uploadInfo.uploadURL, {
                    method: 'PUT',
                    body: file,
                    headers: { 'Content-Type': 'image/jpeg' }
                });
                if(s3Res.ok) successCount++;
            } catch (err) {
                console.error("S3 Upload Failed:", err);
            }

            const progress = ((i + 1) / state.selectedFiles.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        showToast(`${successCount} photos uploaded successfully!`, "success");
        statusText.innerText = "Processing started. Faces will appear shortly.";
        
        setTimeout(() => {
            refreshData();
            btn.disabled = false;
            progressBox.style.display = 'none';
            state.selectedFiles = [];
            document.getElementById('selectedFilesInfo').style.display = 'none';
        }, 3000);
    }

    // --- RENDER FUNCTIONS ---
    function renderAll() {
        document.getElementById('collectionName').innerText = new URLSearchParams(window.location.search).get('name') || "Collection";
        document.getElementById('photoCount').innerText = state.photos.length;
        document.getElementById('leadCount').innerText = state.leads.length;

        renderGallery();
        renderFaceBar();
        renderEvents();
        renderLeads();
        
        // Update Upload Select
        const sel = document.getElementById('uploadEventSelect');
        sel.innerHTML = state.events.map(e => `<option value="${e.event_id}">${e.name}</option>`).join('') || '<option value="">No Events Found</option>';
    }

    function renderGallery() {
        const grid = document.getElementById('galleryGrid');
        let photosToDisplay = state.photos;
        
        if(state.activeFaceFilter) {
            photosToDisplay = state.photos.filter(p => p.face_ids && p.face_ids.includes(state.activeFaceFilter));
        }

        grid.innerHTML = photosToDisplay.map(p => `
            <div class="photo-card" onclick="window.open('${p.url}', '_blank')">
                <img src="${p.thumbnail_url || p.url}" loading="lazy">
            </div>
        `).join('') || '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #555;">No photos found in this view.</p>';
    }

    function renderFaceBar() {
        const bar = document.getElementById('faceIconsBar');
        bar.innerHTML = state.faces.map(f => `
            <div class="face-item" onclick="toggleFaceFilter('${f.FaceId}')">
                <div class="face-wrapper ${state.activeFaceFilter === f.FaceId ? 'selected' : ''}">
                    <img src="${f.photo_url || 'https://via.placeholder.com/70'}" onerror="this.src='https://via.placeholder.com/70'">
                </div>
                <div class="face-name">${f.FaceName || 'Unknown'}</div>
            </div>
        `).join('');
    }

    function toggleFaceFilter(id) {
        state.activeFaceFilter = state.activeFaceFilter === id ? null : id;
        renderFaceBar();
        renderGallery();
    }

    function renderEvents() {
        const list = document.getElementById('eventList');
        list.innerHTML = state.events.map(e => `
            <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;">
                <div>
                    <strong>${e.name}</strong><br>
                    <small style="color: #777;">${e.event_date} • ${e.photo_count || 0} Photos</small>
                </div>
                <button class="btn btn-secondary" onclick="deleteEvent('${e.event_id}')"><i class="fas fa-trash"></i></button>
            </div>
        `).join('') || '<p>No events found.</p>';
    }

    function renderLeads() {
        const grid = document.getElementById('leadsGrid');
        // Backend usually returns 'mobile' or 'phone'
        grid.innerHTML = state.leads.map(l => {
            // Using full base64 if present, else placeholder
            const selfie = l.selfie_b64 ? `data:image/jpeg;base64,${l.selfie_b64}` : 'https://via.placeholder.com/60';
            return `
                <div class="lead-card">
                    <img src="${selfie}" class="lead-img" onerror="this.src='https://via.placeholder.com/60'">
                    <div style="flex: 1;">
                        <div style="font-weight: 700;">${l.name || 'Guest User'}</div>
                        <div style="color: var(--brand); font-size: 13px;">${l.mobile || l.phone || 'N/A'}</div>
                        <div style="font-size: 11px; color: #555; margin-top: 5px;">
                            ${l.match_count || 0} photos found • ${new Date(l.timestamp || l.created_at).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `;
        }).join('') || '<p style="grid-column: 1/-1; text-align: center; padding: 20px;">No leads generated yet.</p>';
    }

    // --- EVENT ACTIONS ---
    function showEventForm() { document.getElementById('eventModal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    async function saveEvent() {
        const name = document.getElementById('mEventName').value;
        const date = document.getElementById('mEventDate').value;
        if(!name || !date) return showToast("Missing fields", "danger");

        const res = await apiCall('/upsert-event', 'POST', {
            collection_id: collectionId,
            name: name,
            event_date: date
        });
        if(res) {
            showToast("Event created!", "success");
            closeModal('eventModal');
            refreshData();
        }
    }

    async function deleteEvent(eid) {
        if(!confirm("Are you sure? All photos in this event will be lost.")) return;
        const res = await apiCall('/delete-event', 'POST', { collection_id: collectionId, event_id: eid });
        if(res) {
            showToast("Event deleted", "success");
            refreshData();
        }
    }

    // --- UI HELPERS ---
    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        event.currentTarget.classList.add('active');
        document.getElementById(name + 'Tab').classList.add('active');
    }

    function showToast(msg, type = "success") {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = type === "success" ? "#10b981" : (type === "info" ? "#3b82f6" : "#ef4444");
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }
</script>

</body>
</html>
