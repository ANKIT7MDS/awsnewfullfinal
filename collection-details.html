<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Collection Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0b0b0b;
  --card:#141414;
  --border:#2a2a2a;
  --text:#fff;
  --muted:#9aa0a6;
  --accent:#4da3ff;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}
header{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  background:var(--card);
  border:1px solid var(--border);
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
button:hover{border-color:var(--accent)}
.container{padding:18px}

.faces{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:12px;
}
.face{
  min-width:64px;
  height:64px;
  border-radius:50%;
  border:2px solid var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  background:#111;
  cursor:pointer;
}
.face.active{background:var(--accent)}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}
.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}
.load{
  text-align:center;
  margin:24px 0;
}
.debug{
  position:fixed;
  right:20px;
  bottom:20px;
}
.debug-panel{
  position:fixed;
  right:20px;
  bottom:70px;
  width:360px;
  max-height:60vh;
  overflow:auto;
  background:#0f0f0f;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  display:none;
  font-size:12px;
}
.err{color:#ff6b6b}
.ok{color:#4caf50}
</style>
</head>

<body>

<header>
  <div>Collection</div>
  <div>
    <button id="refreshBtn">Refresh</button>
  </div>
</header>

<div class="container">

  <!-- Faces -->
  <div class="faces" id="faces"></div>

  <!-- Photos -->
  <div class="grid" id="photos"></div>

  <div class="load">
    <button id="loadMoreBtn">Load More</button>
  </div>

</div>

<button class="debug" id="debugBtn">Debug</button>
<div class="debug-panel" id="debugPanel"></div>

<script>
/* ================= CONFIG ================= */
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const COLLECTION_ID = new URLSearchParams(location.search).get("id");

/* ================= STATE ================= */
let nextToken = null;
let allPhotos = [];
let currentFace = null;

/* ================= DEBUG ================= */
const debugPanel = document.getElementById("debugPanel");
function log(msg,type="ok"){
  const d=document.createElement("div");
  d.className=type;
  d.textContent=msg;
  debugPanel.appendChild(d);
}

/* ================= API ================= */
async function fetchPhotos(){
  const res = await fetch(API_BASE+"/get-photos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("id_token") || ""
    },
    body:JSON.stringify({
      collection_id:COLLECTION_ID,
      next_token:nextToken
    })
  });
  const data = await res.json();
  if(!res.ok) throw data;
  nextToken = data.next_token || null;
  return data.photos || [];
}

/* ================= FACE BUILD ================= */
function buildFaces(){
  const map = {};
  allPhotos.forEach(p=>{
    (p.face_ids||[]).forEach(fid=>{
      map[fid]=(map[fid]||0)+1;
    });
  });

  const facesDiv=document.getElementById("faces");
  facesDiv.innerHTML="";

  Object.keys(map).forEach(fid=>{
    const f=document.createElement("div");
    f.className="face";
    f.textContent="Unknown";
    f.onclick=()=>{
      currentFace=fid;
      document.querySelectorAll(".face").forEach(x=>x.classList.remove("active"));
      f.classList.add("active");
      renderPhotos();
    };
    facesDiv.appendChild(f);
  });

  log("Faces built: "+Object.keys(map).length);
}

/* ================= RENDER ================= */
function renderPhotos(){
  const grid=document.getElementById("photos");
  grid.innerHTML="";
  allPhotos
    .filter(p=>{
      if(!currentFace) return true;
      return (p.face_ids||[]).includes(currentFace);
    })
    .forEach(p=>{
      const c=document.createElement("div");
      c.className="card";
      const img=document.createElement("img");
      img.src=p.url;          // ✅ DIRECT S3 URL (NO BLOB)
      img.loading="lazy";     // ✅ LAZY
      img.onerror=()=>img.remove();
      c.appendChild(img);
      grid.appendChild(c);
    });
}

/* ================= LOAD ================= */
async function load(){
  try{
    const photos = await fetchPhotos();
    allPhotos.push(...photos);
    buildFaces();
    renderPhotos();
    if(!nextToken) document.getElementById("loadMoreBtn").style.display="none";
  }catch(e){
    log("API Error: "+(e.error||JSON.stringify(e)),"err");
  }
}

/* ================= EVENTS ================= */
document.getElementById("loadMoreBtn").onclick=load;
document.getElementById("refreshBtn").onclick=()=>location.reload();
document.getElementById("debugBtn").onclick=()=>{
  debugPanel.style.display = debugPanel.style.display==="block"?"none":"block";
};

/* ================= INIT ================= */
if(!COLLECTION_ID){
  alert("collection id missing");
}else{
  load();
}
</script>

</body>
</html>
