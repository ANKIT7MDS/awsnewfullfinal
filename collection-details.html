NOTE: Replace your existing file with this. Focus is faces bar + correct Authorization.
====================================================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Collection Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { background:#0b0b0b; color:#e6e6e6; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
    .card { border:1px solid #222; border-radius:14px; padding:6px; background:#111; }
    .thumb { width:100%; height:160px; object-fit:cover; border-radius:10px; }
    #faceIconsBar { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 16px; }
    .face-chip { display:flex; align-items:center; gap:8px; background:#151515; border:1px solid #292929; border-radius:18px; padding:5px 10px; cursor:pointer; }
    .face-chip img { width:28px; height:28px; border-radius:50%; object-fit:cover; border:1px solid #2e2e2e; }
    .muted { color:#9a9a9a; font-size:13px; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:12px 0; }
    .pill { background:#141414; border:1px solid #262626; border-radius:12px; padding:4px 10px; }
  </style>
</head>
<body>
  <h2>Collection</h2>

  <!-- Config (single source of truth) -->
  <script>
    window.APP_CONFIG = {
      API_BASE: "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod"
    };
  </script>

  <div class="toolbar">
    <div id="counts" class="pill">photos: <span id="photoCount">0</span></div>
    <div class="pill">filter: <span id="activeFilter" class="muted">none</span></div>
  </div>

  <div id="faceIconsBar"></div>

  <div id="gallery" class="grid"></div>

  <script>
    // --- State ---
    let idToken = "";            // WHY: must be raw JWT for Authorization: Bearer <idToken>
    let collectionId = "";       // set via query param ?collection_id=...
    let allPhotos = [];
    let filteredPhotos = null;
    let faceGroups = {};         // { faceId: { faceId, name?, count, thumbnailUrl } }

    // --- Init ---
    (function init() {
      const qp = new URLSearchParams(location.search);
      collectionId = qp.get("collection_id") || "";
      idToken = localStorage.getItem("idToken") || ""; // ensure login page stored this raw JWT
      if (!collectionId) alert("collection_id missing in URL");
      loadPhotos().then(() => buildAndRenderFaceBar());
    })();

    // --- API helper ---
    async function apiPost(path, body) {
      const res = await fetch(`${APP_CONFIG.API_BASE}/${path}`, {
        method: "POST",
        headers: {
          // FIX: Raw JWT. No hashing/base64.
          "Authorization": idToken ? `Bearer ${idToken}` : "",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        const t = await res.text().catch(()=> "");
        throw new Error(`${path} ${res.status}: ${t}`);
      }
      return res.json();
    }

    // --- Photos ---
    async function loadPhotos() {
      allPhotos = [];
      let next = null;
      do {
        const payload = { collection_id: collectionId, page_size: 60, next_token: next };
        const data = await apiPost("get-photos", payload);
        const items = Array.isArray(data.photos) ? data.photos : [];
        // Defaults for safety
        items.forEach(p => {
          if (!Array.isArray(p.face_ids)) p.face_ids = Array.isArray(p.faces) ? p.faces.map(f=>f.FaceId).filter(Boolean) : [];
        });
        allPhotos.push(...items);
        document.getElementById("photoCount").textContent = allPhotos.length;
        next = data.next_token || null;
      } while (next);
      renderGallery(false);
    }

    function renderGallery(isFiltered) {
      const container = document.getElementById("gallery");
      const set = isFiltered && Array.isArray(filteredPhotos) ? filteredPhotos : allPhotos;
      document.getElementById("activeFilter").textContent = isFiltered ? "face" : "none";
      container.innerHTML = set.map(p => `
        <div class="card">
          <img class="thumb" loading="lazy" src="${p.url}" alt="${p.photo_id}">
          <div class="muted" style="margin-top:6px;">${(p.ai_tags||[]).slice(0,3).join(", ")}</div>
        </div>
      `).join("");
    }

    // --- Faces map + bar ---
    function buildLocalFaceMap() {
      faceGroups = {};
      (allPhotos || []).forEach(p => {
        const ids = Array.isArray(p.face_ids) ? p.face_ids
                  : (Array.isArray(p.faces) ? p.faces.map(f => f.FaceId).filter(Boolean) : []);
        ids.forEach(fid => {
          if (!fid) return;
          if (!faceGroups[fid]) faceGroups[fid] = { faceId: fid, name: null, count: 0, thumbnailUrl: p.url };
          faceGroups[fid].count += 1;
          if (!faceGroups[fid].thumbnailUrl && p.url) faceGroups[fid].thumbnailUrl = p.url;
        });
      });
    }

    async function enhanceFacesFromApi() {
      try {
        const data = await apiPost("list_people", { collection_id: collectionId });
        const people = Array.isArray(data.people) ? data.people : [];
        people.forEach(p => {
          const fid = p.FaceId || p.face_id || p.faceId;
          if (!fid) return;
          if (!faceGroups[fid]) faceGroups[fid] = { faceId: fid, name: null, count: 0, thumbnailUrl: null };
          faceGroups[fid].name = p.FaceName || faceGroups[fid].name;
          if (!faceGroups[fid].thumbnailUrl && p.thumbnail_url) faceGroups[fid].thumbnailUrl = p.thumbnail_url;
          if ((p.count||0) > faceGroups[fid].count) faceGroups[fid].count = p.count;
        });
      } catch (e) {
        console.warn("list_people failed", e);
      }
    }

    function renderFaceBar() {
      const bar = document.getElementById("faceIconsBar");
      const entries = Object.values(faceGroups).filter(g => g.count > 0)
        .sort((a,b) => b.count - a.count);
      if (entries.length === 0) {
        bar.innerHTML = `<div class="muted">No faces detected</div>`;
        return;
      }
      bar.innerHTML = "";
      entries.forEach(g => {
        const node = document.createElement("div");
        node.className = "face-chip";
        node.title = (g.name || g.faceId) + " • " + g.count;

        const img = document.createElement("img");
        img.src = g.thumbnailUrl || "data:image/gif;base64,R0lGODlhAQABAAAAACw=";
        node.appendChild(img);

        const label = document.createElement("span");
        label.textContent = g.name || "Unnamed";
        node.appendChild(label);

        const cnt = document.createElement("span");
        cnt.className = "muted";
        cnt.textContent = g.count;
        node.appendChild(cnt);

        // Left click => filter photos by face
        node.addEventListener("click", () => {
          filteredPhotos = allPhotos.filter(p => {
            const ids = Array.isArray(p.face_ids) ? p.face_ids
                      : (Array.isArray(p.faces) ? p.faces.map(f => f.FaceId) : []);
            return Array.isArray(ids) && ids.includes(g.faceId);
          });
          renderGallery(true);
        });

        // Right click => rename (save-face-name)
        node.addEventListener("contextmenu", async (e) => {
          e.preventDefault();
          const newName = prompt("Enter name for this face", g.name || "");
          if (newName === null) return;
          try {
            await apiPost("save-face-name", {
              collection_id: collectionId,
              face_id: g.faceId,
              face_name: newName
            });
            g.name = newName;
            renderFaceBar();
          } catch (err) {
            alert("Rename failed");
          }
        });

        bar.appendChild(node);
      });
    }

    async function buildAndRenderFaceBar() {
      buildLocalFaceMap();      // local from photos
      await enhanceFacesFromApi(); // names + thumbnails if available
      renderFaceBar();
    }
  </script>
</body>
</html>
