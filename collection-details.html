<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { 
            --bg: #000000; --card: #1e1e1e; --border: #333; --text: #e0e0e0; 
            --muted: #888; --brand: #4285f4; --brand-hover: #3367d6; 
            --danger: #ea4335; --ok: #34a853; 
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; padding-bottom: 60px; }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 10px; }
        
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 10px; background: #111; border-radius: 8px; }
        .back-link { color: var(--muted); text-decoration: none; font-size: 14px; display:flex; align-items:center; gap:5px; }
        h1 { font-size: 18px; margin: 0; font-weight: 500; color: white; }
        .stats-line { font-size:12px; color:var(--muted); margin-top:2px; }
        
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border); margin-bottom: 15px; overflow-x: auto; padding: 0 10px; scroll-behavior: smooth; }
        .tab { padding: 12px 0; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
        .tab.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 2px;
        }
        .photo-card {
            position: relative;
            aspect-ratio: 1 / 1;
            background: #222;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-card:hover { transform: scale(1.05); }
        .photo-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: opacity 0.2s; opacity: 0;
        }
        .photo-card img.loaded { opacity: 1; }
        .photo-delete-btn { position: absolute; top: 2px; right: 2px; background: rgba(200, 0, 0, 0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: none; font-size: 12px; z-index: 5; }
        .photo-card:hover .photo-delete-btn { display: block; }
        .date-header {
            grid-column: 1 / -1;
            font-size: 14px; font-weight: 500; color: #fff;
            margin: 20px 0 10px 5px;
        }
        
        .face-group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 10px; }
        .face-group { text-align: center; cursor: pointer; padding: 10px; background: #151515; border-radius: 8px; transition: 0.2s; position: relative; }
        .face-group:hover { background: #222; }
        .face-thumb { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--brand); margin: 0 auto 5px; background: #333; }
        .face-name { font-size: 13px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .face-count { font-size: 11px; color: var(--muted); }
        .rename-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: none; font-size: 12px; }
        .face-group:hover .rename-btn { display: block; }
        
        .lead-card { background: #151515; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .lead-card:hover { background: #222; }
        .selfie-img { width: 60px; height: 60px; min-width: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--brand); background: #333; }
        .lead-info { flex-grow: 1; overflow: hidden; }
        .lead-name { font-size: 16px; font-weight: 600; color: #fff; }
        .lead-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; justify-content: space-between; }
        
        .viewer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: none; justify-content: center; align-items: center; z-index: 2000; }
        .viewer.open { display: flex; }
        #viewerImg { max-width: 100%; max-height: 100%; object-fit: contain; }
        .viewer-close { position: absolute; top: 15px; left: 15px; color: #fff; font-size: 30px; cursor: pointer; z-index: 2001; background: rgba(0,0,0,0.5); width: 40px; height: 40px; text-align: center; line-height: 40px; border-radius: 50%; }
        .viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; font-size: 30px; cursor: pointer; width: 50px; height: 50px; border-radius: 50%; z-index: 2001; }
        .viewer-nav-left { left: 20px; }
        .viewer-nav-right { right: 20px; }
        .viewer-actions { position: absolute; bottom: 20px; display: flex; gap: 20px; z-index: 2001; }
        
        .btn { background: var(--brand); color: #fff; border: none; border-radius: 20px; padding: 6px 16px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn:hover { background: var(--brand-hover); }
        .btn.secondary { background: #333; color: #fff; }
        .btn.danger { background: var(--danger); }
        .filter-row-top { padding: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; flex: 1; min-width: 120px; }
        .loading { text-align: center; padding: 50px; color: var(--muted); }
        .error { color: var(--danger); background: rgba(234,67,53,0.1); padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 4px solid var(--danger); }
        .success { color: var(--ok); background: rgba(52,168,83,0.1); padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 4px solid var(--ok); }
        
        .custom-modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .custom-modal-content { background: var(--card); padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; }
        
        @media (max-width: 768px) {
            .tabs { gap: 10px; }
            .tab { font-size: 12px; padding: 8px 0; }
            .filter-row-top { flex-direction: column; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 1px; }
            .lead-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top-bar">
        <div>
            <a href="dashboard.html" class="back-link">⬅ Dashboard</a>
            <h1><span id="collectionName">Loading...</span></h1>
            <div class="stats-line"><span id="totalPhotos">0</span> Photos • <span id="totalLeads">0</span> Guests</div>
        </div>
        <a href="#" id="assistantLink" target="_blank" class="btn secondary">⚡ Upload Link</a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('galleryTab')">Photos</div>
        <div class="tab" onclick="switchTab('faceGroupTab')">People</div>
        <div class="tab" onclick="switchTab('analyticsTab')">Guests</div>
        <div class="tab" onclick="switchTab('eventsTab')">Events</div>
        <div class="tab" onclick="switchTab('uploadTab')">Upload</div>
        <div class="tab" onclick="switchTab('linksTab')">Links</div>
    </div>

    <!-- GALLERY -->
    <div id="galleryTab" class="tab-content active">
        <div id="galleryContainer">
            <p class="loading">Loading photos...</p>
        </div>
        <div style="text-align:center; padding:20px;">
            <button id="loadMoreBtn" class="btn secondary" style="display:none;" onclick="renderNextBatch()">Load More</button>
        </div>
    </div>

    <!-- PEOPLE -->
    <div id="faceGroupTab" class="tab-content">
        <div class="filter-row-top">
            <button class="btn secondary" onclick="buildFaceGroups(true)">🔄 Refresh Faces</button>
        </div>
        <div id="faceGroupGrid" class="face-group-grid"></div>
        <p id="noFacesMessage" class="loading" style="display:none;">No faces found yet.</p>
    </div>

    <!-- GUESTS -->
    <div id="analyticsTab" class="tab-content">
        <div class="filter-row-top">
            <input type="tel" id="mobileFilter" placeholder="Search Mobile" oninput="debounceAnalyticsFetch(this.value)">
        </div>
        <div id="leadsGrid" class="lead-grid"></div>
        <p id="noLeadsMessage" class="loading" style="display:none;">No guest leads yet.</p>
        
        <!-- HISTORY VIEWER -->
        <div id="historyViewer" style="display:none; margin-top:20px; background:#111; padding:15px; border-radius:8px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <h3 id="historyHeader" style="margin:0; color:white;">History</h3>
                <button class="btn secondary" style="padding:4px 10px;" onclick="hideHistoryViewer()">Close</button>
            </div>
            <table style="width:100%; font-size:13px;">
                <thead><tr style="text-align:left; color:var(--muted);"><th>Time</th><th>Link</th><th>Matches</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <!-- EVENTS -->
    <div id="eventsTab" class="tab-content">
        <div style="padding:10px;">
            <button class="btn" onclick="showEventForm()">+ New Event</button>
        </div>
        <div id="eventForm" style="display:none; padding:15px; background:#151515; margin:10px; border-radius:8px;">
            <input type="text" id="eventName" placeholder="Name" style="margin-bottom:5px; width:100%;">
            <input type="date" id="eventDate" style="margin-bottom:10px; width:100%;">
            <button class="btn" id="saveEventBtn">Save</button>
            <button class="btn secondary" onclick="hideEventForm()">Cancel</button>
        </div>
        <div id="eventsList" style="padding:10px;"></div>
    </div>

    <!-- UPLOAD -->
    <div id="uploadTab" class="tab-content">
        <div style="max-width:600px; margin:20px auto; text-align:center;">
            <select id="uploadEventSelect" style="width:100%; margin-bottom:10px; padding:10px;"><option value="">Select Event...</option></select>
            <div id="dropZone" style="border:2px dashed #444; padding:40px; border-radius:10px;" onclick="document.getElementById('fileInput').click()">
                <p>Click to Upload Photos</p>
                <input type="file" id="fileInput" multiple style="display:none" accept="image/*">
            </div>
            <div id="uploadStatus" style="margin-top:10px; color:#aaa;"></div>
        </div>
    </div>

    <!-- LINKS -->
    <div id="linksTab" class="tab-content">
        <div style="padding:20px; text-align:center;">
            <button class="btn" onclick="generateLink()">Generate Search Link</button>
            <div id="linkResult" style="margin-top:20px; display:none;">
                <a id="generatedLink" href="#" target="_blank" style="color:var(--brand); font-size:16px;"></a>
                <br><br>
                <button class="btn secondary" onclick="copyLink()">Copy Link</button>
            </div>
        </div>
    </div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewer()">
    <div class="viewer-close" onclick="closeViewer()">×</div>
    <button class="viewer-nav viewer-nav-left" onclick="navPhoto(-1)">‹</button>
    <img id="viewerImg" src="" onclick="event.stopPropagation()">
    <button class="viewer-nav viewer-nav-right" onclick="navPhoto(1)">›</button>
    <div class="viewer-actions">
        <button class="btn" onclick="downloadCurrentPhoto()">⬇ Download</button>
        <button class="btn danger" onclick="deleteCurrentPhoto()">🗑 Delete</button>
    </div>
</div>

<!-- Rename Modal -->
<div id="renameModal" class="custom-modal-backdrop" onclick="this.style.display='none'">
    <div class="custom-modal-content" onclick="event.stopPropagation()">
        <h3>Rename Person</h3>
        <input type="text" id="renameInput" placeholder="Enter Name">
        <div class="modal-buttons">
            <button class="btn secondary" onclick="document.getElementById('renameModal').style.display='none'">Cancel</button>
            <button class="btn" id="confirmRenameBtn">Save</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const urlParams = new URLSearchParams(window.location.search);
    const collectionId = urlParams.get("id");
    const idToken = localStorage.getItem("idToken");
    if(!idToken) window.location.href = 'login.html';
    document.getElementById('assistantLink').href = `quick-upload.html?id=${collectionId}`;

    let allPhotos = [], filteredPhotos = [], displayedPhotosCount = 0;
    const BATCH_SIZE = 50;
    let peopleMap = {}, allLeads = [], eventsMap = new Map();
    let currentPhotoIdx = 0;
    let debounceTimer;

    // --- Helpers ---
    function formatBytes(bytes) { if(!+bytes) return '0 B'; const k=1024, i=Math.floor(Math.log(bytes)/Math.log(k)); return `${parseFloat((bytes/Math.pow(k,i)).toFixed(2))} ${['B','KB','MB','GB'][i]}`; }
    function formatLeadTime(iso) { if(!iso) return '-'; try { return new Date(iso).toLocaleString('en-IN'); } catch { return iso.substring(0,10); } }

    // --- Init ---
    async function init() {
        try {
            await fetchPeople();
            const res = await fetch(`${API_BASE}/get-events`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: collectionId })
            });
            if (!res.ok) throw new Error("Failed to load events");
            const data = await res.json();
            const summary = data.collection_summary || {};
            
            const nameEl = document.getElementById('collectionName');
            if (nameEl) nameEl.textContent = summary.name || "Collection";
            const photosEl = document.getElementById('totalPhotos');
            if (photosEl) photosEl.textContent = summary.photo_count || 0;
            const leadsEl = document.getElementById('totalLeads');
            if (leadsEl) leadsEl.textContent = summary.leads_count || 0;

            renderEventsList(data.events || []);
            eventsMap = new Map((data.events || []).map(e => [e.event_id, e]));
            
            fetchPhotos();
        } catch (e) {
            console.error(e);
            document.body.innerHTML += '<div class="error">Failed to load collection.</div>';
        }
    }

    // --- People ---
    async function fetchPeople() {
        try {
            const res = await fetch(`${API_BASE}/list_people?collection_id=${collectionId}`, {
                headers: { 'Authorization': `Bearer ${idToken}` }
            });
            if (res.ok) {
                const data = await res.json();
                peopleMap = {};
                (data.people || []).forEach(p => peopleMap[p.FaceId] = p.FaceName || 'Unknown');
            }
        } catch (e) { console.warn("People fetch failed:", e); }
    }

    // --- Photos ---
    async function fetchPhotos() {
        document.getElementById('galleryContainer').innerHTML = '<p class="loading">Loading photos...</p>';
        try {
            const res = await fetch(`${API_BASE}/get-photos`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: collectionId })
            });
            if (!res.ok) throw new Error("Photos fetch failed");
            const data = await res.json();
            allPhotos = data.photos || [];
            allPhotos.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
            filteredPhotos = [...allPhotos];
            
            document.getElementById('galleryContainer').innerHTML = '';
            displayedPhotosCount = 0;
            renderNextBatch();
            buildFaceGroups();
        } catch (e) {
            document.getElementById('galleryContainer').innerHTML = '<p class="error">Failed to load photos.</p>';
            console.error(e);
        }
    }

    function renderNextBatch() {
        const container = document.getElementById('galleryContainer');
        const batch = filteredPhotos.slice(displayedPhotosCount, displayedPhotosCount + BATCH_SIZE);
        
        if(batch.length === 0 && displayedPhotosCount === 0) {
            container.innerHTML = '<p class="loading">No photos found.</p>';
            return;
        }
        
        let lastDate = '';
        batch.forEach((p, idx) => {
            const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : 'Recent';
            if(dateStr !== lastDate) {
                const header = document.createElement('div');
                header.className = 'date-header';
                header.textContent = dateStr;
                container.appendChild(header);
                lastDate = dateStr;
            }
            const div = document.createElement('div');
            div.className = 'photo-card';
            div.innerHTML = `
                <button class="photo-delete-btn" onclick="deletePhoto('${p.photo_id}', event)">×</button>
                <img src="${p.thumbnail_url || p.url}" loading="lazy" onload="this.classList.add('loaded')">
            `;
            div.onclick = (e) => { if(!e.target.classList.contains('photo-delete-btn')) openViewer(displayedPhotosCount + idx); };
            container.appendChild(div);
        });
        
        displayedPhotosCount += batch.length;
        document.getElementById('loadMoreBtn').style.display = displayedPhotosCount < filteredPhotos.length ? 'block' : 'none';
    }

    window.deletePhoto = async function(pid, e) {
        e.stopPropagation();
        if(!confirm("Delete this photo?")) return;
        try {
            await fetch(`${API_BASE}/delete-photo`, { 
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ photo_id: pid, collection_id: collectionId })
            });
            e.target.parentElement.remove();
        } catch(e) { alert("Delete failed"); }
    }

    // --- People Tab ---
    function buildFaceGroups() {
        const groups = {};
        allPhotos.forEach(p => {
            (p.faces || []).forEach(f => {
                const fid = f.FaceId;
                if(!fid) return;
                if(!groups[fid]) groups[fid] = { id: fid, count: 0, thumb: p.thumbnail_url || p.url, name: peopleMap[fid] || 'Unknown' };
                groups[fid].count++;
            });
        });
        
        const grid = document.getElementById('faceGroupGrid');
        grid.innerHTML = '';
        const sorted = Object.values(groups).sort((a,b) => b.count - a.count);
        
        if(sorted.length === 0) {
            document.getElementById('noFacesMessage').style.display = 'block';
            return;
        }
        document.getElementById('noFacesMessage').style.display = 'none';
        
        sorted.forEach(g => {
            grid.innerHTML += `
                <div class="face-group">
                    <button class="rename-btn" onclick="openRenameModal('${g.id}', '${g.name}')">✏️</button>
                    <div onclick="filterByFace('${g.id}')">
                        <img src="${g.thumb}" class="face-thumb" onerror="this.src='https://placehold.co/80x80/333/fff?text=?'">
                        <div class="face-name">${g.name}</div>
                        <div class="face-count">${g.count} photos</div>
                    </div>
                </div>`;
        });
    }

    function filterByFace(fid) {
        filteredPhotos = allPhotos.filter(p => (p.faces || []).some(f => f.FaceId === fid));
        document.getElementById('galleryContainer').innerHTML = '';
        displayedPhotosCount = 0;
        renderNextBatch();
        switchTab('galleryTab');
    }

    window.openRenameModal = function(fid, curr) {
        event.stopPropagation();
        const modal = document.getElementById('renameModal');
        const inp = document.getElementById('renameInput');
        inp.value = curr === 'Unknown' ? '' : curr;
        document.getElementById('confirmRenameBtn').onclick = async () => {
            const val = inp.value.trim();
            if(!val) return;
            try {
                await fetch(`${API_BASE}/save_face_name`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ FaceId: fid, FaceName: val, CollectionId: collectionId })
                });
                peopleMap[fid] = val;
                buildFaceGroups();
                modal.style.display = 'none';
            } catch(e) { alert("Save failed"); }
        };
        modal.style.display = 'flex';
    }

    // --- Guests/Leads ---
    async function fetchAnalytics() {
        document.getElementById('noLeadsMessage').style.display = 'block';
        document.getElementById('noLeadsMessage').textContent = 'Loading leads...';
        
        try {
            const res = await fetch(`${API_BASE}/save-details?collection_id=${collectionId}`, {
                headers: { 'Authorization': `Bearer ${idToken}` }
            });
            if (!res.ok) throw new Error("Leads fetch failed");
            const data = await res.json();
            allLeads = data.leads || [];
            
            renderLeads();
        } catch(e) {
            console.error(e);
            document.getElementById('noLeadsMessage').textContent = 'Failed to load leads.';
        }
    }

    function renderLeads() {
        const grid = document.getElementById('leadsGrid');
        grid.innerHTML = '';
        
        if(allLeads.length === 0) {
            document.getElementById('noLeadsMessage').textContent = 'No guest leads yet.';
            return;
        }
        document.getElementById('noLeadsMessage').style.display = 'none';
        
        allLeads.forEach(l => {
            let selfieSrc = 'https://placehold.co/60x60/333/fff?text=?';
            if(l.selfie_b64) {
                let clean = l.selfie_b64.replace(/\s/g, '');
                if(clean.includes('base64,')) clean = clean.split('base64,')[1];
                if(clean.length > 100) selfieSrc = `data:image/jpeg;base64,${clean}`;
            }
            
            const div = document.createElement('div');
            div.className = 'lead-card';
            div.onclick = () => showGuestHistory(l.mobile, l.name);
            div.innerHTML = `
                <img src="${selfieSrc}" class="selfie-img" onerror="this.src='https://placehold.co/60x60/333/fff?text=?'">
                <div class="lead-info">
                    <div class="lead-name">${l.name || 'Guest'}</div>
                    <div class="lead-mobile">${l.mobile || '-'}</div>
                    <div class="lead-meta">
                        <span>Matches: ${l.match_count || 0}</span>
                        <span>${formatLeadTime(l.created_at)}</span>
                    </div>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function debounceAnalyticsFetch() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fetchAnalytics, 500);
    }

    window.showGuestHistory = async function(mobile, name) {
        document.getElementById('leadsGrid').style.display = 'none';
        document.getElementById('historyViewer').style.display = 'block';
        document.getElementById('historyHeader').textContent = `History: ${name || mobile}`;
        
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '<tr><td colspan="3">Loading...</td></tr>';
        
        try {
            const res = await fetch(`${API_BASE}/save-details?mobile=${mobile}&collection_id=${collectionId}`, { headers: { 'Authorization': `Bearer ${idToken}` } });
            const d = await res.json();
            const hist = d.history || [];
            
            if(hist.length === 0) tbody.innerHTML = '<tr><td colspan="3">No history found.</td></tr>';
            else {
                tbody.innerHTML = hist.map(h => `<tr><td>${formatLeadTime(h.created_at)}</td><td>${h.link_id}</td><td>${h.match_count || 0}</td></tr>`).join('');
            }
        } catch { tbody.innerHTML = '<tr><td colspan="3">Error loading history.</td></tr>'; }
    }

    window.hideHistoryViewer = function() {
        document.getElementById('historyViewer').style.display = 'none';
        document.getElementById('leadsGrid').style.display = 'block';
    }

    // --- Events ---
    function renderEventsList(events) {
        const list = document.getElementById('eventsList');
        const sel = document.getElementById('uploadEventSelect');
        if (!list || !sel) return;
        list.innerHTML = ''; sel.innerHTML = '<option value="">Select Event...</option>';
        
        events.forEach(e => {
            sel.innerHTML += `<option value="${e.event_id}">${e.name}</option>`;
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;">
                    <div><strong>${e.name}</strong> <br><small style="color:#888">${e.event_date}</small></div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${e.photo_count||0} photos</span>
                        <button class="btn secondary" style="padding:4px 8px; font-size:11px;" onclick="editEvent('${e.event_id}', '${e.name}', '${e.event_date}')">Edit</button>
                        <button class="btn danger" style="padding:4px 8px; font-size:11px;" onclick="if(confirm('Delete ${e.name}?')) deleteEvent('${e.event_id}')">Del</button>
                    </div>
                </div>`;
        });
    }

    function showEventForm() {
        document.getElementById('eventForm').style.display = 'block';
        document.getElementById('saveEventBtn').onclick = saveNewEvent;
    }

    function hideEventForm() {
        document.getElementById('eventForm').style.display = 'none';
    }

    async function saveNewEvent() {
        const name = document.getElementById('eventName').value.trim();
        const date = document.getElementById('eventDate').value;
        if(!name) return alert("Event name required");
        try {
            await fetch(`${API_BASE}/upsert-event`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: collectionId, name, event_date: date })
            });
            hideEventForm();
            init();
        } catch(e) { alert("Failed to create event"); }
    }

    window.editEvent = function(eid, name, date) {
        document.getElementById('eventName').value = name;
        document.getElementById('eventDate').value = date;
        document.getElementById('saveEventBtn').onclick = () => updateEvent(eid);
        showEventForm();
    };

    async function updateEvent(eid) {
        const name = document.getElementById('eventName').value.trim();
        const date = document.getElementById('eventDate').value;
        if(!name) return alert("Event name required");
        try {
            await fetch(`${API_BASE}/upsert-event`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: collectionId, event_id: eid, name, event_date: date })
            });
            hideEventForm();
            init();
        } catch(e) { alert("Update failed"); }
    }

    async function deleteEvent(eid) {
        try {
            await fetch(`${API_BASE}/delete-event`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: collectionId, event_id: eid })
            });
            init();
        } catch(e) { alert("Delete failed"); }
    }

    // --- Upload ---
    const fileInput = document.getElementById('fileInput');
    fileInput.onchange = async () => {
        const eid = document.getElementById('uploadEventSelect').value;
        if(!eid) return alert("Select Event First!");
        const files = Array.from(fileInput.files);
        document.getElementById('uploadStatus').innerHTML = `<div class="success">Processing ${files.length} files...</div>`;
        
        let uploaded = 0;
        const BATCH = 10;
        for(let i=0; i<files.length; i+=BATCH) {
            const batch = files.slice(i, i+BATCH);
            try {
                const res = await fetch(`${API_BASE}/generate-upload-urls`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collection_id: collectionId, event_id: eid, files: batch.map(f => ({name: f.name, type: f.type || 'image/jpeg'})) })
                });
                const d = await res.json();
                await Promise.all(d.urls.map(async (u, idx) => {
                    await fetch(u.uploadURL, { method: 'PUT', body: batch[idx], headers: {'Content-Type': batch[idx].type || 'image/jpeg'} });
                    uploaded++;
                    document.getElementById('uploadStatus').innerHTML = `<div class="success">Uploaded ${uploaded}/${files.length}</div>`;
                }));
            } catch(e) { console.error(e); }
        }
        document.getElementById('uploadStatus').innerHTML = `<div class="success">Complete! Reloading...</div>`;
        setTimeout(() => location.reload(), 2000);
    };

    // --- Links ---
    async function generateLink() {
        try {
            const res = await fetch(`${API_BASE}/generate-search-link`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: collectionId })
            });
            if (!res.ok) throw new Error("Link generation failed");
            const d = await res.json();
            const el = document.getElementById('generatedLink');
            el.href = d.searchUrl; el.textContent = d.searchUrl;
            document.getElementById('linkResult').style.display = 'block';
        } catch(e) { alert("Failed to generate link"); }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('generatedLink').textContent);
        alert("Copied!");
    }

    // --- Viewer Navigation ---
    function openViewer(idx) {
        currentPhotoIdx = idx;
        document.getElementById('viewerImg').src = filteredPhotos[idx].url;
        document.getElementById('viewer').classList.add('open');
    }
    function closeViewer() { document.getElementById('viewer').classList.remove('open'); }
    function navPhoto(dir) {
        currentPhotoIdx = (currentPhotoIdx + dir + filteredPhotos.length) % filteredPhotos.length;
        openViewer(currentPhotoIdx);
    }
    function downloadCurrentPhoto() { saveAs(filteredPhotos[currentPhotoIdx].url, 'photo.jpg'); }

    // --- Tab Switch ---
    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${t}')"]`).classList.add('active');
        document.getElementById(t).classList.add('active');
        if(t === 'analyticsTab') fetchAnalytics();
        if(t === 'faceGroupTab') buildFaceGroups();
    }

    init();
</script>
</body>
</html>
