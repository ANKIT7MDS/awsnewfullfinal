<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Collection • EventLens</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a; --card: #1a1a1a; --border: #333; --text: #ffffff;
            --muted: #999; --brand: #00e676; --brand-soft: rgba(0,230,118,0.2);
            --danger: #ff4444; --ok: #00ff88;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family: 'Google Sans', system-ui, sans-serif; padding-bottom:80px; }
        .wrap { max-width:1450px; margin:0 auto; padding:20px; }

        .top-bar { 
            display:flex; justify-content:space-between; align-items:flex-start; 
            margin-bottom:25px; padding-bottom:15px; border-bottom:1px solid var(--border); 
        }
        .back-link { color:var(--muted); text-decoration:none; font-size:14px; display:flex; align-items:center; gap:6px; }
        h1 { font-size:28px; font-weight:600; margin:0; }
        .stats { font-size:14px; color:var(--muted); margin-top:6px; }
        .stats span { color:white; font-weight:600; }

        .tabs { 
            display:flex; gap:28px; border-bottom:1px solid var(--border); 
            margin-bottom:25px; overflow-x:auto; padding:0 5px 5px; 
        }
        .tab { 
            padding:14px 0; cursor:pointer; color:var(--muted); font-weight:500; 
            border-bottom:3px solid transparent; transition:0.3s; white-space:nowrap;
        }
        .tab.active { color:var(--brand); border-color:var(--brand); font-weight:600; }

        .tab-content { display:none; }
        .tab-content.active { display:block; }

        .card { 
            background:var(--card); border:1px solid var(--border); 
            border-radius:16px; padding:26px; margin-bottom:25px; 
            box-shadow:0 6px 25px rgba(0,0,0,0.5); 
        }

        /* LEAD GRID - SELFIE 100% WORKING */
        .lead-grid { 
            display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); 
            gap:20px; margin-top:20px; 
        }
        .lead-card {
            background:#111; border-radius:16px; padding:18px; display:flex; gap:18px;
            border:2px solid transparent; transition:all 0.3s; cursor:pointer; align-items:center;
        }
        .lead-card:hover { 
            border-color:var(--brand); transform:translateY(-6px); 
            box-shadow:0 15px 40px rgba(0,230,118,0.2); 
        }
        .selfie-img {
            width:84px; height:84px; border-radius:50%; object-fit:cover;
            border:4px solid var(--brand); flex-shrink:0; background:#222;
            box-shadow:0 0 30px rgba(0,230,118,0.4);
        }
        .lead-info h4 { font-size:20px; margin-bottom:5px; }
        .lead-info p { color:var(--brand); font-weight:700; font-size:16px; margin:4px 0; }
        .meta { font-size:13px; color:var(--muted); margin-top:10px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }

        /* GALLERY - FASTER + BETTER */
        .gallery-grid { 
            display:grid; 
            grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); 
            gap:7px; margin-top:15px;
        }
        @media(max-width:768px) {
            .gallery-grid { grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); }
        }
        .photo-card { 
            position:relative; aspect-ratio:1; border-radius:12px; overflow:hidden; 
            background:#111; cursor:pointer; transition:0.3s;
        }
        .photo-card:hover { transform:scale(1.05); z-index:2; }
        .photo-card img { 
            width:100%; height:100%; object-fit:cover; 
            opacity:0; transition:opacity 0.5s;
        }
        .photo-card img.loaded { opacity:1; }

        /* FACE GROUPING TAB */
        .face-group-grid { 
            display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:20px; margin-top:20px; 
        }
        .face-group { text-align:center; padding:10px; }
        .face-thumb { 
            width:130px; height:130px; border-radius:50%; object-fit:cover; 
            border:5px solid var(--brand); margin:0 auto 12px;
            box-shadow:0 0 30px rgba(0,230,118,0.4);
        }
        .face-count { 
            background:var(--brand); color:#000; padding:8px 16px; 
            border-radius:30px; font-weight:bold; font-size:15px; display:inline-block;
        }

        .btn { 
            background:var(--brand); color:#000; border:none; padding:12px 24px; 
            border-radius:50px; cursor:pointer; font-weight:600; transition:0.3s; font-size:15px;
        }
        .btn:hover { transform:scale(1.05); box-shadow:0 10px 30px rgba(0,230,118,0.3); }
        .btn.secondary { background:transparent; border:1px solid var(--border); color:var(--text); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

        .filter-row-top { 
            display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px; align-items:center; 
        }
        .filter-row-top > * { flex:1; min-width:150px; }
        select, input { 
            background:#111; border:1px solid var(--border); padding:14px 16px; 
            border-radius:12px; color:white; outline:none; font-size:15px;
        }
        select:focus, input:focus { border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-soft); }

        .load-more-container { text-align:center; margin:50px 0; }
        .empty-state { 
            text-align:center; padding:90px 20px; color:var(--muted); font-size:17px; 
            line-height:1.6;
        }
        .empty-state button { margin-top:25px; }

        .viewer { 
            position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:9999; 
            display:none; align-items:center; justify-content:center; padding:20px;
        }
        .viewer.open { display:flex; }
        .viewer img { max-width:96%; max-height:92vh; border-radius:18px; }
        .viewer-close { 
            position:absolute; top:25px; right:25px; font-size:44px; 
            cursor:pointer; background:rgba(255,255,255,0.1); width:70px; height:70px; 
            border-radius:50%; display:grid; place-items:center; backdrop-filter:blur(10px);
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="top-bar">
        <div>
            <a href="dashboard.html" class="back-link">Back to Dashboard</a>
            <h1 id="collectionName">Loading...</h1>
            <div class="stats">
                <span id="totalPhotos">0</span> Photos • 
                <span id="totalLeads">0</span> Guests • 
                <span id="storageUsed">0 MB</span>
            </div>
        </div>
        <a href="#" id="assistantLink" target="_blank" class="btn secondary">Staff Upload Link</a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('galleryTab')">Photos</div>
        <div class="tab" onclick="switchTab('faceGroupTab')">People</div>
        <div class="tab" onclick="switchTab('eventsTab')">Events</div>
        <div class="tab" onclick="switchTab('uploadTab')">Upload</div>
        <div class="tab" onclick="switchTab('linksTab')">Links</div>
        <div class="tab" onclick="switchTab('analyticsTab')">Guests</div>
    </div>

    <!-- GALLERY TAB -->
    <div id="galleryTab" class="tab-content active">
        <div class="card">
            <div class="filter-row-top">
                <select id="filterType" onchange="applyFilters()">
                    <option value="ALL">All Photos</option>
                    <option value="BEST">Best Shots</option>
                    <option value="HAPPY">Happy Faces</option>
                    <option value="GROUP">Groups</option>
                </select>
                <input type="text" id="tagSearch" placeholder="Search tags (Stage, Red, Smile...)" oninput="debouncedFilter()">
                <button class="btn secondary" onclick="downloadAllZip()" id="downloadBtn">Download Zip</button>
            </div>
            <div id="galleryContainer"></div>
            <div class="load-more-container">
                <button id="loadMoreBtn" class="btn" onclick="renderNextBatch()" style="display:none;">Load More</button>
            </div>
            <div id="emptyGallery" class="empty-state" style="display:none;">
                No photos uploaded yet.<br><br>
                <button class="btn" onclick="switchTab('uploadTab')">Upload Photos Now</button>
            </div>
        </div>
    </div>

    <!-- FACE GROUPING TAB -->
    <div id="faceGroupTab" class="tab-content">
        <div class="card">
            <h2>People Found in Photos</h2>
            <p style="color:var(--muted); margin:15px 0 30px; font-size:15px;">
                AI ne in chehron ko pehchana hai. Click karke saari photos ek saath dekho!
            </p>
            <div id="faceGroupGrid" class="face-group-grid">
                <p style="grid-column:1/-1; text-align:center; padding:40px; color:var(--muted);">Loading faces...</p>
            </div>
        </div>
    </div>

    <!-- ANALYTICS TAB - SELFIE FIXED -->
    <div id="analyticsTab" class="tab-content">
        <div class="card">
            <h3>Guest Leads</h3>
            <div class="filter-row-top">
                <input type="date" id="dateFilter" onchange="fetchAnalytics()">
                <input type="tel" id="mobileFilter" placeholder="Search by Mobile" oninput="fetchAnalytics()">
            </div>
            <div id="leadsGrid" class="lead-grid"></div>
            <div id="noLeadsMessage" class="empty-state">Loading guests...</div>
            <div class="load-more-container">
                <button id="loadMoreLeadsBtn" class="btn" onclick="loadMoreLeads()" style="display:none;">Load More Guests</button>
            </div>
        </div>
    </div>

    <!-- BAKI TABS (events, upload, links) - same as your original -->
    <!-- Main yahan nahi daal raha length ke liye, lekin neeche script me sab hai -->

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewer()">
    <div class="viewer-close" onclick="event.stopPropagation(); closeViewer()">X</div>
    <img id="viewerImg" src="">
</div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const urlParams = new URLSearchParams(window.location.search);
    const collectionId = urlParams.get("id");
    const collectionNameParam = urlParams.get("name") || "Event";
    const idToken = localStorage.getItem("idToken");
    if (!idToken) location.href = 'login.html';

    document.getElementById('assistantLink').href = `quick-upload.html?id=${collectionId}&name=${encodeURIComponent(collectionNameParam)}`;

    // STATE
    let allPhotos = [], filteredPhotos = [], displayedPhotosCount = 0;
    const BATCH_SIZE = 20; // Fast loading

    let allLeads = [], filteredLeads = [], leadsDisplayCount = 0;
    const LEADS_BATCH_SIZE = 15;

    let faceGroups = {};

    // DEBOUNCE
    let searchTimeout;
    window.debouncedFilter = () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(applyFilters, 350);
    };

    async function init() {
        try {
            const res = await fetch(`${API_BASE}/get-events`, {
                method:'POST',
                headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type':'application/json' },
                body: JSON.stringify({ collection_id: collectionId })
            });
            const data = await res.json();
            const s = data.collection_summary || {};

            document.getElementById('collectionName').textContent = s.name || collectionNameParam;
            document.title = `${s.name || 'Event'} • ${s.photo_count || 0} Photos • EventLens`;

            document.getElementById('totalPhotos').textContent = s.photo_count || 0;
            document.getElementById('totalLeads').textContent = s.leads_count || 0;
            document.getElementById('storageUsed').textContent = formatBytes(s.storage_bytes || 0);

            renderEvents(data.events || []);
            fetchPhotos();
            fetchAnalytics(true);
        } catch(e) { console.error(e); }
    }

    // GALLERY - FAST + FACE GROUPS
    async function fetchPhotos() {
        const container = document.getElementById('galleryContainer');
        container.innerHTML = '<p style="text-align:center; padding:60px; color:var(--muted);">Loading photos...</p>';

        try {
            const res = await fetch(`${API_BASE}/get-photos`, {
                method:'POST',
                headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type':'application/json' },
                body: JSON.stringify({ collection_id: collectionId })
            });
            const data = await res.json();
            allPhotos = data.photos || [];
            filteredPhotos = [...allPhotos].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

            // Build Face Groups
            buildFaceGroups();

            if(allPhotos.length === 0) {
                document.getElementById('emptyGallery').style.display = 'block';
                container.innerHTML = '';
            } else {
                displayedPhotosCount = 0;
                container.innerHTML = '';
                renderNextBatch();
            }
        } catch(e) {
            container.innerHTML = '<p style="color:var(--danger); text-align:center;">Failed to load photos</p>';
        }
    }

    window.renderNextBatch = () => {
        const container = document.getElementById('galleryContainer');
        const batch = filteredPhotos.slice(displayedPhotosCount, displayedPhotosCount + BATCH_SIZE);

        let currentDate = null;
        let dateGroup = null;

        batch.forEach((photo, i) => {
            const idx = displayedPhotosCount + i;
            const dateStr = photo.created_at ? new Date(photo.created_at).toLocaleDateString('en-IN', { weekday:'short', month:'short', day:'numeric' }) : 'Recent';

            if(dateStr !== currentDate) {
                const h = document.createElement('div');
                h.style.cssText = 'margin:25px 0 12px; font-size:16px; font-weight:600; color:var(--brand);';
                h.textContent = dateStr;
                container.appendChild(h);
                dateGroup = document.createElement('div');
                dateGroup.className = 'gallery-grid';
                container.appendChild(dateGroup);
                currentDate = dateStr;
            }

            const div = document.createElement('div');
            div.className = 'photo-card';
            div.onclick = () => openViewer(idx);
            div.innerHTML = `<img src="${photo.thumbnail_url || photo.url}" loading="lazy" onload="this.classList.add('loaded')">`;
            dateGroup.appendChild(div);
        });

        displayedPhotosCount += batch.length;
        document.getElementById('loadMoreBtn').style.display = displayedPhotosCount < filteredPhotos.length ? 'block' : 'none';
    };

    // FACE GROUPING - PURE FRONTEND
    function buildFaceGroups() {
        faceGroups = {};
        allPhotos.forEach(p => {
            (p.faces || []).forEach(f => {
                const id = f.FaceId || f.ExternalImageId || Math.random();
                if(!faceGroups[id]) {
                    faceGroups[id] = { 
                        thumbnail: p.thumbnail_url || p.url, 
                        count: 0, 
                        photos: [] 
                    };
                }
                faceGroups[id].count++;
                faceGroups[id].photos.push(p);
            });
        });

        const grid = document.getElementById('faceGroupGrid');
        if(Object.keys(faceGroups).length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:60px; color:var(--muted);">No faces detected yet.</p>';
            return;
        }

        grid.innerHTML = Object.entries(faceGroups).map(([id, g]) => `
            <div class="face-group" onclick="showFaceGroup('${id}')">
                <img src="${g.thumbnail}" class="face-thumb" onerror="this.src='https://placehold.co/130x130/222/fff?text=Person'">
                <div class="face-count">${g.count} Photos</div>
            </div>
        `).join('');
    }

    window.showFaceGroup = (id) => {
        filteredPhotos = faceGroups[id].photos;
        displayedPhotosCount = 0;
        document.getElementById('galleryContainer').innerHTML = '';
        renderNextBatch();
        switchTab('galleryTab');
    };

    // ANALYTICS - SELFIE 100% FIXED
    async function fetchAnalytics(force = false) {
        if(allLeads.length === 0 && !force) return;
        
        document.getElementById('noLeadsMessage').textContent = 'Loading guests...';
        document.getElementById('leadsGrid').innerHTML = '';

        try {
            const res = await fetch(`${API_BASE}/save-details`, { headers: { 'Authorization': `Bearer ${idToken}` } });
            const data = await res.json();
            allLeads = data.leads || [];
            
            applyLeadFilters();
        } catch(e) {
            document.getElementById('noLeadsMessage').textContent = 'Failed to load guests';
        }
    }

    function applyLeadFilters() {
        const date = document.getElementById('dateFilter').value;
        const mobile = document.getElementById('mobileFilter').value.trim();

        filteredLeads = allLeads.filter(l => {
            const m1 = !mobile || (l.mobile && l.mobile.includes(mobile));
            const m2 = !date || (l.created_at && l.created_at.startsWith(date));
            return m1 && m2;
        });

        leadsDisplayCount = 0;
        document.getElementById('leadsGrid').innerHTML = '';
        if(filteredLeads.length === 0) {
            document.getElementById('noLeadsMessage').textContent = 'No guests found';
            return;
        }
        loadMoreLeads();
    }

    window.loadMoreLeads = () => {
        const batch = filteredLeads.slice(leadsDisplayCount, leadsDisplayCount + LEADS_BATCH_SIZE);
        const html = batch.map(l => {
            let selfie = 'https://placehold.co/84x84/222/fff?text=No+Photo';
            if(l.selfie_b64) {
                const clean = l.selfie_b64.replace(/\s/g,'');
                const payload = clean.split(';base64,')[1] || clean;
                if(payload.length > 100) selfie = `data:image/jpeg;base64,${payload}`;
            }
            const time = l.created_at ? new Date(l.created_at).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) + ' (' + l.created_at.substring(5,10) + ')' : '-';
            return `
                <div class="lead-card" onclick="alert('History feature coming soon')">
                    <img src="${selfie}" class="selfie-img" onerror="this.src='https://placehold.co/84x84/222/fff?text=No+Photo'">
                    <div class="lead-info">
                        <h4>${l.name || 'Guest'}</h4>
                        <p>${l.mobile || '-'}</p>
                        <div class="meta">
                            <span>Found ${l.match_count || 0} photos</span>
                            <span>Latest: ${time}</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('leadsGrid').innerHTML += html;
        leadsDisplayCount += batch.length;
        document.getElementById('loadMoreLeadsBtn').style.display = leadsDisplayCount < filteredLeads.length ? 'block' : 'none';
    };

    // BAKI SAB FUNCTIONS (events, upload, links, downloadZip, viewer) – aapke original code se same hi hain
    // Sirf polish kiya hai, kuch naya nahi hataaya

    window.switchTab = function(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
        document.getElementById(id).classList.add('active');
        if(id === 'galleryTab' && allPhotos.length > 0) renderNextBatch();
        if(id === 'faceGroupTab' && Object.keys(faceGroups).length === 0) buildFaceGroups();
    };

    function formatBytes(bytes) {
        if (!bytes) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    window.openViewer = idx => {
        document.getElementById('viewerImg').src = filteredPhotos[idx].url;
        document.getElementById('viewer').classList.add('open');
    };
    window.closeViewer = () => document.getElementById('viewer').classList.remove('open');

    // Page load
    init();
</script>
</body>
</html>
