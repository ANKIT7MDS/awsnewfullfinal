<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
    <style>
        :root {
          --bg: #0f0f0f;
          --card: #1e1e1e;
          --border: #333;
          --text: #e0e0e0;
          --muted: #888;
          --brand: #4285f4;
          --brand-hover: #3367d6;
          --danger: #ea4335;
          --ok: #34a853;
        }
        * {
          box-sizing: border-box;
        }
        body {
          margin: 0;
          background-color: var(--bg);
          color: var(--text);
          font-family: 'Google Sans', Roboto, Arial, sans-serif;
          padding-bottom: 60px;
        }
        .wrap {
          max-width: 1400px;
          margin: 0 auto;
          padding: 20px;
        }

        /* ADDITIONAL STYLES HERE */
        .gallery-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
          gap: 5px;
        }
        .photo-card {
          aspect-ratio: 1;
          overflow: hidden;
          background: #000;
          border-radius: 4px;
          cursor: pointer;
          position: relative;
        }
        .photo-card img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          opacity: 0;
          transition: opacity 0.3s;
        }
        .photo-card img.loaded {
          opacity: 1;
        }

        ::-webkit-scrollbar {
          width: 6px;
          height: 6px;
        }
        ::-webkit-scrollbar-track {
          background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
          background: var(--border);
          border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top-bar">
        <h1 id="collectionName">Loading...</h1>
        <div class="stats-line">
            <span id="totalPhotos">0</span> Photos •
            <span id="totalLeads">0</span> Leads •
            <span id="storageUsed">0 MB</span>
        </div>
    </div>

    <!-- Photo Gallery -->
    <div id="galleryContainer">
        <div class="gallery-grid">
            <div class="photo-card">
                <img src="defaultThumbnail.jpg" alt=""
                     onerror="this.src = 'defaultThumbnail.jpg'" onload="this.classList.add('loaded')">
            </div>
        </div>
    </div>
    
    <!-- Script Section -->
    <script>
      const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
      const urlParams = new URLSearchParams(window.location.search);
      const collectionId = urlParams.get("id") || "defaultId";
      const collectionNameParam = urlParams.get("name") || "Default Collection";

      async function fetchPhotos() {
        console.log("Fetching photos...");
        // Add your API Logic here
      }

      fetchPhotos();
    </script>
</div>
</body>
</html>
