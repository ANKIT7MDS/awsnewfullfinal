<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Manager • Premium Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0f111a;
            --bg-card: rgba(23, 25, 35, 0.7);
            --brand: #6366f1;
            --brand-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #ef4444;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; outline: none; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        .wrap { max-width: 1400px; margin: 0 auto; padding: 30px; }

        /* HEADER SECTION */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 24px 32px; margin-bottom: 32px; box-shadow: var(--shadow);
        }
        .header-left h1 { font-size: 26px; margin: 8px 0; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .back-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .back-link:hover { color: var(--brand); transform: translateX(-3px); }
        .stats-line { display: flex; gap: 20px; font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
        .stat-badge { background: rgba(255,255,255,0.03); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }

        /* TABS UI */
        .tabs { display: flex; gap: 6px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 14px; margin-bottom: 32px; border: 1px solid var(--border); }
        .tab { 
            flex: 1; padding: 14px; text-align: center; cursor: pointer; border-radius: 10px;
            color: var(--text-secondary); font-weight: 600; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .tab:hover { color: white; background: rgba(255,255,255,0.03); }
        .tab.active { background: var(--brand-gradient); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        /* CARDS */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow); margin-bottom: 24px; position: relative; overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .card-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        /* FACE ICONS */
        #faceIconsBar { display: flex; gap: 22px; overflow-x: auto; padding: 10px 5px 20px; scrollbar-width: none; }
        #faceIconsBar::-webkit-scrollbar { display: none; }
        .face-item { text-align: center; min-width: 90px; cursor: pointer; transition: 0.3s; position: relative; }
        .face-item:hover { transform: scale(1.08); }
        
        .face-img-wrap { 
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--border); 
            overflow: hidden; margin: 0 auto 10px; transition: 0.3s; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .face-img-wrap.selected { border-color: var(--brand); box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); }
        .face-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .face-name { font-size: 11px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
        .name-badge { position: absolute; top: -5px; right: 5px; background: var(--brand); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5; }

        /* GALLERY GRID */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
        .photo-card { 
            aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; 
            border: 1px solid var(--border); background: #0a0a0f; transition: 0.3s;
        }
        .photo-card:hover { transform: translateY(-5px); border-color: var(--brand); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        /* BUTTONS */
        .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--brand-gradient); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

        /* UPLOAD ZONE */
        .upload-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 60px 40px; text-align: center; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.01); }
        .progress-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 10px; height: 10px; overflow: hidden; margin: 20px 0; display: none; }
        .progress-bar { height: 100%; background: var(--brand-gradient); width: 0%; transition: 0.3s; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; color: var(--text-secondary); font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }

        /* MODALS */
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-secondary); border-radius: 24px; padding: 32px; width: 90%; max-width: 450px; border: 1px solid var(--border); }
        
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }

        .toast { position: fixed; top: 24px; right: 24px; padding: 16px 28px; border-radius: 12px; color: white; z-index: 9999; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; margin-top: 8px; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Full View">
</div>

<div class="modal" id="namingModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Name this person</h3>
        <div style="display:flex; justify-content:center; margin: 20px 0;">
            <div class="face-img-wrap" style="width: 100px; height: 100px; border-color: var(--brand)">
                <img id="naming-preview-img" src="" style="transform: scale(2.5);">
            </div>
        </div>
        <label style="font-size:12px; color: var(--text-secondary)">Enter Name</label>
        <input type="text" id="faceNameInput" placeholder="Ex: Rahul Kumar">
        <div style="display:flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-secondary" style="flex:1" onclick="closeNamingModal()">Cancel</button>
            <button class="btn btn-primary" style="flex:1" onclick="savePersonName()">Save Name</button>
        </div>
    </div>
</div>

<div class="modal" id="eventModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Create New Event</h3>
        <input type="text" id="newEvtName" placeholder="Event Name (e.g. Haldi Ceremony)">
        <input type="date" id="newEvtDate" style="margin-top:15px">
        <div style="display:flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-secondary" style="flex:1" onclick="hideEventModal()">Cancel</button>
            <button class="btn btn-primary" style="flex:1" onclick="createNewEvent()">Create</button>
        </div>
    </div>
</div>

<div class="wrap">
    <div class="top-bar">
        <div class="header-left">
            <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <h1 id="collectionName">Loading...</h1>
            <div class="stats-line">
                <span class="stat-badge"><i class="fas fa-image"></i> <span id="totalPhotos">0</span> Photos</span>
                <span class="stat-badge"><i class="fas fa-user-friends"></i> <span id="totalLeads">0</span> Guests</span>
                <span class="stat-badge"><i class="fas fa-hdd"></i> <span id="storageUsed">0 MB</span></span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="refreshAll()"><i class="fas fa-sync"></i> Refresh</button>
            <button class="btn btn-primary" onclick="downloadAllZip()"><i class="fas fa-download"></i> Download ZIP</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="galleryTab"><i class="fas fa-images"></i> Photos</div>
        <div class="tab" data-tab="eventsTab"><i class="fas fa-calendar-alt"></i> Events</div>
        <div class="tab" data-tab="uploadTab"><i class="fas fa-cloud-upload-alt"></i> Upload</div>
        <div class="tab" data-tab="analyticsTab"><i class="fas fa-chart-line"></i> Guest Leads</div>
    </div>

    <div id="galleryTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-users"></i> People (Unique Detected)</h3>
                <div id="faceFilters" style="font-size: 12px; color: var(--brand); cursor: pointer; display:none" onclick="clearFaceFilter()">Clear Filter</div>
            </div>
            <div id="faceIconsBar"></div>
        </div>
        <div id="galleryContainer" class="gallery-grid"></div>
    </div>

    <div id="eventsTab" class="tab-content" style="display:none">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-calendar-check"></i> Manage Events</h3>
                <button class="btn btn-primary btn-sm" onclick="showEventModal()"><i class="fas fa-plus"></i> New Event</button>
            </div>
            <table>
                <thead><tr><th>Event Name</th><th>Date</th><th>Photos</th><th>Actions</th></tr></thead>
                <tbody id="eventsTbody"></tbody>
            </table>
        </div>
    </div>

    <div id="uploadTab" class="tab-content" style="display:none">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h3 class="card-title" style="margin-bottom:20px"><i class="fas fa-cloud-upload-alt"></i> Batch Upload</h3>
            <select id="uploadEventSelect"></select>
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" style="margin-top:15px">
                <i class="fas fa-images"></i>
                <h3>Click or Drag Photos</h3>
                <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelection(this.files)">
            </div>
            <div id="uploadPreview" style="margin-top: 25px; display:none;">
                <div class="progress-bar-wrap" id="pbWrap" style="display:block"><div class="progress-bar" id="pb"></div></div>
                <p id="uploadStatus" style="text-align: center; font-size: 13px;"></p>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn btn-primary" id="startUploadBtn" onclick="startBatchUpload()">Start Batch Upload</button>
                    <button class="btn btn-secondary" onclick="resetUpload()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="analyticsTab" class="tab-content" style="display:none">
        <div class="card">
            <div class="card-header"><h3 class="card-title"><i class="fas fa-users-cog"></i> Guest Leads</h3></div>
            <table>
                <thead><tr><th>Name</th><th>Mobile</th><th>Matches</th><th>Time</th></tr></thead>
                <tbody id="leadsTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod"; // [cite: 1]
const idToken = localStorage.getItem("idToken");
const urlParams = new URLSearchParams(window.location.search);
const collectionId = urlParams.get("id");
const collectionNameFromUrl = urlParams.get("name");

let allPhotos = [];
let faceGroups = [];
let currentFaceFilter = null;
let currentNamingFaceId = null;
let selectedUploadFiles = [];

function showToast(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
    toast.innerHTML = msg;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

window.onload = () => {
    if (!collectionId || !idToken) window.location.href = "login.html";
    document.getElementById('collectionName').innerText = collectionNameFromUrl || "Collection Details";
    refreshAll();
};

async function loadPhotos() {
    try {
        const res = await fetch(`${API_BASE}/get-photos`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ collection_id: collectionId }) // [cite: 206]
        });
        const data = await res.json();
        allPhotos = data.photos || [];
        document.getElementById('totalPhotos').innerText = allPhotos.length;
        renderGallery(allPhotos);
    } catch (e) { showToast("Error loading photos", "error"); }
}

function renderGallery(photos) {
    const container = document.getElementById('galleryContainer');
    container.innerHTML = photos.length === 0 ? `<div style="padding:40px; color:var(--text-secondary);">No photos found</div>` : '';
    photos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.onclick = () => { document.getElementById('lightbox-img').src = p.url; document.getElementById('lightbox').style.display = 'flex'; };
        card.innerHTML = `<img src="${p.thumbnail_url || p.url}" loading="lazy">`;
        container.appendChild(card);
    });
}

// Correction: list_people se BoundingBox lekar zoom karna 
async function loadFaces() {
    try {
        const res = await fetch(`${API_BASE}/list_people`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ collection_id: collectionId }) // [cite: 339]
        });
        const data = await res.json();
        faceGroups = data.people || [];
        renderFaceBar();
    } catch (e) { console.error("Face Load Error:", e); }
}

function renderFaceBar() {
    const bar = document.getElementById('faceIconsBar');
    bar.innerHTML = faceGroups.length === 0 ? `<p style="font-size:12px; color:var(--text-secondary); padding:10px;">Finding people...</p>` : '';
    faceGroups.forEach(face => {
        const isNamed = face.FaceName && face.FaceName !== "Unknown";
        
        // Correction: Rekognition BoundingBox Zoom logic 
        let imgStyle = "transform: scale(2.5);";
        if (face.BoundingBox) {
            const left = face.BoundingBox.Left * 100;
            const top = face.BoundingBox.Top * 100;
            imgStyle += ` object-position: ${left}% ${top}%;`;
        }

        const item = document.createElement('div');
        item.className = 'face-item';
        item.onclick = (e) => { if(!e.target.closest('.name-badge')) filterPhotosByFace(face.FaceId); };
        item.innerHTML = `
            <div class="face-img-wrap ${currentFaceFilter === face.FaceId ? 'selected' : ''}">
                <img src="${face.photo_url}" style="${imgStyle}" loading="lazy">
            </div>
            <div class="face-name">${isNamed ? face.FaceName : 'Unnamed'}</div>
            <div class="name-badge" onclick="openNamingModal('${face.FaceId}', '${face.photo_url}')">
                <i class="fas ${isNamed ? 'fa-user-check' : 'fa-pen'}"></i>
            </div>
        `;
        bar.appendChild(item);
    });
}

// Correction: face_name key ka use karna [cite: 315]
async function savePersonName() {
    const name = document.getElementById('faceNameInput').value.trim();
    if (!name) return showToast("Enter name", "error");
    try {
        const res = await fetch(`${API_BASE}/save-face-name`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ collection_id: collectionId, face_id: currentNamingFaceId, face_name: name }) // [cite: 316]
        });
        if (res.ok) { showToast("Name Saved!"); closeNamingModal(); loadFaces(); }
    } catch (e) { showToast("Save failed", "error"); }
}

// Correction: Guest Leads fetch logic [cite: 136]
async function loadLeads() {
    const tbody = document.getElementById('leadsTbody');
    tbody.innerHTML = '';
    try {
        const res = await fetch(`${API_BASE}/save-details?linkId=${collectionId}`, { // [cite: 147]
            method: 'GET',
            headers: { 'Authorization': `Bearer ${idToken}` }
        });
        const data = await res.json();
        const leads = Array.isArray(data) ? data : (data.leads || []);
        tbody.innerHTML = leads.map(l => `
            <tr>
                <td>${l.name || 'Unknown'}</td>
                <td>${l.mobile || l.phone || 'N/A'}</td>
                <td>${l.match_count || 0}</td>
                <td>${new Date(l.created_at || l.timestamp).toLocaleString()}</td>
            </tr>
        `).join('');
        document.getElementById('totalLeads').innerText = leads.length;
    } catch (e) { console.error("Leads error", e); }
}

async function startBatchUpload() {
    const eventId = document.getElementById('uploadEventSelect').value;
    if (!eventId) return showToast("Select event", "error");
    const pb = document.getElementById('pb');
    const status = document.getElementById('uploadStatus');
    try {
        // [cite: 387]
        const filesPayload = selectedUploadFiles.map(f => ({ name: f.name, type: "image/jpeg" }));
        const res = await fetch(`${API_BASE}/generate-upload-urls`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ collection_id: collectionId, event_id: eventId, files: filesPayload })
        });
        const { urls } = await res.json();
        for (let i = 0; i < selectedUploadFiles.size; i++) {
            status.innerText = `Uploading ${i+1}/${selectedUploadFiles.length}...`;
            await fetch(urls[i].uploadURL, { method: 'PUT', body: selectedUploadFiles[i], headers: { 'Content-Type': 'image/jpeg' } }); // [cite: 389, 390]
            pb.style.width = `${((i+1)/urls.length)*100}%`;
        }
        showToast("Upload Successful!");
        setTimeout(() => refreshAll(), 1500);
    } catch (e) { showToast("Upload failed", "error"); }
}

// Helper Functions
function openNamingModal(fid, img) { currentNamingFaceId = fid; document.getElementById('naming-preview-img').src = img; document.getElementById('namingModal').style.display = 'flex'; }
function closeNamingModal() { document.getElementById('namingModal').style.display = 'none'; }
function filterPhotosByFace(fid) { 
    currentFaceFilter = (currentFaceFilter === fid) ? null : fid;
    const filtered = currentFaceFilter ? allPhotos.filter(p => (p.face_ids && p.face_ids.includes(fid)) || (p.faces && p.faces.some(f => f.FaceId === fid))) : allPhotos;
    renderGallery(filtered); renderFaceBar();
}
function handleFileSelection(files) { selectedUploadFiles = Array.from(files); document.getElementById('uploadPreview').style.display = 'block'; }
async function refreshAll() { await loadEvents(); await loadPhotos(); await loadFaces(); }

async function loadEvents() {
    const res = await fetch(`${API_BASE}/get-events`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection_id: collectionId }) // [cite: 95]
    });
    const data = await res.json();
    const events = data.events || [];
    document.getElementById('eventsTbody').innerHTML = events.map(e => `
        <tr><td>${e.name}</td><td>${e.event_date}</td><td>${e.photo_count}</td><td><button class="btn btn-danger btn-sm" onclick="deleteEvent('${e.event_id}')">Delete</button></td></tr>
    `).join('');
    document.getElementById('uploadEventSelect').innerHTML = events.map(e => `<option value="${e.event_id}">${e.name}</option>`).join('');
}

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        t.classList.add('active');
        const target = t.dataset.tab;
        document.getElementById(target).style.display = 'block';
        if (target === 'analyticsTab') loadLeads();
    });
});
</script>
</body>
</html>
