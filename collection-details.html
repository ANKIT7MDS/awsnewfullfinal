<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --muted: #888;
            --brand: #4285f4;
            --brand-hover: #3367d6;
            --danger: #ea4335;
            --ok: #34a853;
        }
        * { box-sizing: border-box; }
       
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            padding-bottom: 60px;
        }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 20px; }
       
        /* HEADER */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .back-link {
            color: var(--muted);
            font-size: 14px;
        }
        .collection-title {
            font-size: 24px;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--muted);
        }
        .stat span { color: var(--text); }
       
        /* TABS */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--muted);
            padding: 10px 0;
            cursor: pointer;
            font-size: 16px;
            position: relative;
        }
        .tab-btn.active {
            color: var(--text);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--brand);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
       
        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
       
        /* PHOTOS GRID */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }
        .photo-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }
        .photo-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            display: flex;
            gap: 4px;
        }
        .face-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            object-fit: cover;
        }
        .load-more {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .load-more:disabled { background: var(--muted); }
       
        /* PEOPLE TAB */
        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
        }
        .person {
            text-align: center;
        }
        .person-thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
        }
        .person-name {
            font-size: 14px;
            margin-bottom: 4px;
        }
        .person-count {
            font-size: 12px;
            color: var(--muted);
        }
       
        /* SEARCH LINKS */
        .search-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-item {
            background: #151515;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }
        .link-url { color: var(--brand); word-break: break-all; }
        .link-copy { cursor: pointer; color: var(--muted); }
       
        /* BUTTONS */
        .btn {
            background: var(--brand);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { background: var(--brand-hover); }
        .btn.secondary { background: var(--muted); }
        .btn.danger { background: var(--danger); }
       
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h3 { margin-bottom: 15px; }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
        .modal-content button { width: 100%; }
        .modal.open { display: flex; }
       
        /* VIEWER */
        #viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #viewer.open { display: flex; }
        #viewerImage { max-width: 90%; max-height: 90%; object-fit: contain; }
        #viewerControls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
        }
        #viewerControls button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <!-- HEADER -->
        <div class="top-bar">
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
            <h1 class="collection-title" id="collectionTitle"></h1>
            <div class="stats">
                <div>Photos: <span id="photoCount">0</span></div>
                <div>Events: <span id="eventCount">0</span></div>
                <div>Storage: <span id="storageBytes">0 MB</span></div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="photos">Photos</button>
            <button class="tab-btn" data-tab="events">Events</button>
            <button class="tab-btn" data-tab="upload">Upload</button>
            <button class="tab-btn" data-tab="people">People</button>
            <button class="tab-btn" data-tab="leads">Guest Leads</button>
            <button class="tab-btn" data-tab="links">Search Links</button>
        </div>

        <!-- PHOTOS TAB -->
        <div id="photosTab" class="tab-content active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                    <h3>Photos in Collection</h3>
                    <button class="btn" id="downloadZipBtn">Download ZIP</button>
                </div>
                <div class="photos-grid" id="photosGrid"></div>
                <button class="load-more" id="loadMoreBtn" onclick="fetchPhotos(true)">Load More</button>
            </div>
        </div>

        <!-- EVENTS TAB -->
        <div id="eventsTab" class="tab-content">
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                    <h3>Events</h3>
                    <button class="btn" onclick="document.getElementById('eventForm').style.display='block'">+ New Event</button>
                </div>
               
                <div id="eventForm" style="display:none; background:#151515; padding:20px; border-radius:8px; margin-bottom:20px; border:1px solid var(--border);">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                        <input type="text" id="eventName" placeholder="Event Name">
                        <input type="date" id="eventDate">
                    </div>
                    <div style="text-align:right;">
                        <button class="btn secondary" onclick="document.getElementById('eventForm').style.display='none'">Cancel</button>
                        <button class="btn" id="saveEventBtn">Save</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>Name</th><th>Date</th><th>Photos</th><th>Actions</th></tr></thead>
                    <tbody id="eventsTbody"></tbody>
                </table>
            </div>
        </div>

        <!-- UPLOAD TAB -->
        <div id="uploadTab" class="tab-content">
            <div class="card">
                <h3>Upload to Event</h3>
                <select id="eventSelect"></select>
                <input type="file" multiple accept="image/*" id="uploadFiles">
                <button class="btn" onclick="uploadToEvent()">Upload</button>
            </div>
        </div>

        <!-- PEOPLE TAB -->
        <div id="peopleTab" class="tab-content">
            <div class="card">
                <h3>Detected People</h3>
                <div class="people-grid" id="peopleGrid"></div>
            </div>
        </div>

        <!-- LEADS TAB -->
        <div id="leadsTab" class="tab-content">
            <div class="card">
                <h3>Guest Leads</h3>
                <table>
                    <thead><tr><th>Name</th><th>Mobile</th><th>Matches</th><th>Timestamp</th></tr></thead>
                    <tbody id="leadsTbody"></tbody>
                </table>
            </div>
        </div>

        <!-- LINKS TAB -->
        <div id="linksTab" class="tab-content">
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                    <h3>Search Links</h3>
                    <button class="btn" onclick="openLinkModal()">Create Link</button>
                </div>
                <div class="search-links" id="searchLinks"></div>
            </div>
        </div>

        <!-- MODAL for LINK -->
        <div class="modal" id="linkModal">
            <div class="modal-content">
                <h3>Create Search Link</h3>
                <input type="number" id="expiryHours" placeholder="Expiry Hours (default 24)" min="1">
                <input type="text" id="linkPassword" placeholder="Optional Password">
                <button class="btn" onclick="createSearchLink()">Generate</button>
                <button class="btn secondary" onclick="closeLinkModal()">Cancel</button>
            </div>
        </div>

        <!-- VIEWER -->
        <div id="viewer">
            <img id="viewerImage" src="">
            <div id="viewerControls">
                <button onclick="prevImage()">Previous</button>
                <button onclick="toggleViewerSelect()">Select</button>
                <button onclick="nextImage()">Next</button>
            </div>
            <button style="position:absolute; top:10px; right:10px; background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="closeViewer()">×</button>
        </div>
    </div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const collectionId = new URLSearchParams(window.location.search).get('id');
    let idToken = localStorage.getItem('idToken');
    let allPhotos = [];
    let filteredPhotos = [];
    let currentViewerIndex = 0;
    let nextToken = null;
    let people = [];
    let events = [];
    let leads = [];
    let searchLinks = [];

    if (!idToken) {
        window.location.href = 'login.html';
    }

    function init() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
            });
        });

        document.getElementById('saveEventBtn').addEventListener('click', handleSaveEvent);
        document.getElementById('uploadFiles').addEventListener('change', uploadToEvent);
        document.getElementById('downloadZipBtn').addEventListener('click', downloadAllZip);

        fetchCollectionInfo();
        fetchPhotos();
        fetchEvents();
        fetchPeople();
        fetchLeads();
        fetchSearchLinks();
    }

    async function fetchCollectionInfo() {
        try {
            const res = await fetch(`${API_BASE}/get-collections?user_id=me`, {
                headers: { 'Authorization': `Bearer ${idToken}` }
            });
            const data = await res.json();
            const collection = data.Items.find(c => c.collection_id === collectionId);
            if (collection) {
                document.getElementById('collectionTitle').textContent = collection.name;
                document.getElementById('photoCount').textContent = collection.total_photo_count;
                document.getElementById('eventCount').textContent = collection.event_count;
                document.getElementById('storageBytes').textContent = (collection.storage_bytes / 1024 / 1024).toFixed(2);
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function fetchPhotos(append = false) {
        const loadBtn = document.getElementById('loadMoreBtn');
        loadBtn.disabled = true;

        try {
            const body = { collection_id: collectionId };
            if (append && nextToken) body.next_token = nextToken;

            const res = await fetch(`${API_BASE}/get-photos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            const newPhotos = data.photos || [];

            if (append) {
                allPhotos = [...allPhotos, ...newPhotos];
            } else {
                allPhotos = newPhotos;
            }
            filteredPhotos = allPhotos;

            renderPhotos();
            nextToken = data.next_token;
            loadBtn.disabled = !nextToken;
        } catch (e) {
            console.error("Failed to fetch photos:", e);
        }
    }

    function renderPhotos() {
        const grid = document.getElementById('photosGrid');
        grid.innerHTML = '';
        filteredPhotos.forEach((photo, index) => {
            const item = document.createElement('div');
            item.className = 'photo-item';
            item.onclick = () => openViewer(index);

            const img = document.createElement('img');
            img.src = photo.url;
            item.appendChild(img);

            const overlay = document.createElement('div');
            overlay.className = 'photo-overlay';

            if (photo.faces && photo.faces.length > 0) {
                photo.faces.forEach((face, i) => {
                    const faceImg = document.createElement('img');
                    faceImg.className = 'face-icon';
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const tempImg = new Image();
                    tempImg.crossOrigin = 'anonymous';
                    tempImg.onload = () => {
                        const box = face.BoundingBox;
                        canvas.width = 64;
                        canvas.height = 64;
                        ctx.drawImage(tempImg, box.Left * tempImg.width, box.Top * tempImg.height, box.Width * tempImg.width, box.Height * tempImg.height, 0, 0, 64, 64);
                        faceImg.src = canvas.toDataURL();
                    };
                    tempImg.src = photo.url;
                    overlay.appendChild(faceImg);
                });
            }

            item.appendChild(overlay);
            grid.appendChild(item);
        });
    }

    async function fetchEvents() {
        try {
            const res = await fetch(`${API_BASE}/get-events`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify({ collection_id: collectionId })
            });
            const data = await res.json();
            events = data.events || [];
            renderEvents();
            renderEventSelect();
        } catch (e) {
            console.error(e);
        }
    }

    function renderEvents() {
        const tbody = document.getElementById('eventsTbody');
        tbody.innerHTML = '';
        events.forEach(ev => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${ev.name}</td>
                <td>${ev.event_date}</td>
                <td>${ev.photo_count}</td>
                <td>
                    <button class="btn secondary" onclick="editEvent('${ev.event_id}')">Edit</button>
                    <button class="btn danger" onclick="deleteEvent('${ev.event_id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function handleSaveEvent() {
        const name = document.getElementById('eventName').value;
        const date = document.getElementById('eventDate').value;
        if (!name || !date) return alert("Fields required");

        try {
            const res = await fetch(`${API_BASE}/upsert-event`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify({ collection_id: collectionId, name, event_date: date })
            });
            if (res.ok) {
                fetchEvents();
                document.getElementById('eventForm').style.display = 'none';
            }
        } catch (e) {
            console.error(e);
        }
    }

    function renderEventSelect() {
        const select = document.getElementById('eventSelect');
        select.innerHTML = '';
        events.forEach(ev => {
            const opt = document.createElement('option');
            opt.value = ev.event_id;
            opt.textContent = ev.name;
            select.appendChild(opt);
        });
    }

    async function uploadToEvent() {
        const files = document.getElementById('uploadFiles').files;
        const eventId = document.getElementById('eventSelect').value;
        if (!files.length || !eventId) return alert("Select event and files");

        const fileData = Array.from(files).map(f => ({ name: f.name, type: f.type }));
        try {
            const res = await fetch(`${API_BASE}/generate-upload-urls`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify({ collection_id: collectionId, event_id: eventId, files: fileData })
            });
            const data = await res.json();
            await Promise.all(data.urls.map(async (u, i) => {
                await fetch(u.uploadURL, { method: 'PUT', body: files[i] });
            }));
            fetchPhotos();
        } catch (e) {
            console.error(e);
        }
    }

    async function fetchPeople() {
        try {
            const res = await fetch(`${API_BASE}/list-people`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify({ collection_id: collectionId })
            });
            const data = await res.json();
            people = data.people || [];
            renderPeople();
        } catch (e) {
            console.error(e);
        }
    }

    function renderPeople() {
        const grid = document.getElementById('peopleGrid');
        grid.innerHTML = '';
        people.forEach(p => {
            const person = document.createElement('div');
            person.className = 'person';
            person.onclick = () => {
                filteredPhotos = allPhotos.filter(photo => (photo.face_ids || []).includes(p.FaceId));
                renderPhotos();
                document.querySelector('[data-tab="photos"]').click();
            };

            const thumb = document.createElement('img');
            thumb.className = 'person-thumbnail';
            thumb.src = p.thumbnail_url || 'data:,';
            
            const nameInput = document.createElement('input');
            nameInput.value = p.FaceName || 'Unknown';
            nameInput.className = 'person-name';
            nameInput.onchange = async (e) => {
                try {
                    await fetch(`${API_BASE}/save_face_name`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                        body: JSON.stringify({ FaceId: p.FaceId, FaceName: e.target.value, CollectionId: collectionId })
                    });
                    p.FaceName = e.target.value;
                } catch (err) { console.error(err); }
            };

            const count = document.createElement('div');
            count.className = 'person-count';
            count.textContent = `${p.count} photos`;

            person.appendChild(thumb);
            person.appendChild(nameInput);
            person.appendChild(count);
            grid.appendChild(person);
        });
    }

    async function fetchLeads() {
        try {
            const res = await fetch(`${API_BASE}/selfie-search-save-details?link_id=${collectionId}`, {
                headers: { 'Authorization': `Bearer ${idToken}` }
            });
            const data = await res.json();
            leads = data;
            renderLeads();
        } catch (e) {
            console.error(e);
        }
    }

    function renderLeads() {
        const tbody = document.getElementById('leadsTbody');
        tbody.innerHTML = '';
        leads.forEach(lead => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${lead.name}</td>
                <td>${lead.mobile}</td>
                <td>${lead.match_count}</td>
                <td>${lead.timestamp}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function fetchSearchLinks() {
        // Placeholder, add actual fetch if needed
        searchLinks = [];
        renderSearchLinks();
    }

    function renderSearchLinks() {
        const linksDiv = document.getElementById('searchLinks');
        linksDiv.innerHTML = '';
        searchLinks.forEach(link => {
            const item = document.createElement('div');
            item.className = 'link-item';
            item.innerHTML = `
                <span class="link-url">${link.searchUrl}</span>
                <span class="link-copy" onclick="copyToClipboard('${link.searchUrl}')">Copy</span>
            `;
            linksDiv.appendChild(item);
        });
    }

    function openLinkModal() {
        document.getElementById('linkModal').classList.add('open');
    }

    function closeLinkModal() {
        document.getElementById('linkModal').classList.remove('open');
    }

    async function createSearchLink() {
        const expiry = document.getElementById('expiryHours').value || 24;
        const password = document.getElementById('linkPassword').value;
        try {
            const res = await fetch(`${API_BASE}/generate-search-link`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify({ collection_id: collectionId, expiry_hours: expiry, password })
            });
            const data = await res.json();
            searchLinks.push(data);
            renderSearchLinks();
            closeLinkModal();
        } catch (e) {
            console.error(e);
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
    }

    function openViewer(index) {
        currentViewerIndex = index;
        updateViewer();
        document.getElementById('viewer').classList.add('open');
    }

    function closeViewer() {
        document.getElementById('viewer').classList.remove('open');
    }

    function updateViewer() {
        const photo = filteredPhotos[currentViewerIndex];
        document.getElementById('viewerImage').src = photo.url;
    }

    function nextImage() {
        currentViewerIndex = (currentViewerIndex + 1) % filteredPhotos.length;
        updateViewer();
    }

    function prevImage() {
        currentViewerIndex = (currentViewerIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
        updateViewer();
    }

    function toggleViewerSelect() {
        // Placeholder for select logic
    }

    async function downloadAllZip(btn) {
        if (filteredPhotos.length === 0) return alert("No photos");

        const zip = new JSZip();
        const folder = zip.folder("photos");
        const limit = filteredPhotos.slice(0, 100);

        btn.disabled = true;
        btn.textContent = 'Zipping...';

        let count = 0;
        for (let i = 0; i < limit.length; i++) {
            try {
                const response = await fetch(limit[i].url);
                const blob = await response.blob();
                folder.file(`photo_${i+1}.jpg`, blob);
                count++;
                btn.textContent = `Zipping ${count}/${limit.length}`;
            } catch (e) {
                console.error(e);
            }
        }

        zip.generateAsync({type: "blob"}).then(content => {
            saveAs(content, "photos.zip");
            btn.disabled = false;
            btn.textContent = 'Download ZIP';
        });
    }

    async function editEvent(eventId) {
        // Placeholder for edit
    }

    async function deleteEvent(eventId) {
        if (!confirm("Delete event?")) return;
        try {
            await fetch(`${API_BASE}/delete-event`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
                body: JSON.stringify({ collection_id: collectionId, event_id: eventId })
            });
            fetchEvents();
        } catch (e) {
            console.error(e);
        }
    }

    init();
</script>
</body>
</html>
