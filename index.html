<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>EventLens – अपनी फोटो खोजें</title>

    <!-- Tailwind CSS (For Modern Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lightbox CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Dark Slate */
            color: #f8fafc;
        }
        
        /* Smooth Fade In Animation */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }

        /* Photo Grid Selection Styles */
        .photo-card {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 12px;
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .photo-card:active {
            transform: scale(0.95);
        }

        .photo-card.selected {
            border-color: #22c55e; /* Green Border */
        }

        .photo-card.selected::after {
            content: '\f00c'; /* FontAwesome Check */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            background: rgba(34, 197, 94, 0.8);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Floating Bottom Bar for Download */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-top: 1px solid #334155;
            display: none; /* Hidden initially */
            z-index: 50;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 shadow-lg">
        <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                <i class="fas fa-camera-retro mr-2 text-blue-400"></i>EventLens
            </h1>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pt-6 space-y-6">

        <!-- STEP 1: Selfie Upload -->
        <div id="step1" class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 fade-in">
            <h2 class="text-lg font-semibold mb-1 text-center">शुरुआत करें</h2>
            <p class="text-slate-400 text-xs text-center mb-6">अपनी सेल्फी अपलोड करें ताकि हम आपको खोज सकें</p>

            <label class="block w-full cursor-pointer group">
                <div class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center transition group-hover:border-blue-500 group-hover:bg-slate-700/50">
                    <i class="fas fa-cloud-upload-alt text-4xl text-slate-500 mb-3 group-hover:text-blue-400"></i>
                    <p class="text-sm text-slate-300">यहां क्लिक करें या फोटो खींचें</p>
                    <input type="file" id="selfieInput" accept="image/*" class="hidden" onchange="previewSelfie(this)" />
                </div>
            </label>
            
            <!-- Selfie Preview (New Feature) -->
            <div id="selfiePreviewContainer" class="hidden mt-4 text-center">
                <img id="selfiePreview" class="w-24 h-24 rounded-full object-cover mx-auto border-4 border-blue-500 shadow-lg" />
            </div>

            <button onclick="findMatches()" id="searchBtn" class="w-full mt-6 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center">
                <span id="btnText">फोटो खोजें</span>
                <div id="btnLoader" class="loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5 ml-2 hidden"></div>
            </button>

            <div id="matchCount" class="text-center mt-4 text-sm font-medium text-blue-300 h-6"></div>
        </div>

        <!-- STEP 2: Details Form -->
        <div id="detailsForm" class="hidden bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 fade-in">
            <h2 class="text-lg font-semibold mb-4 text-center">आपकी जानकारी</h2>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-slate-500"></i>
                    <input type="text" id="guestName" placeholder="आपका पूरा नाम" class="w-full bg-slate-900 text-white border border-slate-700 rounded-xl py-3.5 pl-12 pr-4 focus:outline-none focus:border-blue-500 transition shadow-inner" />
                </div>
                
                <div class="relative">
                    <i class="fas fa-phone absolute left-4 top-4 text-slate-500"></i>
                    <input type="number" id="guestMobile" placeholder="मोबाइल नंबर" class="w-full bg-slate-900 text-white border border-slate-700 rounded-xl py-3.5 pl-12 pr-4 focus:outline-none focus:border-blue-500 transition shadow-inner" />
                </div>
            </div>

            <button onclick="submitDetails()" class="w-full mt-6 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all transform active:scale-95">
                सबमिट करें और फोटो देखें
            </button>
        </div>

        <!-- STEP 3 & 4: Toolbar & Grid -->
        <div id="gallerySection" class="hidden fade-in">
            <!-- Toolbar -->
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="text-slate-200 font-semibold">परिणाम</h3>
                <div class="space-x-4 text-sm">
                    <button onclick="selectAll()" class="text-blue-400 hover:text-blue-300 font-medium transition"><i class="fas fa-check-double mr-1"></i>सभी चुनें</button>
                    <button onclick="clearAll()" class="text-red-400 hover:text-red-300 font-medium transition"><i class="fas fa-times mr-1"></i>हटाएँ</button>
                </div>
            </div>

            <!-- Grid -->
            <div id="photoGrid" class="grid grid-cols-3 gap-2 sm:gap-4">
                <!-- Javascript will populate this -->
            </div>
            
            <div class="h-20"></div> <!-- Spacer for bottom bar -->
        </div>

    </main>

    <!-- STEP 3 (Part 2): Action Buttons (Sticky Bottom Bar) -->
    <div id="actionButtons" class="bottom-bar flex justify-between items-center gap-4">
        <div class="text-slate-300 text-sm">
            <span id="selectedCount">0</span> फोटो चुनी गईं
        </div>
        <button onclick="downloadZip()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-400 hover:to-red-400 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center">
            <i class="fas fa-download mr-2"></i> डाउनलोड ZIP
        </button>
    </div>

    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

    <script>
        const API_SEARCH = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
        const API_SAVE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

        let globalMatches = [];
        let selected = [];

        /* Convert to Base64 */
        function toBase64(file) {
            return new Promise(res => {
                let reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }

        /* Extract linkId */
        function linkId() {
            return new URLSearchParams(window.location.search).get("linkId");
        }
        
        /* UI Helper: Preview Selfie */
        function previewSelfie(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('selfiePreview').src = e.target.result;
                    document.getElementById('selfiePreviewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        /* UI Helper: Toggle Loading State */
        function setLoading(isLoading) {
            const btnText = document.getElementById("btnText");
            const btnLoader = document.getElementById("btnLoader");
            const btn = document.getElementById("searchBtn");
            
            if(isLoading) {
                btnText.innerText = "खोज रहा है...";
                btnLoader.classList.remove("hidden");
                btn.disabled = true;
                btn.classList.add("opacity-75");
            } else {
                btnText.innerText = "फोटो खोजें";
                btnLoader.classList.add("hidden");
                btn.disabled = false;
                btn.classList.remove("opacity-75");
            }
        }

        /* STEP 1: Find Matches */
        async function findMatches() {
            const file = document.getElementById("selfieInput").files[0];
            if (!file) return alert("कृपया सेल्फी अपलोड करें!");

            setLoading(true);

            try {
                const base64 = await toBase64(file);

                const body = {
                    linkId: linkId(),
                    name: "temp",
                    mobile: "temp",
                    selfie_image: base64
                };

                let res = await fetch(API_SEARCH, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                let data = await res.json();

                globalMatches = data.matches || [];

                const countElem = document.getElementById("matchCount");
                if (globalMatches.length > 0) {
                    countElem.innerText = `🎉 ${globalMatches.length} फोटो मिलीं!`;
                    countElem.className = "text-center mt-4 text-sm font-bold text-emerald-400 h-6";
                    
                    // Scroll to next step smoothly
                    document.getElementById("detailsForm").classList.remove("hidden");
                    setTimeout(() => {
                        document.getElementById("detailsForm").scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                } else {
                    countElem.innerText = "❌ कोई फोटो नहीं मिली, कृपया दूसरी फोटो प्रयास करें।";
                    countElem.className = "text-center mt-4 text-sm font-bold text-red-400 h-6";
                }

            } catch (error) {
                alert("कुछ गलती हुई, कृपया दोबारा प्रयास करें।");
                console.error(error);
            } finally {
                setLoading(false);
            }
        }

        /* STEP 2: Submit Details */
        async function submitDetails() {
            let name = document.getElementById("guestName").value.trim();
            let mobile = document.getElementById("guestMobile").value.trim();

            if (!name || !mobile) return alert("कृपया नाम और मोबाइल नंबर भरें!");

            // Show simple loading feedback on button text (optional)
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "कृपया प्रतीक्षा करें...";
            btn.disabled = true;

            try {
                const body = {
                    linkId: linkId(),
                    name,
                    mobile,
                    selfie_image: "skip"
                };

                await fetch(API_SAVE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                document.getElementById("detailsForm").classList.add("hidden"); // Hide form to save space
                document.getElementById("step1").classList.add("hidden"); // Hide upload to save space
                
                showPhotos(globalMatches);
                
                document.getElementById("gallerySection").classList.remove("hidden");
                document.getElementById("actionButtons").style.display = "flex"; // Show sticky footer
                
            } catch (error) {
                alert("Error submitting details");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        /* SHOW PHOTOS */
        function showPhotos(list) {
            let grid = document.getElementById("photoGrid");
            grid.innerHTML = "";

            list.forEach(photo => {
                // Card Container
                let box = document.createElement("div");
                box.className = "photo-card bg-slate-800";
                box.id = `box-${photo.url}`; // Unique ID for referencing

                // Image
                let img = document.createElement("img");
                img.src = photo.url;
                img.className = "w-full h-full object-cover";
                // Lightbox integration disabled on click because click selects the photo now
                // but we can keep lightbox attribute if we want a separate view button.
                // For this flow, user wants to SELECT to download.
                
                box.appendChild(img);

                // Click event to toggle selection
                box.onclick = () => togglePhoto(photo, box);

                grid.appendChild(box);
            });
            updateSelectionUI();
        }

        function togglePhoto(photo, boxElement) {
            const index = selected.findIndex(p => p.url === photo.url);
            
            if (index > -1) {
                // Already selected, remove it
                selected.splice(index, 1);
                boxElement.classList.remove("selected");
            } else {
                // Add to selection
                selected.push(photo);
                boxElement.classList.add("selected");
            }
            updateSelectionUI();
        }

        function selectAll() {
            selected = [...globalMatches];
            document.querySelectorAll(".photo-card").forEach(box => box.classList.add("selected"));
            updateSelectionUI();
        }

        function clearAll() {
            selected = [];
            document.querySelectorAll(".photo-card").forEach(box => box.classList.remove("selected"));
            updateSelectionUI();
        }
        
        function updateSelectionUI() {
            document.getElementById("selectedCount").innerText = selected.length;
            const actionBtn = document.getElementById("actionButtons");
            
            // Auto hide/show bottom bar based on selection (Optional, currently set to always show if details submitted)
            // if(selected.length > 0) actionBtn.style.display = "flex";
        }

        /* ZIP DOWNLOAD */
        async function downloadZip() {
            if (selected.length === 0) return alert("कृपया कम से कम एक फोटो चुनें!");

            const btn = document.querySelector("#actionButtons button");
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> डाउनलोड हो रहा है...`;
            btn.disabled = true;

            try {
                const zip = new JSZip();
                const folder = zip.folder("photos");

                for (let i = 0; i < selected.length; i++) {
                    // Fetch through a proxy or directly if CORS allows. Assuming standard fetch works here based on your code.
                    const blob = await fetch(selected[i].url).then(r => r.blob());
                    folder.file(`EventLens_Photo_${i + 1}.jpg`, blob);
                }

                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, "EventLens_Photos.zip");
            } catch (e) {
                alert("Download Failed. Try again.");
                console.error(e);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
