<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventLens – अपनी फोटो खोजें</title>

<style>
    body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }
    #preview {
        width: 220px;
        margin-top: 20px;
        border-radius: 10px;
        display: none;
    }
    button {
        padding: 12px 28px;
        background: #00cc55;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 20px;
        cursor: pointer;
        margin-top: 20px;
    }
    button:hover { background: #009e3c; }
    .error { color: #ff5252; margin-top: 10px; }
</style>
</head>

<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<input type="file" id="selfieInput" accept="image/*">

<br>
<img id="preview">

<br>
<button onclick="uploadSelfie()">फोटो खोजें</button>

<p id="msg" class="error"></p>

<script>
/* YOUR API URL */
const apiURL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";

let selfieBase64 = "";

/* PREVIEW SELFIE */
document.getElementById("selfieInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(evt) {
        selfieBase64 = evt.target.result;
        document.getElementById("preview").src = selfieBase64;
        document.getElementById("preview").style.display = "block";
    };
    reader.readAsDataURL(file);
});

/* MAIN FUNCTION */
async function uploadSelfie() {
    const msg = document.getElementById("msg");
    msg.innerText = "";

    if (!selfieBase64) {
        msg.innerText = "कृपया एक फोटो चुनें।";
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const linkId = params.get("linkId");

    if (!linkId) {
        msg.innerText = "Link ID नहीं मिला!";
        return;
    }

    const payload = {
        linkId: linkId,
        name: "guest",
        mobile: "0000000000",
        selfie_image: selfieBase64
    };

    msg.innerText = "कृपया प्रतीक्षा करें...";

    try {
        const res = await fetch(apiURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("API response:", data);

        if (data.error) {
            msg.innerText = "त्रुटि: " + data.error;
        } else if (!data.matches || data.matches.length === 0) {
            msg.innerText = "क्षमा करें, आपकी फोटो नहीं मिली।";
        } else {
            msg.innerText = data.matches.length + " फोटो मिली!";
        }

    } catch (err) {
        console.error(err);
        msg.innerText = "Server error!";
    }
}
</script>

</body>
</html>
