<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventLens – अपनी फोटो खोजें</title>

<style>
    body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 30px;
    }
    #preview {
        width: 220px;
        margin-top: 20px;
        border-radius: 10px;
        display: none;
    }
    button {
        padding: 10px 25px;
        background: #00c853;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
    }
    button:hover {
        background: #009e3f;
    }
    .error {
        color: #ff5252;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<input type="file" id="selfieInput" accept="image/*">
<br>
<img id="preview">

<br><br>
<button onclick="uploadSelfie()">फोटो खोजें</button>

<p id="msg" class="error"></p>

<script>
let apiURL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search
";  // ← यहाँ अपना API URL डालना है

let selfieBase64 = "";

document.getElementById("selfieInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(evt) {
        selfieBase64 = evt.target.result;
        document.getElementById("preview").src = selfieBase64;
        document.getElementById("preview").style.display = "block";
    };
    reader.readAsDataURL(file);
});

async function uploadSelfie() {
    if (!selfieBase64) {
        document.getElementById("msg").innerText = "कृपया एक फोटो चुनें।";
        return;
    }

    document.getElementById("msg").innerText = "कृपया प्रतीक्षा करें...";

    // URL के query parameter से linkId निकालना
    const urlParams = new URLSearchParams(window.location.search);
    const linkId = urlParams.get("linkId");

    if (!linkId) {
        document.getElementById("msg").innerText = "Link ID नहीं मिला!";
        return;
    }

    try {
        let response = await fetch(apiURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                linkId: linkId,
                name: "temp",      // name बाद में लेंगे
                mobile: "0",       // mobile बाद में
                selfie_image: selfieBase64
            })
        });

        let result = await response.json();
        console.log("API Response:", result);

        if (result.error) {
            document.getElementById("msg").innerText = "Error: " + result.error;
        } else if (!result.matches || result.matches.length === 0) {
            document.getElementById("msg").innerText = "क्षमा करें, आपकी फोटो नहीं मिली।";
        } else {
            document.getElementById("msg").innerText =
                result.matches.length + " फोटो मिली!";
        }

    } catch (err) {
        console.error(err);
        document.getElementById("msg").innerText = "सर्वर त्रुटि!";
    }
}
</script>

</body>
</html>
