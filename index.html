<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>EventLens – अपनी फोटो खोजें</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css"/>

<style>
    body {
        background: #000;
        color: #fff;
        font-family: 'Poppins', sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 32px;
        font-weight: 600;
    }

    .section {
        display: none;
    }

    .active {
        display: block;
    }

    .btn {
        background: linear-gradient(45deg, #ffb300, #ff7a00);
        padding: 14px 28px;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        margin-top: 15px;
        color: #000;
        font-weight: bold;
    }

    .btn-green {
        background: #00ff6e;
    }

    .btn-block {
        width: 90%;
        max-width: 360px;
    }

    input {
        width: 90%;
        max-width: 360px;
        padding: 12px;
        border-radius: 10px;
        margin-top: 10px;
        background: #111;
        border: 1px solid #444;
        color: white;
        font-size: 16px;
    }

    #previewImg {
        margin-top: 15px;
        max-width: 260px;
        border-radius: 12px;
        display: none;
        border: 2px solid #ffb300;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 14px;
        margin-top: 20px;
    }

    .card {
        border: 3px solid #ffb300;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }

    .event-badge {
        position: absolute;
        bottom: 8px;
        left: 8px;
        padding: 4px 10px;
        background: rgba(0,0,0,0.6);
        border-radius: 6px;
        font-size: 12px;
        border: 1px solid #ffb300;
    }

    .tick {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 20px;
        background: #00eaff;
        padding: 6px 10px;
        border-radius: 50%;
        display: none;
    }

</style>
</head>

<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<!-- STEP 1: SELFIE ONLY -->
<div id="step1" class="section active">
    <button class="btn btn-block" onclick="pickFile()">सेल्फी अपलोड करें</button>
    <button class="btn btn-block" onclick="openCamera()">कैमरा खोलें</button>

    <input type="file" id="selfieInput" accept="image/*" style="display:none">
    <img id="previewImg">

    <button class="btn btn-green btn-block" onclick="startSearch()">फोटो खोजें</button>
</div>


<!-- STEP 2: SHOW MATCH COUNT + ASK DETAILS -->
<div id="step2" class="section">
    <h2 id="matchCount"></h2>
    <p>अपनी पहचान सत्यापित करने के लिए विवरण भरें</p>

    <input id="guestName" placeholder="आपका नाम">
    <input id="guestMobile" placeholder="मोबाइल नंबर">

    <button class="btn btn-green btn-block" onclick="submitDetails()">जारी रखें</button>
</div>


<!-- STEP 3: SHOW PHOTOS -->
<div id="step3" class="section">
    <h2 id="resultTitle"></h2>

    <button class="btn" onclick="selectAll()">सभी चुनें</button>
    <button class="btn" onclick="clearAll()">साफ़ करें</button>

    <div class="grid" id="photoGrid"></div>

    <button class="btn btn-green" onclick="downloadZip()">ZIP डाउनलोड</button>
</div>




<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

<script>
let selfieBase64 = "";
let tempMatches = [];
let finalPhotos = [];
const apiURL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

function pickFile() {
    document.getElementById("selfieInput").click();
}

function openCamera() {
    document.getElementById("selfieInput").setAttribute("capture", "camera");
    document.getElementById("selfieInput").click();
}

document.getElementById("selfieInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
        selfieBase64 = ev.target.result;
        previewImg.src = selfieBase64;
        previewImg.style.display = "block";
    };
    reader.readAsDataURL(file);
});

function getLinkId() {
    return new URLSearchParams(window.location.search).get("linkId");
}

async function startSearch() {
    if (!selfieBase64) {
        alert("कृपया सेल्फी अपलोड करें");
        return;
    }

    // Step 1 → Step 2
    document.getElementById("step1").classList.remove("active");
    document.getElementById("step2").classList.add("active");

    // SEARCH only, but don’t show photos yet
    const res = await fetch(apiURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            linkId: getLinkId(),
            name: "temp",
            mobile: "temp",
            selfie_image: selfieBase64
        })
    });

    const data = await res.json();
    tempMatches = data.matches || [];

    document.getElementById("matchCount").innerText =
        `${tempMatches.length} फोटो मिलीं!`;
}

async function submitDetails() {
    const name = guestName.value.trim();
    const mobile = guestMobile.value.trim();
    if (!name || !mobile) {
        alert("कृपया नाम और मोबाइल भरें");
        return;
    }

    // Now call again with real details
    const res = await fetch(apiURL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            linkId: getLinkId(),
            name,
            mobile,
            selfie_image: selfieBase64
        })
    });

    const data = await res.json();
    finalPhotos = data.matches;

    document.getElementById("step2").classList.remove("active");
    document.getElementById("step3").classList.add("active");

    document.getElementById("resultTitle").innerText =
        `${finalPhotos.length} फोटो मिलीं!`;

    showPhotos();
}

function showPhotos() {
    const grid = document.getElementById("photoGrid");
    grid.innerHTML ="";

    finalPhotos.forEach((p)=> {
        let div = document.createElement("div");
        div.className = "card";

        let img = document.createElement("img");
        img.src = p.url;
        img.setAttribute("data-lightbox","gallery");

        let tick = document.createElement("div");
        tick.className="tick";
        tick.innerHTML="✔";

        let badge = document.createElement("div");
        badge.className = "event-badge";
        badge.innerText = p.eventName;

        div.appendChild(img);
        div.appendChild(tick);
        div.appendChild(badge);
        div.onclick = () => toggleSelect(div, p);

        grid.appendChild(div);
    });
}

let selected = [];

function toggleSelect(box, photo) {
    const tick = box.querySelector(".tick");
    if (tick.style.display==="block") {
        tick.style.display="none";
        selected = selected.filter(p=>p.url!==photo.url);
    } else {
        tick.style.display="block";
        selected.push(photo);
    }
}

function selectAll() {
    selected = [...finalPhotos];
    document.querySelectorAll(".tick").forEach(t=> t.style.display="block");
}

function clearAll() {
    selected = [];
    document.querySelectorAll(".tick").forEach(t=> t.style.display="none");
}

async function downloadZip() {
    if (selected.length===0) {
        alert("कृपया फोटो चुनें!");
        return;
    }

    const zip = new JSZip();
    let folder = zip.folder("photos");

    for (let i=0; i<selected.length; i++) {
        let blob = await fetch(selected[i].url).then(r=>r.blob());
        folder.file(`photo_${i+1}.jpg`, blob);
    }

    const content = await zip.generateAsync({type:"blob"});
    saveAs(content, "EventPhotos.zip");
}
</script>

</body>
</html>
