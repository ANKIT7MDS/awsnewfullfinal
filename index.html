<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EventLens – Find Your Photos Instantly</title>

  <!-- Confetti + Zip -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg: #050505;
      --card: #101010;
      --accent: #00e676;
      --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff;
      --muted: #a0a0a0;
      --border: #262626;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:white; font-family:system-ui; min-height:100vh; padding-bottom:50px; }

    .container { max-width:600px; margin:0 auto; padding:16px; }

    header { text-align:center; margin-bottom:30px; }
    header h1 {
      font-size:32px; font-weight:800;
      background: linear-gradient(90deg, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color:var(--muted); font-size:14px; margin-top:5px; }

    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:24px 20px; margin-bottom:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }

    .step-title {
      font-size:14px; font-weight:600; color:var(--muted);
      text-transform:uppercase; letter-spacing:1.2px; margin-bottom:16px;
    }

    .camera-btn {
      background:#1a1a1a; border:2px dashed var(--accent);
      border-radius:16px; padding:36px; text-align:center;
      color:white; font-weight:600; cursor:pointer; transition:0.3s;
    }
    .camera-btn:hover { background:#222; }
    .camera-btn:active { transform:scale(0.97); }
    .camera-icon { font-size:40px; margin-bottom:10px; }

    .gallery-link { color:var(--accent); text-decoration:underline; font-size:14px; }

    input[type="text"], input[type="tel"] {
      width:100%; padding:16px; background:#000; border:1px solid var(--border);
      border-radius:12px; color:white; font-size:16px; margin-bottom:14px;
    }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,230,118,0.2); }

    .btn {
      width:100%; padding:16px; border-radius:50px; border:none;
      background:var(--accent); color:#000; font-weight:700; font-size:17px;
      cursor:pointer; transition:0.3s; margin-top:10px;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 10px 20px rgba(0,230,118,0.3); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    #previewImg {
      width:150px; height:150px; border-radius:50%; object-fit:cover;
      border:5px solid var(--accent); box-shadow:0 0 30px rgba(0,230,118,0.4);
      margin:20px auto; display:block;
    }

    .loading-dots {
      display:inline-block; font-size:18px;
    }
    .loading-dots:after {
      content:' .'; animation: dots 1.5s steps(5, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content:'   '; }
      40% { content:' .'; }
      60% { content:' ..'; }
      80%, 100% { content:' ...'; }
    }

    .chip.active { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    @media(min-width:768px) { .grid { grid-template-columns:repeat(5,1fr); gap:10px; } }

    .photo-item {
      aspect-ratio:1; position:relative; border-radius:8px; overflow:hidden; cursor:pointer;
      background:#111;
    }
    .photo-item img { width:100%; height:100%; object-fit:cover; transition:0.3s; }
    .photo-item.selected img { opacity:0.6; transform:scale(0.94); }
    .check-mark {
      position:absolute; top:6px; right:6px; width:26px; height:26px;
      background:var(--accent); color:#000; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-weight:bold;
      opacity:0; transition:0.2s;
    }
    .photo-item.selected .check-mark { opacity:1; }

    .viewer { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:999;
      align-items:center; justify-content:center; flex-direction:column; }
    .viewer.open { display:flex; }
    .viewer img { max-width:95%; max-height:78vh; border-radius:12px; }
    .close-viewer { position:absolute; top:20px; right:20px; font-size:36px; cursor:pointer; }

    .share-wa {
      background:#25D366 !important; color:white !important; margin-top:15px;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>EventLens</h1>
    <p>Apki event ki saari photos ek selfie se mil jayengi!</p>
  </header>

  <!-- STEP 1 -->
  <div id="step1" class="card" style="text-align:center;">
    <div class="step-title" style="text-align:left;">1. Apna Selfie Daaliye</div>
    
    <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">
    <input type="file" id="galleryInput" accept="image/*" style="display:none">

    <label for="cameraInput" class="camera-btn">
      <div class="camera-icon">Camera</div>
      Selfie Kheechiye
    </label>

    <div style="margin-top:8px;">
      <span style="color:#555; font-size:13px;">ya phir</span><br>
      <label for="galleryInput" class="gallery-link">Gallery se upload kariye</label>
    </div>

    <div id="previewContainer" style="display:none; margin-top:20px;">
      <img id="previewImg" alt="Your selfie">
      <button id="retakeBtn" class="btn" style="background:#333; margin-top:10px;">Retake</button>
      <button id="searchBtn" class="btn">Dhoondho Meri Photos</button>
    </div>

    <p id="loadingText" style="margin-top:15px; color:var(--accent); font-weight:600;"></p>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="card" style="display:none;">
    <div class="step-title">2. Apna Naam aur Number Daaliye</div>
    <p style="margin-bottom:20px; font-size:18px;">
      Hurray! Humne aapki <b style="color:var(--accent);" id="matchCount">0</b> photos dhund li!
    </p>
    <input type="text" id="guestName" placeholder="Naam (jaise Rahul, Priya)">
    <input type="tel" id="guestMobile" placeholder="Mobile Number (10 digit)" maxlength="10">
    <button id="showGalleryBtn" class="btn">Photos Dekhiye</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" class="card" style="background:transparent; border:none; padding:0; display:none;">
    <div class="search-wrapper" style="margin-bottom:15px; position:relative;">
      <span style="position:absolute;left:16px;top:14px;color:#888;">Search</span>
      <input type="text" id="searchInput" placeholder="Search karo – Red kurta, Stage, Smile..." style="padding-left:46px;">
    </div>

    <div class="filter-row" style="display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:15px;">
      <div class="chip active" onclick="filterPhotos('ALL',this)">All</div>
      <div class="chip" onclick="filterPhotos('BEST',this)">Best</div>
      <div class="chip" onclick="filterPhotos('HAPPY',this)">Happy</div>
      <div class="chip" onclick="filterPhotos('GROUP',this)">Group</div>
      <div class="chip" onclick="filterPhotos('TEXT',this)">Text</div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="color:#aaa;">Selected: <b id="selCount" style="color:white;">0</b></span>
      <div>
        <button class="btn" style="padding:8px 16px;font-size:14px;background:#333;" onclick="selectAll()">Select All</button>
        <button class="btn" style="padding:8px 20px;font-size:14px;" onclick="downloadZip()">Download ZIP</button>
      </div>
    </div>

    <div id="photoGrid" class="grid"></div>

    <button class="btn share-wa" onclick="shareOnWA()" style="margin-top:20px;">
      Share on WhatsApp
    </button>
  </div>
</div>

<!-- Viewer -->
<div id="viewer" class="viewer">
  <div class="close-viewer" onclick="closeViewer()">X</div>
  <img id="viewerImage">
  <div style="position:absolute;bottom:30px;display:flex;gap:20px;">
    <button class="btn" style="padding:10px 20px;" onclick="prevImage()">Previous</button>
    <button class="btn" style="padding:10px 20px;background:#333;" onclick="toggleViewerSelect()">Select</button>
    <button class="btn" style="padding:10px 20px;" onclick="nextImage()">Next</button>
  </div>
</div>

<script>
  const SEARCH_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
  const SAVE_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

  let allPhotos = [], filteredPhotos = [], selectedUrls = new Set(), selfieBase64 = null, currentViewerIndex = 0;
  let currentMatchCount = 0;

  // Compress Image before upload
  function compressAndSet(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h *= MAX / w; w = MAX; }
        else if (h > MAX) { w *= MAX / h; h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        selfieBase64 = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('previewImg').src = selfieBase64;
        document.getElementById('previewContainer').style.display = 'block';
        document.getElementById('previewContainer').scrollIntoView({behavior:'smooth'});
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('cameraInput').onchange = e => e.target.files[0] && compressAndSet(e.target.files[0]);
  document.getElementById('galleryInput').onchange = e => e.target.files[0] && compressAndSet(e.target.files[0]);

  document.getElementById('retakeBtn').onclick = () => {
    selfieBase64 = null;
    document.getElementById('previewContainer').style.display = 'none';
    ['cameraInput','galleryInput'].forEach(id => document.getElementById(id).value = '');
  };

  // Fake Progress + Confetti
  document.getElementById('searchBtn').onclick = async () => {
    if (!selfieBase64) return alert("Pehle selfie to selfie daaliye!");
    const params = new URLSearchParams(location.search);
    const linkId = params.get('linkId');
    if (!linkId) return alert("Link ID nahi mila! Sahi link se aaiye.");

    const loading = document.getElementById('loadingText');
    loading.innerHTML = "AI faces scan kar raha hai<span class='loading-dots'></span>";
    document.getElementById('searchBtn').disabled = true;

    try {
      const res = await fetch(SEARCH_API, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({linkId, selfie_image: selfieBase64})
      });

      if (!res.ok) throw new Error("Server error");
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      allPhotos = data.matches || [];
      filteredPhotos = [...allPhotos];
      currentMatchCount = allPhotos.length;

      document.getElementById('matchCount').innerText = currentMatchCount;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';

      // Confetti Blast
      confetti({particleCount:150, spread:80, origin:{y:0.6}});

    } catch(err) {
      alert("Kuch galat hua: " + err.message);
    } finally {
      loading.textContent = '';
      document.getElementById('searchBtn').disabled = false;
    }
  };

  document.getElementById('showGalleryBtn').onclick = () => {
    const name = document.getElementById('guestName').value.trim();
    const mobile = document.getElementById('guestMobile').value;
    if (!name || mobile.length < 10) return alert("Naam aur 10-digit mobile daaliye");

    // Background save (no change)
    fetch(SAVE_API, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        linkId: new URLSearchParams(location.search).get('linkId'),
        name, mobile, selfie_image: selfieBase64, photo_count: currentMatchCount
      })
    });

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
    renderGrid();
  };

  // Rest of your existing functions (filter, grid, download, viewer) same hi hain – sirf chhoti si beautification ki hai
  // ... (same code as before – copy kar lena neeche se)

  function renderGrid() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = '';
    filteredPhotos.forEach((photo, i) => {
      const div = document.createElement('div');
      div.className = `photo-item ${selectedUrls.has(photo.url)?'selected':''}`;
      div.innerHTML = `<img src="${photo.url}" loading="lazy"><div class="check-mark">Check</div>`;
      div.onclick = e => e.target.closest('.check-mark') ? toggleSelect(photo.url) : openViewer(i);
      grid.appendChild(div);
    });
    document.getElementById('selCount').innerText = selectedUrls.size;
  }

  // Baki saare functions same (filterPhotos, downloadZip, viewer, etc.) – jo pehle the wahi copy paste kar do

  function shareOnWA() {
    const text = "Maine EventLens se apne event ki saari photos ek selfie se download kar li! Tu bhi try kar ➜ https://yourlink.com";
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
  }

  // Copy paste karo baaki functions jo pehle the (selectAll, downloadZip, openViewer etc.) – sab same kaam karenge
</script>

<!-- Baaki saare functions (jo pehle the) neeche paste kar do – koi change nahi -->
<script>
// (Yahan se neeche pura paste kar do jo pehle tha – filterPhotos, downloadZip, viewer wagairah)
window.filterPhotos = function(type, el) { /* same as before }
function toggleSelect(url) { /* same */ }
window.selectAll = function() { /* same */ }
window.downloadZip = async function() { /* same as before */ }
function openViewer(index) { /* same */ }
window.closeViewer = function() { document.getElementById('viewer').classList.remove('open'); }
function updateViewer() { document.getElementById('viewerImage').src = filteredPhotos[currentViewerIndex].url; }
window.nextImage = () => { currentViewerIndex = (currentViewerIndex + 1) % filteredPhotos.length; updateViewer(); }
window.prevImage = () => { currentViewerIndex = (currentViewerIndex - 1 + filteredPhotos.length) % filteredPhotos.length; updateViewer(); }
window.toggleViewerSelect = () => toggleSelect(filteredPhotos[currentViewerIndex].url);
</script>

</body>
</html>
