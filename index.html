<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>EventLens – अपनी फोटो खोजें</title>

<style>
    body {
        background: #000;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
    }
    #previewImg {
        width: 260px;
        border-radius: 10px;
        display: none;
        margin-top: 20px;
    }
    #resultArea img {
        width: 160px;
        margin: 10px;
        border-radius: 10px;
        border: 2px solid #00ff55;
    }
    #loader {
        display: none;
        margin-top: 20px;
        font-size: 18px;
        color: #00ff55;
    }
    #error {
        color: red;
        margin-top: 10px;
        font-size: 18px;
    }
</style>

</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<input type="file" id="fileInput" accept="image/*"><br>

<img id="previewImg">

<button onclick="uploadSelfie()" 
        style="margin-top:20px;padding:10px 25px;font-size:20px;background:#00c74f;color:white;border:0;border-radius:8px;">
        फोटो खोजें
</button>

<div id="loader">⏳ कृपया प्रतीक्षा करें, हम आपकी फोटो खोज रहे हैं...</div>
<div id="error"></div>
<div id="resultMsg"></div>

<h2 id="countText"></h2>

<div id="resultArea"></div>

<script>

const API_URL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";


document.getElementById("fileInput").addEventListener("change", function () {
    let f = this.files[0];
    if (!f) return;

    let reader = new FileReader();
    reader.onload = function (e) {
        previewImg.src = e.target.result;
        previewImg.style.display = "block";
    };
    reader.readAsDataURL(f);
});


// ----------------- MAIN SEARCH FUNCTION ---------------------
async function uploadSelfie() {

    let file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("कृपया फोटो चुनें");
        return;
    }

    let reader = new FileReader();

    reader.onloadend = async function () {

        let base64Image = reader.result;

        let linkId = new URLSearchParams(window.location.search).get("linkId");
        if (!linkId) {
            alert("❌ Link ID नहीं मिला");
            return;
        }

        let body = {
            linkId: linkId,
            name: "guest",
            mobile: "0000000000",
            selfie_image: base64Image
        };

        document.getElementById("loader").style.display = "block";
        document.getElementById("error").innerHTML = "";
        document.getElementById("resultArea").innerHTML = "";
        document.getElementById("countText").innerHTML = "";


        try {
            let res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            let data = await res.json();
            document.getElementById("loader").style.display = "none";

            if (!data.matches || data.matches.length === 0) {
                document.getElementById("error").innerHTML = "क्षमा करें, कोई फोटो नहीं मिली।";
                return;
            }

            document.getElementById("countText").innerHTML =
                data.matches.length + " फोटो मिली!";

            // RESULT GRID ------------------
            data.matches.forEach(m => {
                let img = document.createElement("img");
                img.src = m.url;
                document.getElementById("resultArea").appendChild(img);
            });

        } catch (err) {
            document.getElementById("loader").style.display = "none";
            document.getElementById("error").innerHTML =
                "त्रुटि: " + err.message;
        }
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
