<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventLens – Smart AI Gallery</title>

  <!-- NEW: Confetti for celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <!-- Zip download libs (unchanged) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg: #050505;
      --card: #101010;
      --accent: #00e676; /* Green Accent */
      --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff;
      --muted: #a0a0a0;
      --border: #262626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .container {
      max-width: 600px; /* Mobile focused width */
      margin: 0 auto;
      padding: 16px;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 25px;
    }
    header h1 {
      font-size: 32px; /* NEW: Slightly larger */
      font-weight: 700;
      background: linear-gradient(to right, #fff, #bbb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* CARDS */
    .card {
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .step-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* CUSTOM CAMERA BUTTONS */
    .camera-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 200px;
      border: 3px dashed var(--accent);
      border-radius: 20px;
      background: var(--accent-soft);
      cursor: pointer;
      transition: all 0.3s;
    }
    .camera-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: scale(1.02);
    }
    .camera-icon {
      font-size: 60px;
      margin-bottom: 10px;
      color: var(--accent);
    }
    .camera-text {
      font-size: 16px;
      color: var(--muted);
    }

    /* PREVIEW */
    #previewContainer {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    #previewImg {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      object-fit: cover;
      margin-bottom: 15px;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      background: #00d15f;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* STEP 2 */
    #step2 {
      display: none;
    }
    .match-info {
      text-align: center;
      margin-bottom: 20px;
    }
    .match-number {
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
    }
    .match-text {
      color: var(--muted);
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #111;
      color: var(--text);
      font-size: 16px;
    }
    .form-group input:focus {
      border-color: var(--accent);
      outline: none;
    }

    /* STEP 3 */
    #step3 {
      display: none;
    }
    .search-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    #searchInput {
      width: 100%;
      padding: 12px 40px 12px 50px;
      border: 1px solid var(--border);
      border-radius: 25px;
      background: #111;
      color: var(--text);
      font-size: 16px;
    }
    #searchInput:focus {
      border-color: var(--accent);
      outline: none;
    }
    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 20px;
    }
    .filter-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .filter-chip {
      padding: 8px 16px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
    }
    .filter-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .filter-chip:hover {
      border-color: var(--accent);
    }
    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .selected-count {
      color: var(--muted);
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .photo-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s;
    }
    .photo-item:hover {
      transform: scale(1.05);
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .select-overlay {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    .photo-item.selected .select-overlay {
      display: flex;
    }
    .whatsapp-btn {
      display: none;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .whatsapp-btn:hover {
      background: #1DA851;
    }

    /* VIEWER */
    .viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .viewer.open {
      opacity: 1;
      pointer-events: auto;
    }
    .viewer img {
      max-width: 90%;
      max-height: 90vh;
      border-radius: 10px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }
    .viewer-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 30px;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      padding: 5px 12px;
      border-radius: 50%;
    }
    .viewer-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    .viewer-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
    }

    /* LOADING */
    .loading-dots {
      display: inline-block;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(5, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* MOBILE OPTIMIZATIONS */
    @media (max-width: 480px) {
      .container {
        padding: 10px;
      }
      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 5px;
      }
      .action-row {
        flex-direction: column;
        gap: 10px;
      }
      .actions {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- STEP 1: SELFIE UPLOAD -->
    <header>
      <h1>EventLens</h1>
      <p class="match-text">AI Powered Photo Finder</p>
    </header>

    <div id="step1" class="card">
      <h3 class="step-title">1. Upload Your Selfie</h3>
      <div class="camera-btn">
        <div class="camera-icon">📸</div>
        <div class="camera-text">Tap to take a photo or choose from gallery</div>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="galleryInput" accept="image/*" style="display:none">
      <div id="previewContainer">
        <img id="previewImg" alt="Preview">
        <div class="action-buttons">
          <button class="btn btn-secondary" onclick="retakePhoto()">Retake</button>
          <button class="btn btn-primary" onclick="searchPhotos()" id="searchBtn">Search Photos</button>
        </div>
      </div>
      <p id="loadingText" class="loading-text" style="display:none">Scanning faces with AI<span class="loading-dots"></span></p>
    </div>

    <!-- STEP 2: ENTER DETAILS -->
    <div id="step2" class="card">
      <h3 class="step-title">2. Enter Your Details</h3>
      <div class="match-info">
        <h2 class="match-number" id="matchNumber">0</h2>
        <p class="match-text">photos found! 🎉</p>
      </div>
      <div class="form-group">
        <label for="guestName">Your Name</label>
        <input type="text" id="guestName" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label for="guestMobile">Mobile Number</label>
        <input type="tel" id="guestMobile" placeholder="10-digit mobile" required>
      </div>
      <button class="btn btn-primary" onclick="showGallery()" id="showGalleryBtn">Show Gallery</button>
    </div>

    <!-- STEP 3: GALLERY -->
    <div id="step3">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search in your photos..." oninput="filterPhotos()">
      </div>
      <div class="filter-row">
        <div class="filter-chip active" onclick="filterByType('ALL')">All</div>
        <div class="filter-chip" onclick="filterByType('BEST')">⭐ Best</div>
        <div class="filter-chip" onclick="filterByType('HAPPY')">😊 Happy</div>
        <div class="filter-chip" onclick="filterByType('GROUP')">👥 Groups</div>
        <div class="filter-chip" onclick="filterByType('TEXT')">📝 Text</div>
      </div>
      <div class="action-row">
        <div class="selected-count" id="selectedCount">0 selected</div>
        <div class="actions">
          <button class="btn btn-secondary" onclick="selectAll()">Select All</button>
          <button class="btn btn-primary" onclick="downloadZip()">Download ZIP</button>
        </div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
      <button class="whatsapp-btn" onclick="shareOnWhatsApp()">Share on WhatsApp</button>
    </div>

    <!-- VIEWER -->
    <div class="viewer" id="viewer">
      <button class="viewer-close" onclick="closeViewer()">×</button>
      <img id="viewerImage" alt="Full view">
      <div class="viewer-controls">
        <button class="viewer-btn" onclick="prevImage()">←</button>
        <button class="viewer-btn" onclick="toggleViewerSelect()">✓</button>
        <button class="viewer-btn" onclick="nextImage()">→</button>
      </div>
    </div>
  </div>

  <script>
    // API Configuration
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const SEARCH_API = `${API_BASE}/search`;
    const SAVE_API = `${API_BASE}/save-details`;

    // State
    let allPhotos = [];
    let filteredPhotos = [];
    let selectedUrls = new Set();
    let selfieBase64 = null;
    let currentViewerIndex = 0;
    let matchCount = 0;
    let linkId = new URLSearchParams(window.location.search).get('linkId');

    // 1. SELFIE UPLOAD
    document.getElementById('cameraInput').addEventListener('change', handleFileSelect);
    document.getElementById('galleryInput').addEventListener('change', handleFileSelect);

    async function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      // Compress image
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        canvas.width = Math.min(img.width, 800);
        canvas.height = (img.height / img.width) * canvas.width;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => {
          const reader = new FileReader();
          reader.onload = () => {
            selfieBase64 = reader.result.split(',')[1]; // Base64 payload
            document.getElementById('previewImg').src = reader.result;
            document.getElementById('previewContainer').style.display = 'block';
            document.getElementById('step1').style.display = 'none';
          };
          reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.7);
      };
      img.src = URL.createObjectURL(file);
    }

    function retakePhoto() {
      document.getElementById('previewContainer').style.display = 'none';
      document.getElementById('step1').style.display = 'block';
      selfieBase64 = null;
      document.getElementById('cameraInput').value = '';
      document.getElementById('galleryInput').value = '';
    }

    // 2. SEARCH PHOTOS
    async function searchPhotos() {
      if (!selfieBase64 || !linkId) {
        alert('Please upload a selfie and use a valid link.');
        return;
      }

      const loadingText = document.getElementById('loadingText');
      loadingText.style.display = 'block';
      document.getElementById('searchBtn').disabled = true;

      try {
        const res = await fetch(SEARCH_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ linkId, selfie_image: `data:image/jpeg;base64,${selfieBase64}` })
        });

        if (!res.ok) throw new Error('Search failed');

        const data = await res.json();
        allPhotos = data.matches || [];
        matchCount = allPhotos.length;
        document.getElementById('matchNumber').textContent = matchCount;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';

        if (matchCount > 0) {
          confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
      } catch (e) {
        alert('Search failed: ' + e.message);
      } finally {
        loadingText.style.display = 'none';
        document.getElementById('searchBtn').disabled = false;
      }
    }

    // 3. SHOW GALLERY
    async function showGallery() {
      const name = document.getElementById('guestName').value.trim();
      const mobile = document.getElementById('guestMobile').value.trim();

      if (!name || !mobile || mobile.length < 10) {
        alert('Please enter valid name and 10-digit mobile.');
        return;
      }

      // Save details in background
      try {
        await fetch(SAVE_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            guest_name: name,
            mobile: mobile,
            linkId: linkId,
            selfie_image: `data:image/jpeg;base64,${selfieBase64}`,
            photo_count: matchCount
          })
        });
      } catch (e) {
        console.error('Save details failed:', e);
      }

      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'block';
      filteredPhotos = [...allPhotos];
      renderGrid();
      setTimeout(() => {
        document.querySelector('.whatsapp-btn').style.display = 'block';
      }, 1000);
    }

    // 4. FILTER & SEARCH
    function filterPhotos() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      filteredPhotos = allPhotos.filter(photo => {
        return photo.ai_tags.some(tag => tag.toLowerCase().includes(query)) ||
               photo.detected_text.some(text => text.toLowerCase().includes(query));
      });
      renderGrid();
    }

    function filterByType(type) {
      document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');

      switch (type) {
        case 'ALL':
          filteredPhotos = [...allPhotos];
          break;
        case 'BEST':
          filteredPhotos = allPhotos.filter(p => (p.quality_score || 0) > 85);
          break;
        case 'HAPPY':
          filteredPhotos = allPhotos.filter(p => p.emotions && p.emotions.some(e => e.Type === 'HAPPY' && e.Confidence > 60));
          break;
        case 'GROUP':
          filteredPhotos = allPhotos.filter(p => (p.face_count || 0) >= 3);
          break;
        case 'TEXT':
          filteredPhotos = allPhotos.filter(p => p.detected_text && p.detected_text.length > 0);
          break;
      }
      renderGrid();
    }

    // 5. RENDER GRID
    function renderGrid() {
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      const selectedCount = selectedUrls.size;
      document.getElementById('selectedCount').textContent = selectedCount + ' selected';

      filteredPhotos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'photo-item' + (selectedUrls.has(photo.url) ? ' selected' : '');
        item.onclick = (e) => {
          if (e.target.classList.contains('select-overlay')) {
            toggleSelect(photo.url);
          } else {
            openViewer(index);
          }
        };
        item.innerHTML = `
          <img src="${photo.url}" loading="lazy" alt="Photo">
          <div class="select-overlay">✓</div>
        `;
        grid.appendChild(item);
      });
    }

    // 6. SELECTION & DOWNLOAD
    function toggleSelect(url) {
      if(selectedUrls.has(url)) selectedUrls.delete(url);
      else selectedUrls.add(url);
      renderGrid();
    }

    window.selectAll = function() {
      if(selectedUrls.size === filteredPhotos.length) selectedUrls.clear();
      else filteredPhotos.forEach(p => selectedUrls.add(p.url));
      renderGrid();
    }

    window.downloadZip = async function() {
      if(selectedUrls.size === 0) return alert("Select photos first!");
      
      const zip = new JSZip();
      const folder = zip.folder("EventLens_Photos");
      const urls = Array.from(selectedUrls);

      const btn = document.querySelector("button[onclick='downloadZip()']");
      const oldText = btn.innerText;
      btn.innerText = "⏳ Zipping...";
      btn.disabled = true;

      try {
        for(let i=0; i<urls.length; i++) {
          const blob = await fetch(urls[i]).then(r => r.blob());
          folder.file(`photo_${i+1}.jpg`, blob);
        }
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, "My_Photos.zip");
      } catch(e) {
        alert("Download failed. Try again.");
      } finally {
        btn.innerText = oldText;
        btn.disabled = false;
      }
    };

    // 7. VIEWER LOGIC (ENHANCED)
    function openViewer(index) {
      currentViewerIndex = index;
      updateViewer();
      document.getElementById('viewer').classList.add('open');
    }
  
    window.closeViewer = function() {
      document.getElementById('viewer').classList.remove('open');
    }

    function updateViewer() {
      const photo = filteredPhotos[currentViewerIndex];
      document.getElementById('viewerImage').src = photo.url;
    }

    window.nextImage = function() {
      currentViewerIndex = (currentViewerIndex + 1) % filteredPhotos.length;
      updateViewer();
    }
  
    window.prevImage = function() {
      currentViewerIndex = (currentViewerIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
      updateViewer();
    }

    window.toggleViewerSelect = function() {
      const url = filteredPhotos[currentViewerIndex].url;
      toggleSelect(url);
    }

    // Initialize
    document.querySelector('.camera-btn').addEventListener('click', () => {
      document.getElementById('cameraInput').click();
    });

    document.querySelector('.camera-text').innerHTML += '<br><small>or <a href="#" onclick="document.getElementById(\'galleryInput\').click(); return false;">choose from gallery</a></small>';
  </script>
</body>
</html>
