<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>EventLens – अपनी फोटो खोजें</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Lightbox -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css"/>

<style>
    body {
        background: #000;
        color: #fff;
        text-align: center;
        font-family: 'Poppins', sans-serif;
        padding: 20px;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 15px;
    }

    .input-box {
        background: #111;
        padding: 14px;
        border-radius: 10px;
        margin-bottom: 12px;
        width: 90%;
        max-width: 380px;
        font-size: 18px;
        border: 1px solid #333;
        color: white;
    }

    label {
        font-size: 18px;
        display: block;
        margin-top: 12px;
    }

    #previewImg {
        max-width: 260px;
        border-radius: 12px;
        margin: 10px auto;
        display: none;
        border: 2px solid #00ff66;
    }

    button {
        background: linear-gradient(45deg, #00ff55, #00aa33);
        padding: 14px 30px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 10px;
        color: black;
        font-weight: bold;
    }

    button:hover { opacity: 0.9; }

    #loading {
        display: none;
        font-size: 22px;
        margin-top: 15px;
        color: #00ff66;
    }

    .controls {
        margin-top: 20px;
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
        margin-top: 25px;
        padding-bottom: 50px;
    }

    .photo-card {
        border: 3px solid #00ff66;
        border-radius: 14px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
    }

    .photo-card img {
        width: 100%;
        height: 260px;
        object-fit: cover;
    }

    .event-badge {
        position: absolute;
        bottom: 8px;
        left: 8px;
        background: rgba(0,0,0,0.6);
        padding: 4px 10px;
        font-size: 12px;
        border-radius: 6px;
        border: 1px solid #00ff66;
    }

    .checkmark {
        position: absolute;
        top: 8px;
        right: 8px;
        background: #00c6ff;
        padding: 6px 10px;
        border-radius: 50%;
        font-size: 20px;
        display: none;
    }

    .zip-btn {
        background: orange;
        font-size: 20px;
        margin-top: 20px;
        padding: 14px 40px;
    }

    .select-controls button {
        margin: 5px;
        font-size: 18px;
        padding: 10px 26px;
    }
</style>

</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<!-- GUEST DETAILS -->
<label>आपका नाम</label>
<input id="guestName" class="input-box" placeholder="अपना नाम लिखें">

<label>मोबाइल नंबर</label>
<input id="guestMobile" class="input-box" placeholder="मोबाइल नंबर">

<label>सेल्फी अपलोड करें</label>
<input type="file" id="selfieInput" accept="image/*" class="input-box">

<img id="previewImg">

<button onclick="searchPhotos()">फोटो खोजें</button>

<div id="loading">⏳ कृपया प्रतीक्षा करें... खोज जारी है...</div>

<h2 id="resultCount"></h2>

<div class="select-controls">
    <button onclick="selectAll()">सभी चुनें</button>
    <button onclick="clearAll()">सब हटाएँ</button>
</div>

<button class="zip-btn" onclick="downloadZip()">ZIP डाउनलोड</button>

<div class="grid-container" id="photoGrid"></div>

<!-- JS Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

<script>
let selectedPhotos = [];

const apiURL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

document.getElementById("selfieInput").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        previewImg.style.display = "block";
    };
    reader.readAsDataURL(file);
});

function getLinkId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("linkId");
}

function fileToBase64(file) {
    return new Promise(resolve => {
        let reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
    });
}

async function searchPhotos() {
    const name = guestName.value.trim();
    const mobile = guestMobile.value.trim();
    const selfieFile = selfieInput.files[0];

    if (!name || !mobile || !selfieFile) {
        alert("कृपया नाम, मोबाइल और सेल्फी भरें!");
        return;
    }

    loading.style.display = "block";

    const selfie_base64 = await fileToBase64(selfieFile);

    const body = {
        linkId: getLinkId(),
        name: name,
        mobile: mobile,
        selfie_image: selfie_base64
    };

    const res = await fetch(apiURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    const data = await res.json();
    loading.style.display = "none";

    if (!data.matches || data.matches.length === 0) {
        resultCount.innerText = "❌ कोई फोटो नहीं मिली!";
        return;
    }

    resultCount.innerText = `${data.matches.length} फोटो मिली!`;
    showPhotos(data.matches);
}

function showPhotos(photos) {
    selectedPhotos = [];
    photoGrid.innerHTML = "";

    photos.forEach((p, index) => {
        let box = document.createElement("div");
        box.className = "photo-card";

        let img = document.createElement("img");
        img.src = p.url;
        img.setAttribute("data-lightbox", "gallery");

        let tick = document.createElement("div");
        tick.className = "checkmark";
        tick.innerHTML = "✔";

        let badge = document.createElement("div");
        badge.className = "event-badge";
        badge.innerText = p.eventName || "";

        box.appendChild(img);
        box.appendChild(tick);
        box.appendChild(badge);

        box.onclick = () => toggleSelect(box, p);

        photoGrid.appendChild(box);
    });
}

function toggleSelect(box, photo) {
    const tick = box.querySelector(".checkmark");

    if (tick.style.display === "block") {
        tick.style.display = "none";
        selectedPhotos = selectedPhotos.filter(p => p.url !== photo.url);
    } else {
        tick.style.display = "block";
        selectedPhotos.push(photo);
    }
}

function selectAll() {
    selectedPhotos = [];
    document.querySelectorAll(".photo-card").forEach((box, i) => {
        const img = box.querySelector("img").src;
        const eventName = box.querySelector(".event-badge").innerText;
        selectedPhotos.push({ url: img, eventName });
        box.querySelector(".checkmark").style.display = "block";
    });
}

function clearAll() {
    selectedPhotos = [];
    document.querySelectorAll(".checkmark").forEach(t => t.style.display = "none");
}

async function downloadZip() {
    if (selectedPhotos.length === 0) {
        alert("कृपया फोटो चुनें!");
        return;
    }

    const zip = new JSZip();
    let folder = zip.folder("photos");

    for (let i = 0; i < selectedPhotos.length; i++) {
        let url = selectedPhotos[i].url;
        let blob = await fetch(url).then(r => r.blob());
        folder.file("photo_" + (i + 1) + ".jpg", blob);
    }

    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, "EventPhotos.zip");
}
</script>

</body>
</html>
