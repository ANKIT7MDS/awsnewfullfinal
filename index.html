<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLens – अपनी फोटो खोजें</title>

    <!-- Lightbox for zoom view -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">

    <style>
        body {
            background:#000;
            color:#fff;
            text-align:center;
            font-family:Arial;
            margin:0;
            padding:0;
        }
        h1 { margin-top:40px; font-size:38px; }

        #preview-img {
            width:280px;
            border-radius:10px;
            display:none;
            margin:20px auto;
        }

        .btn {
            background:#00c04b;
            padding:12px 25px;
            border-radius:8px;
            color:white;
            font-size:22px;
            cursor:pointer;
            border:none;
        }

        .msg { margin-top:10px; font-size:20px; color:#ff4444; }

        .grid {
            margin-top:40px;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
        }
        .grid img {
            width:230px;
            height:230px;
            object-fit:cover;
            border-radius:12px;
            border:3px solid #22ff88;
            cursor:pointer;
        }

        #loader {
            display:none;
            font-size:20px;
            color:#0ff;
            margin-top:10px;
        }
    </style>
</head>

<body>

    <h1>EventLens – अपनी फोटो खोजें</h1>

    <input type="file" id="selfieInput" accept="image/*">
    <img id="preview-img">

    <br><br>
    <button class="btn" onclick="searchPhotos()">फोटो खोजें</button>

    <div id="loader">🔄 खोज जारी है...</div>
    <div id="msg" class="msg"></div>

    <h2 id="countText"></h2>

    <div class="grid" id="photoGrid"></div>

    <!-- Lightbox JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

<script>
const API_URL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";

// Load linkId from URL
const urlParams = new URLSearchParams(window.location.search);
const linkId = urlParams.get("linkId");

// Show preview
document.getElementById("selfieInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(ev){
            let img = document.getElementById("preview-img");
            img.src = ev.target.result;
            img.style.display = "block";
        };
        reader.readAsDataURL(file);
    }
});

async function searchPhotos() {
    let fileInput = document.getElementById("selfieInput");
    let msg = document.getElementById("msg");
    let loader = document.getElementById("loader");
    let grid = document.getElementById("photoGrid");

    msg.innerText = "";
    grid.innerHTML = "";
    loader.style.display = "block";

    if (!fileInput.files.length) {
        msg.innerText = "कृपया एक फोटो चुनें!";
        loader.style.display = "none";
        return;
    }

    let file = fileInput.files[0];
    let base64 = await toBase64(file);

    let payload = {
        linkId: linkId,
        name: "guest",
        mobile: "0000000000",
        selfie_image: base64
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("API Response:", data);

        loader.style.display = "none";

        if (!data.matches || data.matches.length === 0) {
            msg.innerText = "क्षमा करें, कोई फोटो नहीं मिली।";
            return;
        }

        document.getElementById("countText").innerHTML = `${data.matches.length} फोटो मिली!`;

        // Show grid
        data.matches.forEach(item => {
            let imgBox = `
                <a href="${item.url}" data-lightbox="results">
                    <img src="${item.url}">
                </a>
            `;
            grid.innerHTML += imgBox;
        });

    } catch (err) {
        console.error(err);
        msg.innerText = "त्रुटि: फोटो खोजने में समस्या आई।";
        loader.style.display = "none";
    }
}

function toBase64(file){
    return new Promise((resolve,reject)=>{
        let reader = new FileReader();
        reader.onload = ()=> resolve(reader.result);
        reader.onerror = err => reject(err);
        reader.readAsDataURL(file);
    });
}
</script>

</body>
</html>
