<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>EventLens – अपनी फोटो खोजें</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    h1 { font-size: 34px; margin-bottom: 10px; }
    .step-box {
        background: #111;
        border-radius: 16px;
        padding: 25px;
        max-width: 520px;
        margin: auto;
        border: 1px solid #333;
    }

    #previewImg {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        margin: 15px auto;
        object-fit: cover;
        display: none;
        border: 4px solid #00ff99;
    }

    .btn {
        display: block;
        width: 90%;
        margin: 12px auto;
        padding: 16px;
        background: #00e676;
        color: #000;
        font-weight: bold;
        border-radius: 12px;
        font-size: 20px;
        border: none;
        cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .small-btn {
        background: #444;
        padding: 10px;
        display: inline-block;
        border-radius: 8px;
        margin-top: 10px;
    }

    .grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
    }
    .photo-box {
        width: 260px;
        height: 260px;
        margin: 10px;
        border-radius: 14px;
        overflow: hidden;
        border: 3px solid #00ff66;
    }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }
</style>

</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<div class="step-box">

    <!-- STEP 1 -->
    <h2>1. अपनी सेल्फी अपलोड करें</h2>

    <div class="small-btn" onclick="openCamera()">📷 Take Selfie</div>
    <br>
    या  
    <br>
    <label class="small-btn">
        Upload From Gallery
        <input type="file" id="galleryInput" accept="image/*" style="display:none">
    </label>

    <img id="previewImg">

    <button class="btn" onclick="startFaceSearch()">Find My Photos 🔍</button>

    <h3 id="foundCount"></h3>

    <!-- STEP 2 -->
    <div id="detailsBox" style="display:none;">
        <h2>2. अपनी जानकारी भरें</h2>

        <input id="nameBox" type="text" placeholder="आपका नाम" 
            style="padding:12px;width:90%;border-radius:10px;border:none;margin-bottom:10px;">
        <input id="mobileBox" type="text" placeholder="मोबाइल नंबर"
            style="padding:12px;width:90%;border-radius:10px;border:none;margin-bottom:10px;">

        <button class="btn" onclick="showGallery()">📁 गैलरी देखें</button>
    </div>

</div>

<!-- RESULTS GRID -->
<div id="gallery" class="grid"></div>

<!-------------------------------------------------------------->
<!-------------- CAMERA + GALLERY BASE64 FIXED ----------------->
<!-------------------------------------------------------------->

<script>

const API_URL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";

let FINAL_BASE64 = null;
let FOUND_PHOTOS = [];


// CAMERA OPEN --------------------------------------------------
function openCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            const video = document.createElement("video");
            video.autoplay = true;
            video.srcObject = stream;

            let camWindow = window.open("", "", "width=360,height=500");
            camWindow.document.body.appendChild(video);

            let snapBtn = camWindow.document.createElement("button");
            snapBtn.innerText = "Capture Photo";
            snapBtn.style.marginTop = "20px";
            camWindow.document.body.appendChild(snapBtn);

            snapBtn.onclick = () => {
                const canvas = camWindow.document.createElement("canvas");
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0);

                FINAL_BASE64 = canvas.toDataURL("image/jpeg");

                document.getElementById("previewImg").src = FINAL_BASE64;
                document.getElementById("previewImg").style.display = "block";

                stream.getTracks().forEach(t => t.stop());
                camWindow.close();
            };
        });
}


// GALLERY FILE → BASE64 ----------------------------------------
document.getElementById("galleryInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(ev) {
        FINAL_BASE64 = ev.target.result;
        document.getElementById("previewImg").src = FINAL_BASE64;
        document.getElementById("previewImg").style.display = "block";
    };

    reader.readAsDataURL(file);
});


// FACE SEARCH CALL --------------------------------------------
async function startFaceSearch() {
    if (!FINAL_BASE64) {
        alert("कृपया पहले सेल्फी अपलोड करें!");
        return;
    }

    const linkId = new URLSearchParams(window.location.search).get("linkId");

    let payload = {
        linkId: linkId,
        name: "guest",
        mobile: "0000000000",
        selfie_image: FINAL_BASE64
    };

    let res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    let data = await res.json();

    FOUND_PHOTOS = data.matches || [];

    document.getElementById("foundCount").innerHTML =
        `हमें <b>${FOUND_PHOTOS.length}</b> फोटो मिलीं!`;

    if (FOUND_PHOTOS.length > 0) {
        document.getElementById("detailsBox").style.display = "block";
    }
}


// SHOW GALLERY -------------------------------------------------
function showGallery() {
    const grid = document.getElementById("gallery");
    grid.innerHTML = "";

    FOUND_PHOTOS.forEach(p => {
        let box = document.createElement("div");
        box.className = "photo-box";

        let img = document.createElement("img");
        img.src = p.url;

        box.appendChild(img);
        grid.appendChild(box);
    });

    window.scrollTo(0, document.body.scrollHeight);
}

</script>

</body>
</html>
