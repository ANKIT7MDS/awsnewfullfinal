<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLens – अपनी फोटो खोजें</title>

    <style>
        body {
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 32px;
        }

        #preview {
            width: 240px;
            display: none;
            margin-top: 10px;
            border-radius: 10px;
        }

        .btn {
            background: #00e676;
            padding: 14px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }

        #zipBtn, #selectAllBtn {
            background: #ffeb3b;
            color: black;
            margin: 10px;
        }

        #photos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
            width: 94%;
            margin: auto;
        }

        .photoBox {
            border: 3px solid #00ff15;
            border-radius: 10px;
            padding: 5px;
            position: relative;
            cursor: pointer;
            height: 200px;
            overflow: hidden;
        }

        .photoBox img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .tick {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #00c3ff;
            padding: 6px 8px;
            border-radius: 50%;
            display: none;
        }

        .selected .tick {
            display: block;
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
        }

        #closeLightbox {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 40px;
            cursor: pointer;
        }
    </style>

    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip-utils/0.1.0/jszip-utils.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<input type="file" id="selfie" accept="image/*">
<br>
<img id="preview">

<button class="btn" onclick="searchPhotos()">फोटो खोजें</button>

<p id="msg"></p>

<button id="selectAllBtn" class="btn" style="display:none" onclick="toggleSelectAll()">सभी चुनें</button>
<button id="zipBtn" class="btn" style="display:none" onclick="downloadZip()">ZIP डाउनलोड</button>

<div id="photos"></div>

<!-- Lightbox -->
<div id="lightbox">
    <span id="closeLightbox">×</span>
    <img id="lightImg">
</div>

<script>
let allPhotos = [];
let selected = [];

const API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";

selfie.onchange = () => {
    let f = selfie.files[0];
    let r = new FileReader();
    r.onload = e => {
        preview.src = e.target.result;
        preview.style.display = "block";
    };
    r.readAsDataURL(f);
};

async function searchPhotos() {
    let file = selfie.files[0];
    if (!file) return alert("पहले फोटो चुनें!");

    msg.innerHTML = "कृपया प्रतीक्षा करें...";

    let r = new FileReader();
    r.onload = async () => {
        let selfie64 = r.result;
        const linkId = new URLSearchParams(location.search).get("linkId") || "";

        let body = {
            linkId,
            selfie_image: selfie64,
            name: "guest",
            mobile: "00"
        };

        let res = await fetch(API, { method: "POST", body: JSON.stringify(body) });
        let data = await res.json();

        if (!data.matches?.length) {
            msg.innerHTML = "कोई फोटो नहीं मिली।";
            return;
        }

        msg.innerHTML = `${data.matches.length} फोटो मिली!`;
        allPhotos = data.matches;
        selected = [];

        render();
        selectAllBtn.style.display = "inline-block";
        zipBtn.style.display = "inline-block";
    };

    r.readAsDataURL(file);
}

function render() {
    photos.innerHTML = "";

    allPhotos.forEach(p => {
        let box = document.createElement("div");
        box.className = "photoBox";

        box.innerHTML = `
            <img src="${p.url}" onclick="openLightbox('${p.url}')">
            <div class="tick">✔</div>
        `;

        box.onclick = () => toggle(box, p.url);
        photos.appendChild(box);
    });
}

function toggle(box, url) {
    if (box.classList.contains("selected")) {
        box.classList.remove("selected");
        selected = selected.filter(x => x !== url);
    } else {
        box.classList.add("selected");
        selected.push(url);
    }
}

function toggleSelectAll() {
    let boxes = document.querySelectorAll(".photoBox");

    if (selected.length === allPhotos.length) {
        selected = [];
        boxes.forEach(b => b.classList.remove("selected"));
        selectAllBtn.innerText = "सभी चुनें";
    } else {
        selected = allPhotos.map(x => x.url);
        boxes.forEach(b => b.classList.add("selected"));
        selectAllBtn.innerText = "सभी हटाएँ";
    }
}

function openLightbox(url) {
    lightImg.src = url;
    lightbox.style.display = "flex";
}

closeLightbox.onclick = () => lightbox.style.display = "none";

async function downloadZip() {
    if (!selected.length) return alert("कोई फोटो चयनित नहीं है!");

    const zip = new JSZip();
    const folder = zip.folder("EventPhotos");

    for (let url of selected) {
        try {
            let data = await new Promise((resolve, reject) => {
                JSZipUtils.getBinaryContent(url, (e, bin) => e ? reject(e) : resolve(bin));
            });
            folder.file(url.split("/").pop(), data, { binary: true });
        } catch {}
    }

    zip.generateAsync({ type: "blob" }).then(content => {
        saveAs(content, "SelectedPhotos.zip");
    });
}
</script>

</body>
</html>
