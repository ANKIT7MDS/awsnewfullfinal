<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventLens – अपनी फोटो खोजें</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .upload-box {
            border: 2px dashed #ff6a00;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
        }
        .upload-box:hover { background: rgba(255, 106, 0, 0.1); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center px-4">

    <h1 class="text-3xl font-bold mb-6">EventLens – अपनी फोटो खोजें</h1>

    <!-- Upload box -->
    <div id="upload-area" class="upload-box w-full max-w-md">
        <p class="text-lg">अपना Selfie अपलोड करें</p>
        <p class="text-sm text-gray-300">(JPG/PNG)</p>
        <input id="selfieInput" type="file" accept="image/*" class="hidden" />
    </div>

    <!-- Loading Section -->
    <div id="searching" class="hidden mt-10 text-center">
        <div class="text-xl text-orange-400 font-semibold">फोटो खोजी जा रही है...</div>
        <div class="text-sm text-gray-300 mt-2">कृपया इंतजार करें</div>
    </div>

    <!-- Result Section -->
    <div id="resultArea" class="hidden mt-10 text-center">
        <div id="resultText" class="text-xl font-semibold"></div>

        <div id="formArea" class="hidden mt-6">
            <input 
                id="guestName" 
                class="w-full max-w-xs p-3 rounded bg-[#111] text-white border border-gray-600"
                type="text" placeholder="आपका नाम">

            <input 
                id="guestMobile" 
                class="w-full max-w-xs p-3 rounded bg-[#111] text-white mt-4 border border-gray-600"
                type="tel" placeholder="मोबाइल नंबर">

            <button id="saveDetailsBtn" 
                class="mt-6 bg-orange-500 hover:bg-orange-600 px-6 py-3 rounded text-white font-semibold">
                आगे बढ़ें
            </button>
        </div>
    </div>
<script>
async function searchPhotos() {
    const linkId = new URLSearchParams(window.location.search).get("linkId");
    const fileInput = document.getElementById("selfieInput").files[0];

    if (!fileInput) {
        alert("कृपया सेल्फी अपलोड करें");
        return;
    }

    // Convert → Base64
    const reader = new FileReader();
    reader.onload = async function() {
        const selfie_b64 = reader.result;

        const payload = {
            linkId: linkId,
            name: "Guest",
            mobile: "0000000000",
            selfie_image: selfie_b64
        };

        console.log("🚀 Sending Payload:", payload);

        const res = await fetch(YOUR_FIND_MATCH_ENDPOINT, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("📌 RESPONSE:", data);

        if (!data.matches || data.matches.length === 0) {
            document.getElementById("resultBox").innerText = "कोई फोटो नहीं मिली";
            return;
        }

        // Show results
        let html = "";
        data.matches.forEach(m => {
            html += `<img src="${m.url}" style="width:200px;margin:10px;">`;
        });
        document.getElementById("resultBox").innerHTML = html;
    };

    reader.readAsDataURL(fileInput);
}
</script>


</body>
</html>
