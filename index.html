<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EventLens AI – Find Your Photos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

.container {
    width: 92%;
    margin: auto;
    max-width: 480px;
    padding-top: 25px;
}

/* HEADER */
h1 {
    font-size: 34px;
    font-weight: 700;
}

.subtitle {
    color: #bbb;
    margin-top: -8px;
    margin-bottom: 20px;
}

/* CARD */
.step-card {
    background: #111;
    padding: 20px;
    border-radius: 16px;
    margin-top: 22px;
    box-shadow: 0 0 12px rgba(0,255,120,0.08);
}

/* UPLOAD BOX */
.upload-box {
    border: 2px dashed #00ff77;
    border-radius: 14px;
    padding: 32px;
    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    border-color: #00ffaa;
    background: rgba(0,255,120,0.08);
}

/* BUTTON */
.main-btn {
    margin-top: 20px;
    padding: 18px;
    width: 100%;
    background: linear-gradient(135deg, #00e676, #00c853);
    border: none;
    border-radius: 12px;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    color: #000;
    transition: 0.2s;
}

.main-btn:active {
    transform: scale(0.97);
}

/* PREVIEW IMAGE */
#previewImg {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    margin-top: 14px;
    display: none;
    border: 3px solid #00ff99;
}

/* LOADING SPINNER */
.loader {
    display: none;
    margin: 18px auto;
    border: 5px solid #333;
    border-top: 5px solid #00ff99;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    animation: spin 0.7s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="container">

    <h1>EventLens</h1>
    <p class="subtitle">AI Powered Photo Finder</p>

    <!-- STEP 1 -->
    <div class="step-card">
        <h2>1. Upload Your Selfie</h2>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <p>📸 Tap to Take Selfie / Upload</p>
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <img id="previewImg">

        <div class="loader" id="loader"></div>
    </div>

    <!-- STEP 2 -->
    <div class="step-card">
        <h2>2. Find Your Photos</h2>
        <button class="main-btn" onclick="startSearch()">Find My Photos 🔍</button>
    </div>

</div>

<script>
// ⭐ ACCEPT ALL POSSIBLE LINKID CASES
function getValidLinkId() {
    const params = new URLSearchParams(window.location.search);
    return (
        params.get("linkId") ||
        params.get("linkID") ||
        params.get("linkid") ||
        params.get("LinkId") ||
        null
    );
}

let linkId = getValidLinkId();
if (!linkId) {
    alert("❌ Invalid Link! URL में linkId missing है।");
}

let selfieBase64 = null;

// SHOW PREVIEW
document.getElementById("fileInput").addEventListener("change", function (event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        selfieBase64 = e.target.result;
        document.getElementById("previewImg").src = selfieBase64;
        document.getElementById("previewImg").style.display = "block";
    };
    reader.readAsDataURL(file);
});

// ⭐ SEARCH FUNCTION
async function startSearch() {

    if (!selfieBase64) {
        alert("❌ कृपया पहले एक सेल्फी अपलोड करें!");
        return;
    }

    document.getElementById("loader").style.display = "block";

    // हमेशा सिर्फ base64 भेजो
    let cleanBase64 = selfieBase64.includes(",")
        ? selfieBase64.split(",")[1]
        : selfieBase64;

    const payload = {
        linkId: linkId.trim(),
        selfie_image: cleanBase64
    };

    console.log("Sending Payload →", payload);

    let response = await fetch(
        "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search",
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }
    );

    document.getElementById("loader").style.display = "none";

    let result = await response.json();
    console.log("API Response →", result);

    if (!result.matches || result.matches.length === 0) {
        alert("😔 कोई फोटो नहीं मिली!");
        return;
    }

    // Redirect to gallery view
    localStorage.setItem("galleryPhotos", JSON.stringify(result.matches));
    window.location.href = "gallery.html";
}
</script>

</body>
</html>
