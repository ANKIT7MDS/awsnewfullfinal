<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EventLens – Smart AI Gallery</title>

  <!-- NEW: Confetti for celebration (same as old) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <!-- Zip download libs (unchanged) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg: #050505;
      --card: #101010;
      --accent: #00e676; /* Green Accent */
      --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff;
      --muted: #a0a0a0;
      --border: #262626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .container {
      max-width: 600px; /* Mobile focused width */
      margin: 0 auto;
      padding: 16px;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 25px;
    }
    header h1 {
      font-size: 32px; /* NEW: Slightly larger */
      font-weight: 700;
      background: linear-gradient(to right, #fff, #bbb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* CARDS */
    .card {
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .step-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* CUSTOM CAMERA BUTTONS */
    .camera-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 30px;
      background: #1a1a1a;
      border: 2px dashed var(--accent);
      border-radius: 16px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
    }
    .camera-btn:active {
      background: #252525; 
      transform: scale(0.98);
    }
    .camera-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .gallery-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-size: 14px;
      padding: 5px;
    }

    /* INPUTS & BUTTONS */
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 14px 16px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { 
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft); /* NEW: Focus glow */
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #000;
      transition: transform 0.2s, box-shadow 0.2s; /* NEW: Smoother transition */
    }
    .btn:hover { 
      opacity: 0.9; 
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(0,230,118,0.3); /* NEW: Hover glow */
    }
    .btn:disabled { 
      opacity: 0.5; 
      cursor: wait; 
      transform: none; /* NEW: No scale on disabled */
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      font-size: 13px;
      width: auto;
    }

    .btn-retake {
      background: #333 !important; /* NEW: Retake button style */
      margin-top: 10px;
    }

    .btn-whatsapp {
      background: #25D366 !important; /* NEW: WhatsApp green */
      color: white !important;
      margin-top: 15px;
    }

    /* PREVIEW IMG */
    #previewImg {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin: 20px auto;
      display: block;
      border: 4px solid var(--accent);
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
      transition: transform 0.3s; /* NEW: Smooth preview animation */
    }
    #previewImg:hover {
      transform: scale(1.05); /* NEW: Subtle zoom on hover */
    }

    /* NEW: Loading Animation */
    .loading-text {
      text-align: center;
      color: var(--accent);
      font-size: 14px;
      margin-top: 15px;
      font-weight: 500;
    }
    .dots {
      display: inline-block;
      animation: loading-dots 1.5s infinite;
    }
    @keyframes loading-dots {
      0%, 20% { content: ' .'; }
      40% { content: ' ..'; }
      60% { content: ' ...'; }
      80%, 100% { content: ' ....'; }
    }

    /* SEARCH BAR (Google Photos Style) */
    .search-wrapper {
      position: relative;
      margin-bottom: 15px;
    }
    .search-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border-radius: 50px;
      background: #1a1a1a;
      border: none;
      color: white;
      font-size: 15px;
      outline: none;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 12px;
      color: var(--muted);
    }

    /* FILTER CHIPS */
    .filter-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 15px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      white-space: nowrap;
      padding: 8px 16px;
      border-radius: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }
    .chip.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* PHOTO GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    @media(min-width: 768px) { 
      .grid { 
        grid-template-columns: repeat(5, 1fr); 
        gap: 10px; 
      } 
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      background: #111;
      overflow: hidden;
      cursor: pointer;
      border-radius: 8px; /* NEW: Rounded corners */
      transition: transform 0.2s; /* NEW: Smooth selection */
    }
    .photo-item:hover {
      transform: scale(1.02); /* NEW: Hover effect */
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.3s;
    }
    .photo-item.selected img { 
      opacity: 0.5; 
      transform: scale(0.95); 
    }
    
    .check-mark {
      position: absolute;
      top: 5px; 
      right: 5px;
      width: 22px; 
      height: 22px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: transparent;
      font-size: 12px;
      transition: all 0.2s; /* NEW: Smooth checkmark */
    }
    .photo-item.selected .check-mark {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* VIEWER OVERLAY */
    .viewer {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 999;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .viewer.open { display: flex; }
    .viewer img {
      max-width: 95%; 
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .viewer-controls {
      position: absolute; 
      bottom: 30px;
      display: flex; 
      gap: 20px;
    }
    .close-viewer {
      position: absolute; 
      top: 20px; 
      right: 20px;
      color: white; 
      font-size: 30px; 
      cursor: pointer;
      transition: color 0.2s; /* NEW: Smooth close button */
    }
    .close-viewer:hover { color: var(--accent); }

  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>EventLens</h1>
    <p style="color:var(--muted); font-size:14px;">AI Powered Photo Finder</p>
  </header>

  <!-- STEP 1: UPLOAD -->
  <div id="step1" class="card" style="text-align:center;">
    <div class="step-title" style="text-align:left;">1. Upload Your Selfie</div>
    
    <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">
    <input type="file" id="galleryInput" accept="image/*" style="display:none">

    <label for="cameraInput" class="camera-btn">
      <div class="camera-icon">📸</div>
      Take Selfie
    </label>

    <div style="margin-top:5px;">
      <span style="color:#555; font-size:13px;">or</span><br>
      <label for="galleryInput" class="gallery-link">Upload from Gallery</label>
    </div>

    <div id="previewContainer" style="display:none;">
      <img id="previewImg">
      <button id="retakeBtn" class="btn btn-retake">Retake Photo</button>
      <button id="searchBtn" class="btn">Find My Photos 🔍</button>
    </div>

    <p id="loadingText" class="loading-text"></p>
  </div>

  <!-- STEP 2: DETAILS -->
  <div id="step2" class="card" style="display:none;">
    <div class="step-title">2. Enter Details</div>
    <p style="margin-bottom:15px;">
      We found <b style="color:var(--accent);" id="matchCount">0</b> photos of you!
    </p>
    <input type="text" id="guestName" placeholder="Your Name (e.g. Rahul)">
    <input type="tel" id="guestMobile" placeholder="Mobile Number" maxlength="10">
    <button id="showGalleryBtn" class="btn">View Gallery 👉</button>
  </div>

  <!-- STEP 3: GALLERY -->
  <div id="step3" class="card" style="background:transparent; border:none; padding:0; display:none;">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search (e.g. 'Red Shirt', 'Stage', 'Smile')...">
    </div>

    <div class="filter-row">
      <div class="chip active" onclick="filterPhotos('ALL', this)">All Photos</div>
      <div class="chip" onclick="filterPhotos('BEST', this)">⭐ Best</div>
      <div class="chip" onclick="filterPhotos('HAPPY', this)">😊 Happy</div>
      <div class="chip" onclick="filterPhotos('GROUP', this)">👥 Group</div>
      <div class="chip" onclick="filterPhotos('TEXT', this)">🅰️ Text</div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 5px;">
      <span style="font-size:13px; color:var(--muted);">Selected: <b id="selCount" style="color:#fff;">0</b></span>
      <div>
        <button class="btn btn-outline" onclick="selectAll()">Select All</button>
        <button class="btn btn-outline" style="background:var(--accent); color:#000; border:none;" onclick="downloadZip()">Download ZIP</button>
      </div>
    </div>

    <div id="photoGrid" class="grid"></div>

    <button id="whatsappBtn" class="btn btn-whatsapp" onclick="shareOnWhatsApp()" style="display:none;">
      Share on WhatsApp 🎉
    </button>
  </div>

</div>

<!-- FULLSCREEN VIEWER -->
<div id="viewer" class="viewer">
  <div class="close-viewer" onclick="closeViewer()">✕</div>
  <img id="viewerImage">
  <div class="viewer-controls">
    <button class="btn btn-outline" onclick="prevImage()">❮</button>
    <button class="btn btn-outline" onclick="toggleViewerSelect()">Select / Unselect</button>
    <button class="btn btn-outline" onclick="nextImage()">❯</button>
  </div>
</div>

<script>
  const SEARCH_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
  const SAVE_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

  let allPhotos = [];
  let filteredPhotos = [];
  let selectedUrls = new Set();
  let selfieBase64 = null;
  let currentViewerIndex = 0;
  let currentMatchCount = 0; 

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800;
          let width = img.width;
          let height = img.height;
          if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
          else { if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; } }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          selfieBase64 = canvas.toDataURL('image/jpeg', 0.7);
          document.getElementById('previewImg').src = selfieBase64;
          document.getElementById('previewContainer').style.display = 'block';
          document.getElementById('previewContainer').scrollIntoView({behavior: 'smooth'});
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  }

  document.getElementById('cameraInput').addEventListener('change', handleFileSelect);
  document.getElementById('galleryInput').addEventListener('change', handleFileSelect);
  document.getElementById('retakeBtn').addEventListener('click', () => {
    selfieBase64 = null;
    document.getElementById('previewContainer').style.display = 'none';
    document.getElementById('cameraInput').value = '';
    document.getElementById('galleryInput').value = '';
  });

  document.getElementById('searchBtn').addEventListener('click', async () => {
    if(!selfieBase64) return alert("Please upload a selfie first.");
    const params = new URLSearchParams(window.location.search);
    const linkId = params.get('linkId');
    if (!linkId) return alert("Error: Link ID missing!");

    const loadingText = document.getElementById('loadingText');
    loadingText.innerHTML = "Scanning faces with AI<span class='dots'></span>";
    document.getElementById('searchBtn').disabled = true;

    try {
      const res = await fetch(SEARCH_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ linkId: linkId, selfie_image: selfieBase64 })
      });
      const data = await res.json();
      allPhotos = data.matches || [];
      filteredPhotos = [...allPhotos];
      currentMatchCount = allPhotos.length;
      document.getElementById('matchCount').innerText = currentMatchCount;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      if (currentMatchCount > 0) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    } catch(err) { alert("Failed to find photos."); }
    finally { document.getElementById('searchBtn').disabled = false; loadingText.innerHTML = ""; }
  });

  // --- FIX APPLIED HERE ---
  document.getElementById('showGalleryBtn').addEventListener('click', () => {
    const name = document.getElementById('guestName').value;
    const mobile = document.getElementById('guestMobile').value;
    if(!name || mobile.length < 10) return alert("Please enter valid details.");

    const params = new URLSearchParams(window.location.search);
    const linkId = params.get('linkId');
    // Admin log se mila Collection ID
    const COLLECTION_ID = params.get('cid') || "e06c902e-63e5-4572-9d65-924bbe56d9fb";

    // Data save request
    fetch(SAVE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        collection_id: COLLECTION_ID, // Parent ID
        link_id: linkId,              // Event ID
        linkId: linkId,               // Backup field
        name: name, 
        mobile: mobile, 
        selfie_image: selfieBase64,
        photo_count: currentMatchCount
      })
    });

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
    renderGrid();
    setTimeout(() => { document.getElementById('whatsappBtn').style.display = 'block'; }, 500);
  });

  function shareOnWhatsApp() {
    const text = `🎉 I just found ${currentMatchCount} photos of me! Try it: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filteredPhotos = allPhotos.filter(photo => (photo.ai_tags || []).join(' ').toLowerCase().includes(q));
    renderGrid();
  });

  function renderGrid() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = "";
    filteredPhotos.forEach((photo, index) => {
      const div = document.createElement('div');
      div.className = `photo-item ${selectedUrls.has(photo.url) ? 'selected' : ''}`;
      div.onclick = (e) => e.target.closest('.check-mark') ? toggleSelect(photo.url) : openViewer(index);
      div.innerHTML = `<img src="${photo.url}" loading="lazy"><div class="check-mark">✓</div>`;
      grid.appendChild(div);
    });
    document.getElementById('selCount').innerText = selectedUrls.size;
  }

  function toggleSelect(url) {
    selectedUrls.has(url) ? selectedUrls.delete(url) : selectedUrls.add(url);
    renderGrid();
  }

  window.selectAll = () => {
    if(selectedUrls.size === filteredPhotos.length) selectedUrls.clear();
    else filteredPhotos.forEach(p => selectedUrls.add(p.url));
    renderGrid();
  };

  window.downloadZip = async function() {
    if(selectedUrls.size === 0) return alert("Select photos first!");
    const zip = new JSZip();
    const urls = Array.from(selectedUrls);
    for(let i=0; i<urls.length; i++) {
      const blob = await fetch(urls[i]).then(r => r.blob());
      zip.file(`photo_${i+1}.jpg`, blob);
    }
    const content = await zip.generateAsync({type:"blob"});
    saveAs(content, "Photos.zip");
  };

  function openViewer(index) {
    currentViewerIndex = index;
    document.getElementById('viewerImage').src = filteredPhotos[index].url;
    document.getElementById('viewer').classList.add('open');
  }
  window.closeViewer = () => document.getElementById('viewer').classList.remove('open');
  window.nextImage = () => { currentViewerIndex = (currentViewerIndex + 1) % filteredPhotos.length; openViewer(currentViewerIndex); };
  window.prevImage = () => { currentViewerIndex = (currentViewerIndex - 1 + filteredPhotos.length) % filteredPhotos.length; openViewer(currentViewerIndex); };
  window.toggleViewerSelect = () => toggleSelect(filteredPhotos[currentViewerIndex].url);
</script>
</body>
</html>
