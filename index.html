<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLens – अपनी फोटो खोजें</title>

    <!-- GLightbox (Popup slider) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"/>

    <style>
        body {
            background:#000;
            color:#fff;
            text-align:center;
            font-family:Arial;
            margin:0;
            padding:0;
        }
        h1 { margin-top:40px; font-size:38px; }

        #preview-img {
            width:280px;
            border-radius:10px;
            display:none;
            margin:20px auto;
        }

        .btn {
            background:#00c04b;
            padding:12px 25px;
            border-radius:8px;
            color:white;
            font-size:22px;
            cursor:pointer;
            border:none;
        }

        .msg { margin-top:10px; font-size:20px; color:#ff4444; }

        .grid {
            margin-top:40px;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
        }

        .photo-box {
            position:relative;
        }

        .photo-box img {
            width:230px;
            height:230px;
            object-fit:cover;
            border-radius:12px;
            border:3px solid #22ff88;
            cursor:pointer;
        }

        .select-check {
            position:absolute;
            top:8px;
            right:8px;
            width:22px;
            height:22px;
            cursor:pointer;
        }

        #downloadZipBtn {
            background:#ffbb00;
            color:#000;
            padding:12px 25px;
            border-radius:8px;
            font-size:20px;
            display:none;
            margin-top:20px;
            cursor:pointer;
        }
    </style>
</head>

<body>

    <h1>EventLens – अपनी फोटो खोजें</h1>

    <input type="file" id="selfieInput" accept="image/*">
    <img id="preview-img">

    <br><br>
    <button class="btn" onclick="searchPhotos()">फोटो खोजें</button>

    <div id="loader" class="msg" style="color:#0ff; display:none;">🔄 खोज जारी है...</div>
    <div id="msg" class="msg"></div>

    <h2 id="countText"></h2>

    <button id="downloadZipBtn" onclick="downloadZip()">चयनित फोटो ZIP डाउनलोड</button>

    <div class="grid" id="photoGrid"></div>

    <!-- GLightbox JS -->
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

    <!-- JSZip for ZIP download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
const API_URL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";

let viewer;  
let selectedPhotos = [];

const urlParams = new URLSearchParams(window.location.search);
const linkId = urlParams.get("linkId");

// Selfie preview
document.getElementById("selfieInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(ev){
            let img = document.getElementById("preview-img");
            img.src = ev.target.result;
            img.style.display = "block";
        };
        reader.readAsDataURL(file);
    }
});

async function searchPhotos() {
    let fileInput = document.getElementById("selfieInput");
    let msg = document.getElementById("msg");
    let loader = document.getElementById("loader");
    let grid = document.getElementById("photoGrid");
    let zipBtn = document.getElementById("downloadZipBtn");

    msg.innerText = "";
    grid.innerHTML = "";
    loader.style.display = "block";
    zipBtn.style.display = "none";
    selectedPhotos = [];

    if (!fileInput.files.length) {
        msg.innerText = "कृपया एक फोटो चुनें!";
        loader.style.display = "none";
        return;
    }

    let file = fileInput.files[0];
    let base64 = await toBase64(file);

    let payload = {
        linkId: linkId,
        name: "guest",
        mobile: "0000000000",
        selfie_image: base64
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        loader.style.display = "none";

        if (!data.matches || data.matches.length === 0) {
            msg.innerText = "क्षमा करें, कोई फोटो नहीं मिली।";
            return;
        }

        document.getElementById("countText").innerHTML = `${data.matches.length} फोटो मिली!`;

        // Add photos to grid
        data.matches.forEach((item, i) => {
            let html = `
                <div class="photo-box">
                    <input type="checkbox" class="select-check" onchange="toggleSelect('${item.url}', this)">
                    <a href="${item.url}" class="glightbox" data-gallery="set1">
                        <img src="${item.url}">
                    </a>
                </div>
            `;
            grid.innerHTML += html;
        });

        // Initialize slider popup
        viewer = GLightbox({
            selector: '.glightbox',
            touchNavigation: true,
            loop: true
        });

    } catch (err) {
        msg.innerText = "त्रुटि: फोटो खोजने में समस्या आई।";
        loader.style.display = "none";
    }
}

function toBase64(file){
    return new Promise((resolve,reject)=>{
        let reader = new FileReader();
        reader.onload = ()=> resolve(reader.result);
        reader.onerror = err => reject(err);
        reader.readAsDataURL(file);
    });
}

function toggleSelect(url, checkbox){
    if (checkbox.checked) selectedPhotos.push(url);
    else selectedPhotos = selectedPhotos.filter(u => u !== url);

    document.getElementById("downloadZipBtn").style.display =
        selectedPhotos.length > 0 ? "inline-block" : "none";
}

// ZIP DOWNLOAD
async function downloadZip() {
    const zip = new JSZip();

    for (let i = 0; i < selectedPhotos.length; i++) {
        const url = selectedPhotos[i];
        const blob = await fetch(url).then(r => r.blob());
        zip.file(`photo${i+1}.jpg`, blob);
    }

    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, "Selected_Photos.zip");
}
</script>

</body>
</html>
