<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>EventLens – अपनी फोटो खोजें</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
}

/* HEADER */
h1 {
    font-size: 34px;
    margin-top: 18px;
}

#previewImg {
    max-width: 240px;
    border-radius: 12px;
    display: none;
    margin: 12px auto;
}

button {
    background: #00c853;
    padding: 12px 26px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
    cursor: pointer;
}
button:hover { opacity: 0.85; }

/* FILTER BAR */
.filter-bar {
    display: none;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px auto 14px;
    max-width: 680px;
}

.chip {
    padding: 6px 12px;
    background: #1b1b1b;
    border: 1px solid #333;
    border-radius: 999px;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
}

.chip.active {
    background: rgba(0, 230, 118, 0.2);
    border-color: #00e676;
    color: #00e676;
}

.search-text {
    padding: 8px 14px;
    min-width: 200px;
    background: #000;
    border-radius: 999px;
    border: 1px solid #333;
    color: white;
}

/* GRID */
.grid-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
}

.photo-box {
    width: 260px;
    height: 260px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #00e676;
    cursor: pointer;
    position: relative;
}

.photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.selected-check {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,255,100,0.9);
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 50%;
    display: none;
}

.zip-btn {
    background: orange;
    font-size: 20px;
    margin-top: 20px;
    padding: 14px 40px;
    border-radius: 10px;
}
</style>
</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<!-- STEP 1: SELFIE UPLOAD -->
<input type="file" id="selfieInput" accept="image/*">
<img id="previewImg">

<button onclick="searchPhotos()">फोटो खोजें</button>

<h2 id="resultCount"></h2>

<!-- STEP 2: FILTER BAR (Google Photos Style) -->
<div id="filterBar" class="filter-bar">

    <div class="chip filter-chip active" data-filter="ALL">सभी फोटो</div>
    <div class="chip filter-chip" data-filter="BEST">⭐ Best Photos</div>
    <div class="chip filter-chip" data-filter="HAPPY">😊 Happy Moments</div>
    <div class="chip filter-chip" data-filter="FACES">🙂 Faces</div>
    <div class="chip filter-chip" data-filter="GROUPS">👥 Group Photos</div>
    <div class="chip filter-chip" data-filter="SELFIES">🤳 Selfies</div>

    <input type="text" id="searchTextFilter" class="search-text" placeholder="Search like Google Photos…">

</div>

<!-- STEP 3: ACTION BUTTONS -->
<button class="zip-btn" onclick="downloadZip()">ZIP डाउनलोड</button>

<!-- STEP 4: RESULTS GRID -->
<div id="photoGrid" class="grid-container"></div>



<!-- JS LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
let matches = [];
let filteredMatches = [];
let selectedPhotos = [];

const SAVE_DETAILS_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";
const FIND_MATCH_API  = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
const GALLERY_API_URL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/get-photos";


/* PREVIEW IMAGE */
document.getElementById("selfieInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = ev => {
        previewImg.src = ev.target.result;
        previewImg.style.display = "block";
    };
    reader.readAsDataURL(file);
});


/* ------------------------------
   STEP 1 → SEARCH FOR MATCHES
------------------------------- */
async function searchPhotos(){
    const file = selfieInput.files[0];
    if (!file){
        alert("कृपया सेल्फी अपलोड करें!");
        return;
    }

    const base64Image = await fileToBase64(file);

    const body = {
        linkId: getLinkId(),
        name: "Unknown",
        mobile: "0000000000",
        selfie_image: base64Image
    };

    let resp = await fetch(FIND_MATCH_API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });

    let data = await resp.json();

    matches = data.matches || [];
    filteredMatches = matches;

    resultCount.innerText = matches.length + " फोटो मिलीं!";

    // Enable filter bar
    document.getElementById("filterBar").style.display = "flex";

    renderGrid();
}


/* FILE TO BASE64 */
function fileToBase64(file){
    return new Promise(resolve => {
        let reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
    });
}

function getLinkId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("linkId");
}


/* ------------------------------
     RENDER GRID
------------------------------- */
function renderGrid(){
    const grid = document.getElementById("photoGrid");
    grid.innerHTML = "";

    filteredMatches.forEach(photo => {
        const div = document.createElement("div");
        div.className = "photo-box";

        let img = document.createElement("img");
        img.src = photo.url;

        let tick = document.createElement("div");
        tick.className = "selected-check";
        tick.innerText = "✔";

        div.onclick = () => toggleSelect(div, photo);

        div.appendChild(img);
        div.appendChild(tick);
        grid.appendChild(div);
    });
}


/* SELECT / DESELECT */
function toggleSelect(box, photo){
    const tick = box.querySelector(".selected-check");

    if (tick.style.display === "block"){
        tick.style.display = "none";
        selectedPhotos = selectedPhotos.filter(p => p.url !== photo.url);
    } else {
        tick.style.display = "block";
        selectedPhotos.push(photo);
    }
}


/* ------------------------------
     ZIP DOWNLOAD
------------------------------- */
async function downloadZip(){
    if (selectedPhotos.length === 0){
        alert("कृपया कुछ फोटो चुनें!");
        return;
    }

    const zip = new JSZip();
    let folder = zip.folder("photos");

    for (let i = 0; i < selectedPhotos.length; i++){
        let url = selectedPhotos[i].url;
        let blob = await fetch(url).then(r => r.blob());
        folder.file("photo_" + (i+1) + ".jpg", blob);
    }

    const content = await zip.generateAsync({type:"blob"});
    saveAs(content, "SelectedPhotos.zip");
}


/* ------------------------------
     GOOGLE PHOTOS STYLE FILTERS
------------------------------- */
function applySmartFilter(filterName){
    let temp = [...matches];

    if (filterName === "BEST"){
        temp = temp.filter(p =>
            (p.quality_score ?? 0) > 0.80 ||
            (p.emotions?.Happy ?? 0) > 70
        );
    }

    if (filterName === "HAPPY"){
        temp = temp.filter(p => (p.emotions?.Happy ?? 0) >= 60);
    }

    if (filterName === "FACES"){
        temp = temp.filter(p => (p.face_count ?? 0) >= 1);
    }

    if (filterName === "GROUPS"){
        temp = temp.filter(p => (p.face_count ?? 0) >= 3);
    }

    if (filterName === "SELFIES"){
        temp = temp.filter(p =>
            (p.face_count ?? 0) === 1 &&
            p.shot_type === "close-up"
        );
    }

    filteredMatches = temp;
    renderGrid();
}

/* CHIP BUTTONS */
document.querySelectorAll(".filter-chip").forEach(chip => {
    chip.addEventListener("click", () => {
        document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        applySmartFilter(chip.dataset.filter);
    });
});

/* TEXT SEARCH LIKE GOOGLE PHOTOS */
searchTextFilter.addEventListener("input", function(){
    const q = this.value.toLowerCase();

    filteredMatches = matches.filter(p =>
        (p.ai_tags || []).some(t => t.toLowerCase().includes(q)) ||
        (p.eventName || "").toLowerCase().includes(q) ||
        (p.photo_id || "").toLowerCase().includes(q)
    );

    renderGrid();
});

</script>
</body>
</html>
