<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLens – अपनी फोटो खोजें</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-top: 50px;
            font-size: 30px;
            font-weight: bold;
        }

        #uploadBox {
            background: #1c1c1c;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        #selfieInput {
            display: block;
            width: 100%;
            padding: 12px;
            background: #222;
            color: #fff;
            border-radius: 8px;
            border: 1px solid #444;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff6600;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 12px;
            cursor: pointer;
        }

        button:hover {
            background: #ff4500;
        }

        #loading {
            display: none;
            margin-top: 15px;
            color: #ccc;
        }

        .photo {
            width: 200px;
            margin: 10px;
            border-radius: 10px;
            border: 2px solid #444;
        }
    </style>
</head>

<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<div id="uploadBox">
    <h3>अपनी सेल्फी अपलोड करें</h3>

    <!-- यह input अब 100% clickable है -->
    <input type="file" id="selfieInput" accept="image/*">

    <button onclick="searchPhotos()">फोटो खोजें</button>

    <div id="loading">⏳ कृपया प्रतीक्षा करें…</div>
</div>

<div id="resultBox"></div>

<script>
const FIND_MATCH_API = "YOUR_FIND_MATCH_LAMBDA_URL_HERE"; 

async function searchPhotos() {
    const selfieFile = document.getElementById("selfieInput").files[0];
    const linkId = new URLSearchParams(window.location.search).get("linkId");

    if (!selfieFile) {
        alert("कृपया एक सेल्फी चुनें।");
        return;
    }

    if (!linkId) {
        alert("लिंक ID नहीं मिली!");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("resultBox").innerHTML = "";

    const reader = new FileReader();

    reader.onload = async function () {
        const base64Selfie = reader.result;

        const payload = {
            linkId: linkId,
            name: "Guest",
            mobile: "0000000000",
            selfie_image: base64Selfie
        };

        console.log("🚀 Sending Payload:", payload);

        try {
            const response = await fetch(FIND_MATCH_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            console.log("📌 Server Response:", data);

            document.getElementById("loading").style.display = "none";

            if (!data.matches || data.matches.length === 0) {
                document.getElementById("resultBox").innerHTML =
                    "<h2>क्षमा करें, आपकी कोई फोटो नहीं मिली।</h2>";
                return;
            }

            let html = "<h2>आपकी फ़ोटोज़ मिलीं!</h2>";
            data.matches.forEach(m => {
                html += `<img src="${m.url}" class="photo">`;
            });

            document.getElementById("resultBox").innerHTML = html;

        } catch (error) {
            console.error("🔥 ERROR:", error);
            document.getElementById("loading").style.display = "none";
            document.getElementById("resultBox").innerHTML =
                "<h2>❌ तकनीकी समस्या हुई।</h2>";
        }
    };

    reader.readAsDataURL(selfieFile);
}
</script>

</body>
</html>
