<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EventLens – अपनी फोटो खोजें</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" />

<style>
    body {
        background: #000;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin-top: 25px;
        font-size: 32px;
        font-weight: bold;
    }

    .section {
        padding: 20px;
    }

    input, button {
        width: 90%;
        max-width: 320px;
        padding: 14px;
        margin: 8px auto;
        border-radius: 10px;
        font-size: 16px;
        border: none;
        display: block;
    }

    input {
        background: #222;
        color: #fff;
        border: 1px solid #555;
    }

    button {
        background: #00c63b;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.8;
    }

    .hidden {
        display: none;
    }

    /* Photo Grid */
    .grid-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 25px;
    }

    .photo-box {
        width: 260px;
        height: 260px;
        border: 3px solid #00ff66;
        border-radius: 14px;
        margin: 12px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        transition: 0.2s;
    }

    .photo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .selected-check {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 6px 10px;
        background: #00c6ff;
        border-radius: 50%;
        font-size: 20px;
        display: none;
    }

    .gallery-btn {
        background: #8a2be2;
        fontsize: 18px;
        margin-top: 15px;
    }

    .zip-btn {
        background: orange;
        font-size: 20px;
        margin-top: 20px;
        padding: 14px 40px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<!-- STEP 1: SELFIE UPLOAD -->
<div id="step1" class="section">
    <input type="file" id="selfieInput" accept="image/*" />
    <button onclick="findMatches()">🔍 फोटो खोजें</button>
</div>

<!-- STEP 2: DETAILS FORM -->
<div id="detailsForm" class="section hidden">
    <input id="guestName" placeholder="आपका नाम लिखें" />
    <input id="guestMobile" placeholder="मोबाइल नंबर" maxlength="10" />

    <button onclick="submitDetails()">जारी रखें</button>
</div>

<!-- RESULT COUNT -->
<h2 id="resultCount"></h2>

<!-- Gallery Button -->
<button id="openGalleryBtn" class="gallery-btn hidden" onclick="showGallery()">📸 गैलरी व्यू</button>

<!-- STEP 3: PHOTO GRID -->
<div id="photoGrid" class="grid-container hidden"></div>

<button class="zip-btn hidden" id="zipBtn" onclick="downloadZip()">ZIP डाउनलोड</button>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

<script>
const SEARCH_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
let globalMatches = [];
let selectedPhotos = [];

/* Convert file to Base64 */
function fileToBase64(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
    });
}

/* GET linkId */
function getLinkId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("linkId");
}

/* STEP 1 → FIND MATCHES */
async function findMatches() {
    const file = document.getElementById("selfieInput").files[0];
    if (!file) return alert("कृपया एक सेल्फी अपलोड करें!");

    const base64Img = await fileToBase64(file);

    const body = {
        linkId: getLinkId(),
        name: "preview",
        mobile: "0000000000",
        selfie_image: base64Img
    };

    const res = await fetch(SEARCH_API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });

    const data = await res.json();
    globalMatches = data.matches || [];

    if (globalMatches.length === 0) {
        document.getElementById("resultCount").innerText = "❌ कोई फोटो नहीं मिली!";
        return;
    }

    document.getElementById("resultCount").innerText = `${globalMatches.length} फोटो मिलीं!`;

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("detailsForm").classList.remove("hidden");
}

/* STEP 2 → SAVE DETAILS */
function submitDetails() {
    let name = document.getElementById("guestName").value.trim();
    let mobile = document.getElementById("guestMobile").value.trim();

    if (!name || !mobile) return alert("कृपया सभी विवरण भरें!");

    document.getElementById("detailsForm").classList.add("hidden");
    document.getElementById("openGalleryBtn").classList.remove("hidden");

    showGridView();
}

/* SHOW GRID VIEW */
function showGridView() {
    const grid = document.getElementById("photoGrid");
    grid.innerHTML = "";
    grid.classList.remove("hidden");
    document.getElementById("zipBtn").classList.remove("hidden");

    globalMatches.forEach(photo => {
        let box = document.createElement("div");
        box.className = "photo-box";

        let img = document.createElement("img");
        img.src = photo.url;
        img.setAttribute("data-lightbox", "photos");

        let tick = document.createElement("div");
        tick.className = "selected-check";
        tick.innerText = "✔";

        box.appendChild(img);
        box.appendChild(tick);

        box.onclick = () => toggleSelect(box, photo);
        grid.appendChild(box);
    });
}

/* GALLERY MODE = SAME IMAGES BUT NO CHECKBOX */
function showGallery() {
    showGridView();
}

/* SELECT PHOTO */
function toggleSelect(box, photo) {
    const tick = box.querySelector(".selected-check");

    if (tick.style.display === "block") {
        tick.style.display = "none";
        selectedPhotos = selectedPhotos.filter(p => p.url !== photo.url);
    } else {
        tick.style.display = "block";
        selectedPhotos.push(photo);
    }
}

/* ZIP DOWNLOAD */
async function downloadZip() {
    if (selectedPhotos.length === 0) return alert("कृपया कुछ फोटो चुनें!");

    const zip = new JSZip();
    let folder = zip.folder("photos");

    for (let i = 0; i < selectedPhotos.length; i++) {
        const blob = await fetch(selectedPhotos[i].url).then(r => r.blob());
        folder.file("photo_" + (i + 1) + ".jpg", blob);
    }

    const content = await zip.generateAsync({type: "blob"});
    saveAs(content, "MyPhotos.zip");
}
</script>

</body>
</html>
