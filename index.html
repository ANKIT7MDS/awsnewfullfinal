<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Photos</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    /* Minimal UI */
    body {
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }
    
    .app {
      max-width: 400px;
      margin: 0 auto;
    }
    
    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding: 10px 0;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #007aff;
    }
    
    .step-indicator {
      font-size: 12px;
      color: #8e8e93;
      background: #e5e5ea;
      padding: 4px 12px;
      border-radius: 12px;
    }
    
    /* Screen */
    .screen {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      margin-bottom: 20px;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .screen h2 {
      margin: 0 0 10px 0;
      color: #1c1c1e;
    }
    
    .screen p {
      color: #8e8e93;
      margin: 0 0 30px 0;
    }
    
    /* Camera Button */
    .camera-btn {
      width: 100px;
      height: 100px;
      background: linear-gradient(45deg, #007aff, #5856d6);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
    }
    
    /* Photo Grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin: 20px 0;
    }
    
    .photo-cell {
      aspect-ratio: 1;
      background: #f2f2f7;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .photo-cell.selected {
      border: 3px solid #007aff;
    }
    
    /* Inputs */
    .input-field {
      width: 100%;
      padding: 16px;
      border: 2px solid #e5e5ea;
      border-radius: 12px;
      font-size: 16px;
      margin: 10px 0;
      outline: none;
    }
    
    .input-field:focus {
      border-color: #007aff;
    }
    
    /* Status */
    .status {
      padding: 12px;
      background: #e8f4ff;
      border-radius: 12px;
      color: #007aff;
      margin: 20px 0;
      font-size: 14px;
    }
    
    /* Bottom Actions */
    .bottom-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .action-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .primary-btn {
      background: #007aff;
      color: white;
    }
    
    .secondary-btn {
      background: #f2f2f7;
      color: #1c1c1e;
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">EventPhotos</div>
    <div class="step-indicator" id="stepIndicator">Step 1/3</div>
  </div>
  
  <!-- Screen Container -->
  <div id="screenContainer">
    <!-- Screen 1: Upload -->
    <div class="screen" id="screen1">
      <h2>Take a Selfie</h2>
      <p>We'll find all your photos from the event</p>
      
      <div class="camera-btn" onclick="openCamera()">
        📸
      </div>
      
      <p style="margin-top: 20px; color: #8e8e93; font-size: 14px;">
        or tap to upload from gallery
      </p>
    </div>
  </div>
  
  <!-- Bottom Actions -->
  <div class="bottom-actions" id="actions">
    <button class="action-btn secondary-btn" style="display: none;" id="backBtn">Back</button>
    <button class="action-btn primary-btn" style="display: none;" id="nextBtn">Next</button>
  </div>
</div>

<!-- Hidden Inputs -->
<input type="file" id="fileInput" accept="image/*" capture="user" style="display: none">

<script>
  const SEARCH_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
  const SAVE_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";
  
  let selfieBase64 = null;
  let photos = [];
  let selected = [];
  let currentScreen = 1;
  
  function openCamera() {
    document.getElementById('fileInput').click();
  }
  
  document.getElementById('fileInput').addEventListener('change', handleFile);
  
  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    // Convert to base64
    const reader = new FileReader();
    reader.onload = async (event) => {
      selfieBase64 = event.target.result;
      
      // Show loading screen
      showScreen(2);
      
      // Search for photos
      await searchPhotos();
    };
    reader.readAsDataURL(file);
  }
  
  async function searchPhotos() {
    const linkId = new URLSearchParams(window.location.search).get('linkId');
    
    // Show status
    updateScreen(`
      <div class="status">🔍 Searching for your photos...</div>
      <div style="margin: 20px 0;">
        <div style="width: 100%; height: 4px; background: #e5e5ea; border-radius: 2px;">
          <div id="progressBar" style="width: 0%; height: 100%; background: #007aff; border-radius: 2px; transition: width 0.3s;"></div>
        </div>
      </div>
    `);
    
    // Animate progress
    const bar = document.getElementById('progressBar');
    for (let i = 0; i <= 100; i += 20) {
      bar.style.width = i + '%';
      await sleep(300);
    }
    
    try {
      const response = await fetch(SEARCH_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ linkId, selfie_image: selfieBase64 })
      });
      
      const data = await response.json();
      photos = data.matches || [];
      
      // Show results screen
      showScreen(3);
      
    } catch (error) {
      updateScreen(`
        <h2>Oops!</h2>
        <p>Something went wrong. Please try again.</p>
        <button class="action-btn primary-btn" onclick="showScreen(1)" style="margin-top: 20px;">
          Try Again
        </button>
      `);
    }
  }
  
  // Screen management
  function showScreen(screenNumber) {
    currentScreen = screenNumber;
    
    // Update step indicator
    document.getElementById('stepIndicator').textContent = `Step ${screenNumber}/4`;
    
    // Update actions
    const backBtn = document.getElementById('backBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    backBtn.style.display = screenNumber > 1 ? 'block' : 'none';
    nextBtn.style.display = screenNumber < 4 ? 'block' : 'none';
    
    // Update screen content
    let content = '';
    
    if (screenNumber === 1) {
      content = `
        <h2>Take a Selfie</h2>
        <p>We'll find all your photos from the event</p>
        
        <div class="camera-btn" onclick="openCamera()">
          📸
        </div>
        
        <p style="margin-top: 20px; color: #8e8e93; font-size: 14px;">
          or tap to upload from gallery
        </p>
      `;
    }
    else if (screenNumber === 2) {
      content = `
        <h2>Finding Photos</h2>
        <div class="status">🔍 Searching for your photos...</div>
      `;
    }
    else if (screenNumber === 3) {
      content = `
        <h2>${photos.length} Photos Found!</h2>
        <p>Enter your details to access them</p>
        
        <input type="text" placeholder="Your Name" class="input-field" id="userName">
        <input type="tel" placeholder="Mobile Number" class="input-field" id="userMobile" maxlength="10">
        
        <div id="autoNotice" style="display: none; margin-top: 20px; font-size: 14px; color: #007aff;">
          ✓ Details saved. Loading photos...
        </div>
      `;
    }
    else if (screenNumber === 4) {
      content = `
        <h2>Your Photos</h2>
        <p>Tap to select photos for download</p>
        
        <div class="photo-grid" id="photoGrid">
          ${photos.slice(0, 9).map((photo, i) => `
            <div class="photo-cell" onclick="togglePhoto(${i})" id="photo${i}">
              <img src="${photo.url}" alt="Photo">
            </div>
          `).join('')}
        </div>
        
        <div style="margin-top: 20px; font-size: 14px; color: #8e8e93;">
          Selected: <span id="selectedCount">0</span> photos
        </div>
      `;
    }
    
    updateScreen(content);
    
    // Setup event listeners for screen 3
    if (screenNumber === 3) {
      setTimeout(() => {
        document.getElementById('userName').focus();
        document.getElementById('userName').addEventListener('input', checkAutoProceed);
        document.getElementById('userMobile').addEventListener('input', checkAutoProceed);
      }, 100);
    }
  }
  
  function updateScreen(content) {
    document.getElementById('screenContainer').innerHTML = `
      <div class="screen">
        ${content}
      </div>
    `;
  }
  
  // Auto-proceed logic
  function checkAutoProceed() {
    const name = document.getElementById('userName').value.trim();
    const mobile = document.getElementById('userMobile').value.trim();
    
    if (name && mobile.length === 10) {
      // Show notice
      document.getElementById('autoNotice').style.display = 'block';
      
      // Save details
      saveDetails(name, mobile);
      
      // Proceed after 1 second
      setTimeout(() => {
        showScreen(4);
      }, 1000);
    }
  }
  
  async function saveDetails(name, mobile) {
    const linkId = new URLSearchParams(window.location.search).get('linkId');
    
    try {
      await fetch(SAVE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          linkId,
          name,
          mobile,
          selfie_image: selfieBase64,
          photo_count: photos.length
        })
      });
    } catch (e) {
      // Silent fail
    }
  }
  
  // Photo selection
  function togglePhoto(index) {
    const cell = document.getElementById(`photo${index}`);
    if (!cell) return;
    
    if (selected.includes(index)) {
      selected = selected.filter(i => i !== index);
      cell.classList.remove('selected');
    } else {
      selected.push(index);
      cell.classList.add('selected');
    }
    
    document.getElementById('selectedCount').textContent = selected.length;
  }
  
  // Navigation
  document.getElementById('backBtn').onclick = () => {
    if (currentScreen > 1) {
      showScreen(currentScreen - 1);
    }
  };
  
  document.getElementById('nextBtn').onclick = () => {
    if (currentScreen < 4) {
      showScreen(currentScreen + 1);
    }
    
    if (currentScreen === 4) {
      downloadSelected();
    }
  };
  
  // Download
  async function downloadSelected() {
    const photosToDownload = selected.length > 0 ? 
      selected.map(i => photos[i]) : 
      photos.slice(0, 5);
    
    if (photosToDownload.length === 0) return;
    
    const zip = new JSZip();
    const folder = zip.folder("event_photos");
    
    for (let i = 0; i < photosToDownload.length; i++) {
      const response = await fetch(photosToDownload[i].url);
      const blob = await response.blob();
      folder.file(`photo_${i+1}.jpg`, blob);
    }
    
    const content = await zip.generateAsync({type: "blob"});
    saveAs(content, "my_photos.zip");
    
    // Celebration!
    confetti({
      particleCount: 100,
      spread: 70
    });
  }
  
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
</script>
</body>
</html>
