<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventLens – अपनी फोटो खोजें</title>

    <!-- STYLES -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 36px;
        }

        #preview {
            width: 260px;
            border-radius: 10px;
            display: none;
            margin: 20px auto;
        }

        #photos-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            margin-top: 25px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .photo-box {
            border: 3px solid rgb(0, 255, 0);
            border-radius: 15px;
            padding: 5px;
            cursor: pointer;
            position: relative;
            background: #111;
        }

        .photo-box img {
            width: 100%;
            border-radius: 12px;
        }

        .selected-check {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #00c3ff;
            padding: 5px 7px;
            border-radius: 50%;
            font-size: 16px;
            display: none;
        }

        .selected .selected-check {
            display: block;
        }

        .btn {
            padding: 14px 28px;
            font-size: 20px;
            background: #00c853;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            color: black;
        }

        #zip-btn {
            background: #ffc400;
            color: black;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
        }

        /* LIGHTBOX MODAL */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 10px;
        }

        #closeLightbox {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
        }
    </style>

    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip-utils/0.1.0/jszip-utils.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

</head>

<body>

    <h1>EventLens – अपनी फोटो खोजें</h1>

    <input type="file" id="selfie" accept="image/*" />
    <br>
    <img id="preview" />

    <button class="btn" onclick="searchPhotos()">फोटो खोजें</button>
    <p id="message"></p>

    <button class="btn" id="zip-btn" onclick="downloadZip()" style="display:none">चयनित फोटो ZIP डाउनलोड</button>

    <div id="photos-container"></div>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <span id="closeLightbox">×</span>
        <img id="lightbox-img" />
    </div>

    <script>
        let selectedPhotos = [];
        let apiURL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";

        // Load preview
        document.getElementById("selfie").addEventListener("change", function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById("preview").src = e.target.result;
                    document.getElementById("preview").style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        // SEARCH PHOTOS
        async function searchPhotos() {
            const file = document.getElementById("selfie").files[0];
            if (!file) {
                alert("पहले अपनी फोटो चुनें!");
                return;
            }

            document.getElementById("message").innerHTML = "कृपया प्रतीक्षा करें...";

            const reader = new FileReader();
            reader.onload = async function () {
                const selfieBase64 = reader.result;

                const linkId = new URLSearchParams(window.location.search).get("linkId") || "";
                const body = {
                    linkId,
                    selfie_image: selfieBase64,
                    name: "guest",
                    mobile: "0000000000"
                };

                const res = await fetch(apiURL, {
                    method: "POST",
                    body: JSON.stringify(body),
                });

                const data = await res.json();
                console.log("RESULT:", data);

                if (!data.matches || data.matches.length === 0) {
                    document.getElementById("message").innerHTML = "क्षमा करें, आपकी कोई फोटो नहीं मिली।";
                    return;
                }

                renderPhotos(data.matches);
            };
            reader.readAsDataURL(file);
        }

        // RENDER GRID
        function renderPhotos(list) {
            const box = document.getElementById("photos-container");
            box.innerHTML = "";
            selectedPhotos = [];

            document.getElementById("message").innerHTML = `${list.length} फोटो मिली!`;
            document.getElementById("zip-btn").style.display = "inline-block";

            list.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "photo-box";

                div.innerHTML = `
                    <img src="${item.url}" onclick="openLightbox('${item.url}')">
                    <div class="selected-check">✔</div>
                `;

                div.onclick = () => toggleSelect(div, item.url);

                box.appendChild(div);
            });
        }

        // SELECT / UNSELECT
        function toggleSelect(div, url) {
            if (div.classList.contains("selected")) {
                div.classList.remove("selected");
                selectedPhotos = selectedPhotos.filter(u => u !== url);
            } else {
                div.classList.add("selected");
                selectedPhotos.push(url);
            }
        }

        // LIGHTBOX
        function openLightbox(url) {
            document.getElementById("lightbox-img").src = url;
            document.getElementById("lightbox").style.display = "flex";
        }

        document.getElementById("closeLightbox").onclick = function () {
            document.getElementById("lightbox").style.display = "none";
        };

        // ZIP DOWNLOAD
        async function downloadZip() {
            if (selectedPhotos.length === 0) {
                alert("कोई फोटो चयनित नहीं है!");
                return;
            }

            const zip = new JSZip();
            const folder = zip.folder("EventPhotos");

            for (let i = 0; i < selectedPhotos.length; i++) {
                let url = selectedPhotos[i];

                try {
                    const fileData = await new Promise((resolve, reject) => {
                        JSZipUtils.getBinaryContent(url, function (err, data) {
                            if (err) reject(err);
                            else resolve(data);
                        });
                    });

                    let fileName = url.split("/").pop().split("?")[0];
                    folder.file(fileName, fileData, { binary: true });

                } catch (err) {
                    console.error("Download error:", err);
                }
            }

            const content = await zip.generateAsync({ type: "blob" });
            saveAs(content, "Selected_Photos.zip");
        }
    </script>

</body>

</html>
