<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EventLens – अपनी फोटो खोजें</title>

<!-- Lightbox -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" />

<style>
body {
    background: #000;
    color: #fff;
    margin: 0;
    font-family: "Poppins", sans-serif;
    text-align: center;
}

/* HEADER */
h1 {
    margin-top: 25px;
    font-size: 30px;
    font-weight: bold;
}

/* MAIN CARD */
.card {
    background: #111;
    width: 92%;
    max-width: 450px;
    margin: 18px auto;
    padding: 20px;
    border-radius: 14px;
    border: 1px solid #222;
}

/* INPUTS */
input[type="file"],
input[type="text"],
input[type="number"] {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
    background: #222;
    color: #fff;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

/* Button Colors */
.btn-green { background: #00c853; }
.btn-blue { background: #2196f3; }
.btn-orange { background: #ff9800; }
.btn-red { background: #e53935; }
.btn-dark { background: #333; }

/* Hidden Sections */
.hidden { display: none; }

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 15px;
}

.photo-box {
    width: 150px;
    height: 150px;
    margin: 8px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    border: 2px solid #00c853;
    cursor: pointer;
}

.photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Tick */
.tick {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #00c6ff;
    padding: 5px 9px;
    border-radius: 50%;
    font-size: 16px;
    display: none;
}
</style>
</head>

<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<!-- STEP 1: Selfie Upload -->
<div class="card" id="step1">
    <h2>अपनी सेल्फी अपलोड करें</h2>

    <input type="file" id="selfieInput" accept="image/*" />

    <button class="btn-green" onclick="findMatches()">फोटो खोजें</button>

    <h3 id="matchCount"></h3>
</div>

<!-- STEP 2: Details Form -->
<div class="card hidden" id="detailsForm">
    <h2>अपनी जानकारी भरें</h2>

    <input type="text" id="guestName" placeholder="आपका नाम" />
    <input type="number" id="guestMobile" placeholder="मोबाइल नंबर" />

    <button class="btn-blue" onclick="submitDetails()">सबमिट करें और फोटो देखें</button>
</div>

<!-- STEP 3: Action Buttons -->
<div class="card hidden" id="actionButtons">
    <button class="btn-green" onclick="selectAll()">सभी चुनें</button>
    <button class="btn-red" onclick="clearAll()">सब हटाएँ</button>
    <button class="btn-orange" onclick="downloadZip()">ZIP डाउनलोड</button>
</div>

<!-- STEP 4: Photos Grid -->
<div id="photoGrid" class="grid"></div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

<script>
const API_SEARCH = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
const API_SAVE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

let globalMatches = [];
let selected = [];

/* Convert to Base64 */
function toBase64(file) {
    return new Promise(res => {
        let reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.readAsDataURL(file);
    });
}

/* Extract linkId */
function linkId() {
    return new URLSearchParams(window.location.search).get("linkId");
}

/* STEP 1: Find Matches */
async function findMatches() {
    const file = document.getElementById("selfieInput").files[0];
    if (!file) return alert("कृपया सेल्फी अपलोड करें!");

    const base64 = await toBase64(file);

    const body = {
        linkId: linkId(),
        name: "temp",
        mobile: "temp",
        selfie_image: base64
    };

    let res = await fetch(API_SEARCH, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    let data = await res.json();

    globalMatches = data.matches || [];

    document.getElementById("matchCount").innerText =
        globalMatches.length ? `${globalMatches.length} फोटो मिलीं!` : "❌ कोई फोटो नहीं मिली!";

    if (globalMatches.length > 0) {
        document.getElementById("detailsForm").classList.remove("hidden");
    }
}

/* STEP 2: Submit Details */
async function submitDetails() {
    let name = document.getElementById("guestName").value.trim();
    let mobile = document.getElementById("guestMobile").value.trim();

    if (!name || !mobile) return alert("कृपया नाम और मोबाइल नंबर भरें!");

    const body = {
        linkId: linkId(),
        name,
        mobile,
        selfie_image: "skip"
    };

    await fetch(API_SAVE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    showPhotos(globalMatches);

    document.getElementById("actionButtons").classList.remove("hidden");
}

/* SHOW PHOTOS */
function showPhotos(list) {
    let grid = document.getElementById("photoGrid");
    grid.innerHTML = "";

    list.forEach(photo => {
        let box = document.createElement("div");
        box.className = "photo-box";

        let img = document.createElement("img");
        img.src = photo.url;
        img.setAttribute("data-lightbox", "gallery");

        let tick = document.createElement("div");
        tick.className = "tick";
        tick.innerHTML = "✔";

        box.appendChild(img);
        box.appendChild(tick);

        box.onclick = () => togglePhoto(photo, tick);

        grid.appendChild(box);
    });
}

function togglePhoto(photo, tick) {
    if (tick.style.display === "block") {
        tick.style.display = "none";
        selected = selected.filter(p => p.url !== photo.url);
    } else {
        tick.style.display = "block";
        selected.push(photo);
    }
}

function selectAll() {
    selected = [...globalMatches];
    document.querySelectorAll(".tick").forEach(t => t.style.display = "block");
}

function clearAll() {
    selected = [];
    document.querySelectorAll(".tick").forEach(t => t.style.display = "none");
}

/* ZIP DOWNLOAD */
async function downloadZip() {
    if (selected.length === 0) return alert("कृपया कुछ फोटो चुनें!");

    const zip = new JSZip();
    const folder = zip.folder("photos");

    for (let i = 0; i < selected.length; i++) {
        const blob = await fetch(selected[i].url).then(r => r.blob());
        folder.file("photo_" + (i + 1) + ".jpg", blob);
    }

    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, "EventLens_Photos.zip");
}
</script>

</body>
</html>
