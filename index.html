<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>EventLens – अपनी फोटो खोजें</title>

<!-- MOBILE RESPONSIVE -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LIGHTBOX -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css"/>

<style>
    body {
        background: black;
        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
    }

    h1 {
        font-size: 38px;
        margin-top: 20px;
        font-weight: bold;
    }

    #previewImg {
        max-width: 280px;
        border-radius: 10px;
        margin: 10px auto;
        display: none;
    }

    button {
        background: #00c63b;
        padding: 14px 30px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover { opacity: 0.8; }

    /* GRID */
    .grid-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 25px;
    }

    .photo-box {
        width: 260px;
        height: 260px;
        border: 3px solid #00ff66;
        border-radius: 14px;
        margin: 12px;
        overflow: hidden;
        position: relative;
        transition: 0.2s;
        cursor: pointer;
    }

    .photo-box:hover {
        transform: scale(1.03);
    }

    .photo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .selected-check {
        position: absolute;
        top: 8px;
        right: 8px;
        background: #00c6ff;
        padding: 6px 10px;
        border-radius: 50%;
        font-size: 20px;
        display: none;
    }

    .zip-btn {
        background: orange;
        font-size: 22px;
        margin-top: 20px;
        padding: 14px 40px;
        border-radius: 10px;
    }

</style>

</head>
<body>

<h1>EventLens – अपनी फोटो खोजें</h1>

<!-- SELFIE INPUT -->
<input type="file" id="selfieInput" accept="image/*">
<br>
<img id="previewImg">

<button onclick="searchPhotos()">फोटो खोजें</button>

<h2 id="resultCount"></h2>

<button class="zip-btn" onclick="downloadZip()">चयनित फोटो ZIP डाउनलोड</button>

<!-- GRID -->
<div class="grid-container" id="photoGrid"></div>

<!-- JS LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

<script>
let selectedPhotos = [];
const apiURL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";  // ← यहां अपनी API URL डालें

// Preview selfie
document.getElementById("selfieInput").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = e => {
            document.getElementById("previewImg").src = e.target.result;
            document.getElementById("previewImg").style.display = "block";
        };
        reader.readAsDataURL(file);
    }
});


// ⭐ MAIN SEARCH FUNCTION
async function searchPhotos() {
    const fileInput = document.getElementById("selfieInput").files[0];
    if (!fileInput) {
        alert("कृपया एक सेल्फी अपलोड करें!");
        return;
    }

    const base64Img = await fileToBase64(fileInput);

    const body = {
        linkId: getLinkId(),
        name: "guest",
        mobile: "0000000000",
        selfie_image: base64Img
    };

    const res = await fetch(apiURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!data.matches || data.matches.length === 0) {
        document.getElementById("resultCount").innerText = "❌ कोई फोटो नहीं मिली!";
        return;
    }

    document.getElementById("resultCount").innerText = data.matches.length + " फोटो मिली!";

    showPhotos(data.matches);
}


// Convert file to Base64
function fileToBase64(file) {
    return new Promise(resolve => {
        let reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
    });
}

// Get linkId from URL
function getLinkId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("linkId");
}


// ⭐ DISPLAY PHOTOS GRID
function showPhotos(photos) {
    const grid = document.getElementById("photoGrid");
    grid.innerHTML = "";

    photos.forEach((p, index) => {
        let div = document.createElement("div");
        div.className = "photo-box";

        let img = document.createElement("img");
        img.src = p.url;
        img.setAttribute("data-lightbox", "gallery");
        img.setAttribute("data-title", "Photo");

        // Selection check mark
        let tick = document.createElement("div");
        tick.className = "selected-check";
        tick.innerHTML = "✔";

        div.appendChild(img);
        div.appendChild(tick);

        div.onclick = () => toggleSelect(div, p);

        grid.appendChild(div);
    });
}


// SELECT / DESELECT PHOTO
function toggleSelect(box, photo) {
    const tick = box.querySelector(".selected-check");

    if (tick.style.display === "block") {
        tick.style.display = "none";
        selectedPhotos = selectedPhotos.filter(p => p.url !== photo.url);
    } else {
        tick.style.display = "block";
        selectedPhotos.push(photo);
    }
}


// ⭐ ZIP DOWNLOAD (NO CORS PROBLEM)
async function downloadZip() {
    if (selectedPhotos.length === 0) {
        alert("कृपया कुछ फोटो चुनें!");
        return;
    }

    const zip = new JSZip();
    let folder = zip.folder("photos");

    for (let i = 0; i < selectedPhotos.length; i++) {
        let url = selectedPhotos[i].url;
        let blob = await fetch(url).then(r => r.blob());
        folder.file("photo_" + (i + 1) + ".jpg", blob);
    }

    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, "SelectedPhotos.zip");
}
</script>

</body>
</html>
